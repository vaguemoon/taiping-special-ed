<!DOCTYPE html>
<html lang="zh-TW">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>太平國小｜教師管理後台</title>
<script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-firestore-compat.js"></script>
<link rel="stylesheet" href="admin.css">
<style></style>
</head>
<body>



<!-- ══ 後台主畫面 ══ -->
<div id="admin-screen">

  <!-- 頂部列 -->
  <div class="admin-topbar">
    <div class="topbar-brand">
      <div class="topbar-brand-icon">🏫</div>
      <div>
        <div class="topbar-brand-name">太平國小 教師後台</div>
        <div class="topbar-brand-sub">國字學習管理系統</div>
      </div>
    </div>
    <div class="topbar-right">
      <span style="font-size:.82rem;font-weight:700;color:var(--muted)" id="last-update"></span>
      <button class="btn-logout" onclick="doLogout()">登出</button>
    </div>
  </div>

  <div class="admin-main">

    <!-- 分頁 -->
    <div class="admin-tabs">
      <button class="admin-tab active" id="tab-overview"    onclick="switchTab('overview')">📊 班級總覽</button>
      <button class="admin-tab"        id="tab-curriculum" onclick="switchTab('curriculum')">📚 課程管理</button>
    </div>

    <!-- 班級總覽 -->
    <div id="panel-overview">
      <div class="stats-row">
        <div class="stat-card stat-blue">
          <div class="stat-num" id="stat-total">—</div>
          <div class="stat-lbl">學生總數</div>
        </div>
        <div class="stat-card stat-green">
          <div class="stat-num" id="stat-active">—</div>
          <div class="stat-lbl">今日活躍</div>
        </div>
        <div class="stat-card stat-yellow">
          <div class="stat-num" id="stat-mastered">—</div>
          <div class="stat-lbl">平均通過測驗字數</div>
        </div>
      </div>

      <!-- 學生名單 -->
      <div class="card" id="student-roster-card">
        <div class="card-title">👥 學生名單
          <button onclick="loadCourseOverview()" style="margin-left:auto;padding:5px 12px;border:1.5px solid var(--border);border-radius:7px;background:white;font-size:.8rem;font-weight:700;cursor:pointer;font-family:inherit">🔄 重新整理</button>
        </div>
        <div id="course-overview-wrap">
          <div class="loading-wrap"><div class="spinner"></div><br>載入中…</div>
        </div>
      </div>

      <!-- 學生課程詳細頁（點學生後顯示） -->
      <div class="card" id="student-course-card" style="display:none">
        <div class="card-title">
          <button class="back-btn" style="margin:0;padding:0" onclick="backToRoster()">← 返回名單</button>
          <span id="student-course-name" style="margin-left:10px;font-weight:900"></span>
        </div>
        <div id="student-course-wrap">
          <div class="loading-wrap"><div class="spinner"></div></div>
        </div>
      </div>
    </div>

    <!-- 課程管理 -->
    <div id="panel-curriculum" style="display:none">

      <!-- 版本選擇 -->
      <div class="card" style="margin-bottom:16px">
        <div class="card-title">📚 課程版本
          <button class="btn-edit" style="margin-left:auto" onclick="showAddVersion()">＋ 新增版本</button>
        </div>
        <div id="version-list-wrap">
          <div class="loading-wrap"><div class="spinner"></div></div>
        </div>
        <!-- 新增版本表單 -->
        <div id="add-version-form" style="display:none;margin-top:14px;padding-top:14px;border-top:1px solid var(--border)">
          <div style="display:flex;gap:8px;align-items:center;flex-wrap:wrap">
            <input id="new-version-name" type="text" placeholder="例如：太平國小112學年"
              style="flex:1;border:2px solid var(--border);border-radius:8px;padding:9px 12px;font-size:.92rem;font-family:inherit;outline:none;min-width:180px">
            <button class="btn-save-lesson" style="padding:9px 18px" onclick="addVersion()">
              <span>＋</span><span>建立</span>
            </button>
            <button class="btn-edit" onclick="hideAddVersion()">取消</button>
          </div>
        </div>
      </div>

      <!-- CSV 上傳 -->
      <div class="card" style="margin-bottom:16px" id="csv-upload-card">
        <div class="card-title">📥 批次匯入課程（CSV）</div>
        <div style="background:#f8fafc;border-radius:10px;padding:14px;margin-bottom:14px;font-size:.82rem;font-weight:600;color:var(--gray);line-height:1.8">
          <strong>CSV 格式（第一欄為版本名稱）：</strong><br>
          版本,年級,課,課名,生字<br>
          康軒,一上,1,拍拍手,山水火土木<br>
          康軒,一上,2,第二課,日月星雲風<br>
          康軒,一下,1,第一課,春夏秋冬<br>
          <span style="color:var(--blue)">✦ 上傳後系統會自動建立版本，不需要事先手動建立</span>
        </div>
        <div style="display:flex;gap:10px;align-items:center;flex-wrap:wrap">
          <label style="display:flex;align-items:center;gap:8px;padding:10px 18px;border:2px dashed var(--border);border-radius:10px;cursor:pointer;font-size:.88rem;font-weight:700;color:var(--gray);transition:all .15s"
            id="csv-label" onmouseover="this.style.borderColor='var(--blue)'" onmouseout="this.style.borderColor='var(--border)'">
            <span>📎</span><span id="csv-filename">選擇 CSV 檔案</span>
            <input type="file" accept=".csv" id="csv-file" style="display:none" onchange="onCSVSelected()">
          </label>
          <button class="btn-save-lesson" onclick="importCSV()" id="btn-import-csv" disabled
            style="opacity:.5;cursor:not-allowed">
            <span>📥</span><span>匯入</span>
          </button>
        </div>
        <div id="csv-preview" style="margin-top:12px"></div>
      </div>

      <!-- 手動新增課程 -->
      <div class="card" style="margin-bottom:16px" id="manual-add-card">
        <div class="card-title">✏️ 手動新增課程</div>
        <div style="display:grid;grid-template-columns:1fr 1fr;gap:10px;margin-bottom:12px">
          <div style="grid-column:1/-1">
            <label style="font-size:.78rem;font-weight:800;color:var(--muted);display:block;margin-bottom:5px">
              版本名稱
              <span style="font-weight:600;color:var(--blue)">（輸入新版本名稱可自動建立，或輸入已有版本名稱）</span>
            </label>
            <input id="manual-version-input" type="text"
              list="version-datalist"
              placeholder="例如：康軒一年級、翰林112學年…"
              style="width:100%;border:2px solid var(--border);border-radius:8px;padding:9px 12px;font-size:.9rem;font-family:inherit;outline:none">
            <datalist id="version-datalist"></datalist>
          </div>
          <div>
            <label style="font-size:.78rem;font-weight:800;color:var(--muted);display:block;margin-bottom:5px">年級</label>
            <input id="manual-grade" type="text" placeholder="例如：一上"
              style="width:100%;border:2px solid var(--border);border-radius:8px;padding:9px 12px;font-size:.9rem;font-family:inherit;outline:none">
          </div>
          <div>
            <label style="font-size:.78rem;font-weight:800;color:var(--muted);display:block;margin-bottom:5px">課次（數字）</label>
            <input id="manual-lesson-num" type="number" placeholder="例如：1" min="1"
              style="width:100%;border:2px solid var(--border);border-radius:8px;padding:9px 12px;font-size:.9rem;font-family:inherit;outline:none">
          </div>
          <div>
            <label style="font-size:.78rem;font-weight:800;color:var(--muted);display:block;margin-bottom:5px">課名</label>
            <input id="manual-lesson-name" type="text" placeholder="例如：拍拍手"
              style="width:100%;border:2px solid var(--border);border-radius:8px;padding:9px 12px;font-size:.9rem;font-family:inherit;outline:none">
          </div>
        </div>
        <div style="margin-bottom:12px">
          <label style="font-size:.78rem;font-weight:800;color:var(--muted);display:block;margin-bottom:5px">生字</label>
          <input id="manual-chars" type="text" placeholder="例如：山水火土木" maxlength="30"
            style="width:100%;border:2px solid var(--border);border-radius:8px;padding:9px 12px;font-size:1.1rem;font-family:'Noto Sans TC',sans-serif;letter-spacing:4px;outline:none"
            oninput="updateManualPreview()">
          <div id="manual-chars-preview" style="margin-top:8px;min-height:24px"></div>
        </div>
        <div style="display:flex;gap:10px;align-items:center">
          <button class="btn-save-lesson" onclick="saveManualLesson()">
            <span>💾</span><span>新增課程</span>
          </button>
          <span id="manual-status" style="font-size:.82rem;font-weight:700"></span>
        </div>
      </div>

      <!-- 課程內容瀏覽 -->
      <div class="card" id="curriculum-browse-card" style="display:none">
        <div class="card-title">
          <span id="browse-version-name">課程內容</span>
          <button class="btn-danger" style="margin-left:auto;font-size:.75rem;padding:4px 10px" onclick="deleteVersion()">🗑 刪除此版本</button>
        </div>
        <div id="curriculum-content"></div>
      </div>
    </div>

    <!-- 學生詳細頁 -->
    <div id="panel-student" style="display:none">
      <button class="back-btn" onclick="backToOverview()">← 返回班級總覽</button>
      <div class="student-detail-header">
        <div class="student-avatar" id="detail-avatar"></div>
        <div class="student-name-wrap">
          <div class="name" id="detail-name"></div>
          <div class="sub" id="detail-sub"></div>
        </div>
        <div style="margin-left:auto;display:flex;gap:8px;align-items:center;flex-wrap:wrap">
          <button class="btn-danger" onclick="deleteStudent()">🗑 刪除學生</button>
        </div>
      </div>

      <!-- PIN 碼查詢 -->
      <div class="card" style="margin-bottom:14px">
        <div class="card-title">🔐 PIN 碼查詢</div>
        <div style="display:flex;align-items:center;gap:12px;flex-wrap:wrap">
          <span style="font-size:.88rem;font-weight:700;color:var(--gray)">學生的 PIN 碼：</span>
          <div class="pin-display-box" id="detail-pin">—</div>
          <span style="font-size:.8rem;color:var(--muted);font-weight:600">（可告知學生讓他登入）</span>
        </div>
      </div>

      <!-- 課程完成狀況 -->
      <div class="card" style="margin-bottom:14px">
        <div class="card-title">📚 課程完成狀況</div>
        <div id="detail-course-progress">
          <div class="loading-wrap"><div class="spinner"></div></div>
        </div>
      </div>

      <!-- 最近測驗紀錄 -->
      <div class="card">
        <div class="card-title">🕐 最近測驗紀錄</div>
        <div id="detail-activities">
          <div class="loading-wrap"><div class="spinner"></div></div>
        </div>
      </div>
    </div>

  </div>
</div>

<div id="toast"></div>

<script src="shared.js"></script>
<script src="admin/init.js"></script>
<script src="admin/overview.js"></script>
<script src="admin/students.js"></script>
<script src="admin/curriculum.js"></script>
</body>
</html>
