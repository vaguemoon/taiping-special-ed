<!DOCTYPE html>
<html lang="zh-TW">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<title>版面測試 方案三：動態 Sidebar</title>
<style>
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
body { font-family: 'Noto Sans TC', sans-serif; background: #eef5fc; min-height: 100vh; }

/* ── 核心：字格永遠是正方形，隨容器縮放 ── */
:root { --gap: 16px; }

/* ── Banner ── */
.banner {
  background: white; padding: 10px 16px;
  display: flex; align-items: center; gap: 10px;
  box-shadow: 0 2px 8px rgba(0,0,0,.06); flex-shrink: 0;
}
.banner-back {
  background: #e8f4fd; border: none; border-radius: 10px;
  padding: 7px 14px; font-size: .82rem; font-weight: 800;
  color: #2d6fa8; cursor: pointer;
}
.banner-title { font-size: .95rem; font-weight: 900; }
.banner-sub   { font-size: .72rem; color: #888; font-weight: 600; }

/* ── 主體 ── */
.page-learn { display: flex; flex-direction: column; min-height: calc(100vh - 48px); }

.learn-body {
  flex: 1; display: flex;
  flex-direction: column;   /* 手機直立：上下疊 */
  align-items: center;
  padding: var(--gap) var(--gap) 90px;
  gap: var(--gap);
}

/* 橫向：左右分欄 */
@media (orientation: landscape) {
  .learn-body {
    flex-direction: row;
    align-items: flex-start;
    justify-content: center;
  }
}

/* ── 左欄 ── */
.practice-left-col {
  display: flex; flex-direction: column;
  align-items: center; gap: 10px; flex-shrink: 0;
  /* 寬度 = 字格寬度，字格寬度由 .grid-box 決定 */
}

/* ── Tab Bar：跟字格同寬 ── */
.tab-bar {
  display: flex; border-radius: 14px; overflow: hidden;
  border: 2.5px solid #c8d8ec; background: #f5f9fd;
  align-self: stretch;   /* 跟著左欄拉滿 */
}
.tab-btn {
  flex: 1; padding: 11px 8px; border: none; background: transparent;
  font-size: .9rem; font-weight: 800; color: #8da4b8; cursor: pointer;
  border-radius: 11px;
}
.tab-btn.active { background: #4a90d9; color: white; }

/* ── 字格：關鍵：用 aspect-ratio + 寬度控制，高度自動跟 ── */
.grid-box {
  /* 手機直立：用視窗寬度的一定比例 */
  width: min(85vw, 420px);
  aspect-ratio: 1 / 1;
  border: 3px solid #c8d8ec; border-radius: 18px; background: white;
  display: flex; align-items: center; justify-content: center;
  background-image:
    linear-gradient(to right, rgba(200,216,236,.45) 1px, transparent 1px),
    linear-gradient(to bottom, rgba(200,216,236,.45) 1px, transparent 1px),
    linear-gradient(to right, #c8d8ec 1px, transparent 1px),
    linear-gradient(to bottom, #c8d8ec 1px, transparent 1px);
  background-size: 11.111% 11.111%, 11.111% 11.111%, 33.333% 33.333%, 33.333% 33.333%;
  flex-shrink: 0;
}

/* 橫向：字格改以視窗高度為基準 */
@media (orientation: landscape) {
  .grid-box {
    width: min(52vh, 400px);
  }
}
/* 桌機大螢幕：字格可以更大 */
@media (min-width: 1024px) {
  .grid-box {
    width: min(55vh, 460px);
  }
}

.grid-char {
  /* 字體大小 = 字格寬度的 62%，用 container 感知 */
  font-size: clamp(80px, 40vw, 280px);
  font-family: 'Noto Serif TC', serif; font-weight: 900;
  color: #ff8c42; line-height: 1;
}
@media (orientation: landscape) {
  .grid-char { font-size: clamp(80px, 28vh, 260px); }
}

/* ── 播放鍵：跟字格同寬，align-self: stretch 撐開 ── */
.btn-replay {
  align-self: stretch;
  padding: 11px; border: none; border-radius: 13px;
  background: #4a90d9; color: white; font-size: .9rem; font-weight: 800;
  cursor: pointer;
}

/* ── Sidebar：flex: 1 佔滿右側所有剩餘空間 ── */
.practice-sidebar {
  display: flex; flex-direction: column; gap: 10px;
  width: 100%;        /* 手機直立：滿版 */
  max-width: 500px;   /* 手機直立：不超過 500px */
}
@media (orientation: landscape) {
  .practice-sidebar {
    flex: 1;           /* 橫向：佔滿左欄右邊所有空間 */
    max-width: 520px;  /* 超寬螢幕不要無限拉開 */
    align-self: stretch;
  }
}

/* ── 資訊卡 ── */
.info-card {
  background: white; border-radius: 14px; border: 2px solid #e0edf8;
  box-shadow: 0 2px 8px rgba(0,0,0,.06); padding: 12px 14px;
  display: flex; flex-direction: column; gap: 8px;
}
.info-row { display: flex; gap: 0; }
.info-cell {
  flex: 1; display: flex; flex-direction: column;
  align-items: center; justify-content: center; padding: 6px 4px; gap: 4px;
}
.info-cell + .info-cell { border-left: 1.5px solid #d4e8f8; }
.info-label { font-size: .65rem; font-weight: 800; color: #8da4b8; letter-spacing: 1px; }
.info-value {
  font-size: clamp(1.1rem, 2.5vw, 1.6rem);
  font-weight: 900; font-family: 'Noto Serif TC', serif;
}

/* 注音 tabs */
.section-label { font-size: .65rem; font-weight: 800; color: #8da4b8; letter-spacing: 1px; }
.zhuyin-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 6px; }
.zy-tab {
  padding: 8px 4px; border: 2px solid #c8dff5; border-radius: 12px;
  background: #e8f4fd; color: #2d6fa8;
  font-size: clamp(.9rem, 2vw, 1.15rem);
  font-weight: 900; cursor: pointer; text-align: center;
  white-space: nowrap; font-family: 'Noto Serif TC', serif; transition: all .18s;
}
.zy-tab.active { background: #4a90d9; color: white; border-color: #4a90d9; }

/* 造詞 */
.word-chips { display: flex; flex-wrap: wrap; gap: 6px; }
.chip {
  background: #e8f4fd; border: 1.5px solid #bfdbfe; border-radius: 10px;
  padding: 5px 14px;
  font-size: clamp(.9rem, 2vw, 1.05rem);
  font-family: 'Noto Serif TC', serif; font-weight: 900; color: #2d6fa8; cursor: pointer;
}
.chip.active { background: #4a90d9; color: white; }

/* 字義 */
.def-text {
  font-size: clamp(.85rem, 1.8vw, 1rem);
  font-weight: 600; color: #333; line-height: 1.65; cursor: pointer;
}

/* ── 底部 ── */
.bottom-bar {
  position: fixed; bottom: 0; left: 0; right: 0;
  background: linear-gradient(to top, #eef5fc 60%, transparent);
  padding: 10px 16px 18px; text-align: center;
}
.btn-dict {
  padding: 14px 32px; border: none; border-radius: 50px;
  background: linear-gradient(135deg, #c22, #e74c3c); color: white;
  font-size: 1rem; font-weight: 900; cursor: pointer;
}

/* ── 標籤 ── */
.test-label {
  position: fixed; top: 54px; right: 0;
  background: #27ae60; color: white; font-size: .7rem; font-weight: 800;
  padding: 4px 10px; border-radius: 8px 0 0 8px; z-index: 100;
}
</style>
</head>
<body>

<div class="test-label">方案三：動態 Sidebar</div>

<div class="banner">
  <button class="banner-back">← 生字列表</button>
  <div>
    <div class="banner-title">筆順練習</div>
    <div class="banner-sub">看左邊筆順，在右邊格子照著寫</div>
  </div>
</div>

<div class="page-learn">
  <div class="learn-body">

    <!-- 左欄：字格 -->
    <div class="practice-left-col">
      <div class="tab-bar">
        <button class="tab-btn active">👁 範例筆順</button>
        <button class="tab-btn">✍️ 練習格</button>
      </div>
      <div class="grid-box">
        <span class="grid-char">樂</span>
      </div>
      <button class="btn-replay">▶ 再播一次筆順</button>
    </div>

    <!-- 右欄：Sidebar -->
    <div class="practice-sidebar">

      <!-- 部首 + 筆畫 -->
      <div class="info-card">
        <div class="info-row">
          <div class="info-cell">
            <div class="info-label">部首</div>
            <div class="info-value">木</div>
          </div>
          <div class="info-cell">
            <div class="info-label">筆畫</div>
            <div class="info-value">15</div>
          </div>
        </div>
      </div>

      <!-- 注音 -->
      <div class="info-card">
        <div class="section-label">注音</div>
        <div class="zhuyin-grid">
          <button class="zy-tab active">ㄌㄜˋ</button>
          <button class="zy-tab">ㄩㄝˋ</button>
          <button class="zy-tab">ㄧㄠˋ</button>
          <button class="zy-tab">ㄌㄜ</button>
        </div>
      </div>

      <!-- 造詞 -->
      <div class="info-card">
        <div class="section-label">造詞</div>
        <div class="word-chips">
          <span class="chip active">快樂</span>
          <span class="chip">歡樂</span>
          <span class="chip">樂事</span>
        </div>
      </div>

      <!-- 字義 -->
      <div class="info-card">
        <div class="section-label">字義</div>
        <div class="def-text">歡喜、愉悅。</div>
      </div>

    </div>
  </div>
</div>

<div class="bottom-bar">
  <button class="btn-dict">📝 開始默寫測驗</button>
</div>

</body>
</html>
