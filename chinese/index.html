<!DOCTYPE html>
<html lang="zh-TW">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<meta name="theme-color" content="#4a90d9">
<title>練字趣｜上學趣</title>
<link rel="manifest" href="/QuEDU/manifest.json">
<script src="https://cdn.jsdelivr.net/npm/hanzi-writer@3.5/dist/hanzi-writer.min.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-firestore-compat.js"></script>
<link rel="stylesheet" href="../shared/shared.css">
<script>
(function(){var M={blue:'#eef5fc,#4a90d9,#2d6fa8,#e8f4fd',green:'#edfbf4,#27ae60,#1e8449,#d5f5e3',
  purple:'#f3f0fc,#8e44ad,#6c3483,#e8daef',orange:'#fff8f0,#e67e22,#ca6f1e,#fdebd0',
  teal:'#f0fafa,#16a085,#0e6655,#d1f2eb',pink:'#fff0f8,#d63384,#a0255e,#fce4ec'};
  try{var v=(M[localStorage.getItem('theme')]||M.blue).split(','),r=document.documentElement.style;
  ['--bg','--blue','--blue-dk','--blue-lt'].forEach(function(k,i){r.setProperty(k,v[i]);});}catch(e){}})();
</script>
<link rel="stylesheet" href="chinese.css">
<link href="https://fonts.googleapis.com/css2?family=LXGW+WenKai+TC&display=swap" rel="stylesheet">

</head>
<body>

<div id="page-topbar">
  <button class="btn-back-hub" onclick="backToHub()">← 主頁</button>
  <button class="btn-back" id="topbar-back" onclick="goBack()">← 返回</button>
  <div id="topbar-title">✏️ <span>練字趣</span></div>
  <div id="topbar-mode-info" class="hidden">
    <span id="mode-icon" class="topbar-mode-icon">✏️</span>
    <span id="mode-title" class="topbar-mode-title">筆順練習</span>
    <span id="mode-sub" style="display:none"></span>
  </div>
  <div id="topbar-breadcrumb" class="hidden">
    <span id="tb-crumb-1" class="tb-crumb">出版社</span>
    <span class="tb-sep">›</span>
    <span id="tb-crumb-2" class="tb-crumb">冊次</span>
    <span class="tb-sep">›</span>
    <span id="tb-crumb-3" class="tb-crumb">課次</span>
  </div>
  <div id="topbar-student" onclick="toggleLogoutMenu()">
    <span id="topbar-avatar">🐣</span>
    <span id="topbar-name">—</span>
    <div id="topbar-logout-menu" class="logout-menu hidden">
      <button class="lm-btn lm-settings" onclick="goToSettings(event)">⚙️ 設定</button>
      <button class="lm-btn lm-achievement" onclick="goToAchievement(event)">🏆 成就</button>
      <button class="lm-btn lm-logout" onclick="sendLogout(event)">🚪 登出</button>
    </div>
  </div>
</div>

<div id="page-mode-select" class="page fill active">
  <button class="mode-choice mode-choice-left" onclick="showPage('curriculum')">
    <div class="mode-choice-icon">📚</div>
    <div class="mode-choice-title">選擇課程</div>
    <div class="mode-choice-sub">從課本選課文</div>
  </button>
  <div class="mode-choice-right">
    <button class="mode-choice mode-choice-assigned" onclick="openAssignedPage()">
      <div class="mode-choice-icon">📋</div>
      <div class="mode-choice-title">老師指派</div>
      <div class="mode-choice-sub">今日指定生字</div>
    </button>
    <button class="mode-choice mode-choice-custom" onclick="openCustomInputPage()">
      <div class="mode-choice-icon">✍️</div>
      <div class="mode-choice-title">自行輸入</div>
      <div class="mode-choice-sub">自訂想練習的字</div>
    </button>
  </div>
</div>

<div id="page-curriculum" class="page">

  <!-- Step 1：選出版社 -->
  <div class="curr-step" id="curr-step-1">
    <div class="curr-step-title">📖 選擇出版社</div>
    <div class="curr-ver-cards" id="version-cards">
      <div class="curr-loading">載入課程資料中…</div>
    </div>
  </div>

  <!-- Step 2：選冊次 -->
  <div class="curr-step" id="curr-step-2" style="display:none">
    <div class="curr-step-title" id="step2-title">選擇冊次</div>
    <div class="curr-book-cards" id="book-cards"></div>
  </div>

  <!-- Step 3：選課次 -->
  <div class="curr-step" id="curr-step-3" style="display:none">
    <div class="curr-step-title" id="step3-title">選擇課次</div>
    <div class="curr-lesson-cards" id="lesson-cards"></div>
  </div>

</div>

<div id="page-assigned" class="page">
  <div class="setup-page">
    <div class="setup-title">📋 今日老師指派生字</div>
    <div class="assigned-preview-card" id="assigned-preview">
      <div class="assigned-empty">載入中…</div>
    </div>
    <button class="btn-start" id="btn-start-assigned" disabled onclick="startAssignedLesson()">開始上課 →</button>
  </div>
</div>

<div id="page-custom-input" class="page">
  <div class="setup-page">
    <div class="setup-title">✍️ 自行輸入生字</div>
    <div class="custom-input-desc">輸入想練習的國字，重複的字只算一次，最多 20 字</div>
    <div class="custom-input-wrap">
      <textarea id="custom-chars-input" class="custom-chars-textarea"
        placeholder="例如：山水木火土金" maxlength="60"
        oninput="onCustomInputChange()"></textarea>
      <div class="custom-input-count" id="custom-input-count">0 / 20 字</div>
      <div class="assigned-preview-card custom-chars-preview" id="custom-chars-preview" style="min-height:64px">
        <div class="assigned-empty" id="custom-chars-empty">輸入國字後，會在這裡預覽</div>
      </div>
    </div>
    <button class="btn-start" id="btn-start-custom" disabled onclick="startCustomLesson()">開始練習 →</button>
  </div>
</div>

<div id="page-menu" class="page">
  <div class="menu-progress-bar" id="menu-progress-bar">
    <div class="menu-progress-title">📊 今日學習進度</div>
    <div class="progress-track">
      <div class="progress-seg mastered" id="prog-mastered" style="width:0%"></div>
      <div class="progress-seg new"      id="prog-new"      style="width:100%"></div>
    </div>
    <div class="progress-counts" id="prog-counts"></div>
  </div>
  <div class="menu-body" id="menu-body"></div>
  <div class="menu-exam-bar" id="menu-exam-bar">
  </div>
</div>

<div id="page-mode" class="page">
  <div class="mode-select-char" id="mode-select-char"></div>
  <div class="mode-select-hint">請選擇要做什麼</div>
  <div class="mode-select-btns">
    <button class="btn-mode-select btn-mode-practice" onclick="enterPracticeMode()">
      <span class="btn-mode-select-icon">✏️</span>
      <span class="btn-mode-select-title">練　習</span>
      <span class="btn-mode-select-sub">看筆順、照著寫</span>
    </button>
    <button class="btn-mode-select btn-mode-exam" onclick="enterExamMode()">
      <span class="btn-mode-select-icon">📝</span>
      <span class="btn-mode-select-title">測　驗</span>
      <span class="btn-mode-select-sub">靠自己的記憶寫</span>
    </button>
  </div>
</div>

<div id="page-learn" class="page">
  <div class="learn-body" id="learn-body">
    <div id="panel-practice">
      <div class="practice-wrap">
        <div class="practice-left-col">
          <div class="practice-tab-bar">
            <button class="practice-tab active" id="tab-ref"  onclick="switchPracticeTab('ref')">👁 範例筆順</button>
            <button class="practice-tab"        id="tab-quiz" onclick="switchPracticeTab('quiz')">✍️ 練習格</button>
          </div>
          <div class="practice-grid-wrap">
            <div id="ref-target"></div>
            <div class="quiz-box" id="quiz-target"></div>
          </div>
          <div class="practice-ctrl" id="quiz-controls" style="display:none">
            <button class="btn-ctrl btn-ctrl-clear" onclick="restartQuiz()">🔄 重寫</button>
          </div>
          <div id="ref-controls">
            <button class="btn-replay" onclick="playRef()">▶ 再播一次筆順</button>
          </div>
        </div>
        <div id="practice-sidebar">
          <div id="char-info-bar">
            <div class="char-info-item">
              <div class="char-info-label">部首</div>
              <div class="char-info-value" id="info-radical">⋯</div>
            </div>
            <div class="char-info-item">
              <div class="char-info-label">筆畫</div>
              <div class="char-info-value" id="info-strokes">⋯</div>
            </div>
          </div>
          <div id="char-zhuyin-bar">
            <div class="char-extra-label">注音</div>
            <div id="info-zhuyin-tabs"></div>
          </div>
          <div class="char-extra-bar" id="char-words-bar">
            <div class="char-extra-label">造詞</div>
            <div class="char-words-list" id="info-words"></div>
          </div>
          <div class="char-extra-bar" id="char-def-bar">
            <div class="char-extra-label">字義</div>
            <div class="char-def-text char-def-speakable" id="info-def"></div>
          </div>
        </div>
      </div>
    </div>
    <div id="panel-dict" style="display:none">
      <div class="dict-wrap">
        <div class="dict-info">
          <div class="dict-info-title">📝 默寫測驗</div>
          <div class="dict-info-sub">靠自己的記憶把這個字寫出來！<br>寫完後按下方的「交　卷」按鈕。</div>
        </div>
        <div class="dict-canvas-wrap" id="dict-canvas-wrap" style="position: relative;">
          <canvas id="dict-canvas"></canvas>
        </div>
        <div id="dict-ctrl-row" style="display:flex;gap:12px;justify-content:space-between;align-items:center;margin-top:12px">
          <button class="btn-ctrl btn-ctrl-clear" onclick="clearDictCanvas()">🗑 清除重寫</button>
          <button id="btn-dict-submit" onclick="submitDictation()"
            style="padding:13px 28px;border:none;border-radius:50px;background:linear-gradient(135deg,#c22,var(--red));color:white;font-size:1rem;font-weight:900;cursor:pointer;font-family:inherit;display:flex;align-items:center;gap:8px;box-shadow:0 4px 16px rgba(0,0,0,.2)">
            <span>✓</span><span>交　卷</span>
          </button>
        </div>
      </div>
    </div>
  </div>
  <div class="bottom-bar" id="bottom-bar"></div>
</div>

<div id="page-exam" class="page">
  <div class="exam-progress-bar-wrap"><div class="exam-progress-fill" id="exam-progress-fill"></div></div>
  <div class="learn-body" id="exam-body">
    <div id="exam-question-panel">
      <div class="exam-q-header">
        <div class="exam-q-num" id="exam-q-num">第 1 題 / 共 5 題</div>
        <div class="exam-q-hint">仔細聽，把你聽到的字寫出來</div>
      </div>
    <div class="exam-voice-wrap" style="flex-direction:row; align-items:center; gap:12px;">
      <button class="btn-exam-voice" id="btn-exam-voice" onclick="playExamVoice()">
        <span class="exam-voice-icon">🔊</span><span class="exam-voice-label">再聽一次</span>
      </button>
      <button class="btn-exam-voice" onclick="exitExam()">
        <span class="exam-voice-icon">📋</span><span class="exam-voice-label">返回生字列表</span>
      </button>
    </div>
      <div class="exam-box" id="exam-quiz-target"></div>
      <button class="btn-ctrl btn-ctrl-clear" style="margin-top:10px;width:var(--grid)" onclick="skipExamChar()">⏭ 我不會，跳過</button>
    </div>
    <div id="exam-round-panel" style="display:none">
      <div class="exam-score-header">
        <div class="exam-score-icon" id="round-icon">📊</div>
        <div class="exam-score-title" id="round-title">第 1 輪結算</div>
        <div class="exam-score-sub" id="round-sub"></div>
      </div>
      <div class="round-section" id="round-pass-section">
        <div class="round-section-title round-pass-title">✅ 這些字答對了！</div>
        <div class="exam-score-grid" id="round-pass-grid"></div>
      </div>
      <div class="round-section" id="round-fail-section">
        <div class="round-section-title round-fail-title">💪 這些字要再練！</div>
        <div class="exam-score-grid" id="round-fail-grid"></div>
      </div>
      <button class="btn-big btn-big-danger" id="btn-ctrl-next-round" onclick="doStartNextRound()" style="margin-top:8px">
        <span class="btn-big-icon">▶</span><span id="btn-ctrl-next-round-label">開始第 2 輪</span>
      </button>
    </div>
    <div id="exam-result-panel" style="display:none">
      <div class="exam-score-header">
        <div class="exam-score-icon" id="exam-score-icon">🎉</div>
        <div class="exam-score-title" id="exam-score-title">測驗完成！</div>
        <div class="exam-score-sub" id="exam-score-sub"></div>
      </div>
      <div class="exam-score-grid" id="exam-score-grid"></div>
      <div style="display:flex;gap:12px;flex-wrap:wrap;justify-content:center;margin-top:8px">
        <button class="btn-big btn-big-primary" style="max-width:260px" onclick="showPage('menu')">
          <span class="btn-big-icon">📋</span><span>回到生字選單</span>
        </button>
      </div>
    </div>
  </div>
</div>

<div id="page-settings" class="page">
  <div class="settings-body">
    <button class="btn-settings-back" onclick="goBack()">← 返回</button>
    <div class="settings-section-title">🐾 頭像</div>
    <div id="settings-avatar-grid"></div>
    <div class="settings-section-title">🎨 主題色系</div>
    <div id="theme-grid"></div>
    <div class="settings-section-title">🔊 音效</div>
    <div class="sound-row">
      <span class="sound-label">練習音效</span>
      <button class="sound-toggle-btn" id="sound-toggle-btn" onclick="toggleSound();applySound();">
        <div class="sound-toggle-knob" id="sound-toggle-knob"></div>
      </button>
    </div>
  </div>
</div>

<div id="page-achievement" class="page">
  <!-- 由 renderAchievementPage() 填充 -->
</div>

<div id="toast"></div>
<script src="../shared/shared.js"></script>
<script src="js/nav.js"></script>
<script src="js/state.js"></script>
<script src="js/voice.js"></script>
<script src="js/curriculum.js"></script>
<script src="js/menu.js"></script>
<script src="js/char-info.js"></script>
<script src="js/practice.js"></script>
<script src="js/dictation.js"></script>
<script src="js/exam.js"></script>
<script src="js/achievement.js"></script>
<script src="js/init.js"></script>
</body>
</html>
