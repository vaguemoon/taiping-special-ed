<!DOCTYPE html>
<html lang="zh-TW">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<title>國字學習系統｜太平國小</title>
<script src="https://cdn.jsdelivr.net/npm/hanzi-writer@3.5/dist/hanzi-writer.min.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-firestore-compat.js"></script>
<link rel="stylesheet" href="../shared.css">
<script>
(function(){var M={blue:'#eef5fc,#4a90d9,#2d6fa8,#e8f4fd',green:'#edfbf4,#27ae60,#1e8449,#d5f5e3',
  purple:'#f3f0fc,#8e44ad,#6c3483,#e8daef',orange:'#fff8f0,#e67e22,#ca6f1e,#fdebd0',
  teal:'#f0fafa,#16a085,#0e6655,#d1f2eb',pink:'#fff0f8,#d63384,#a0255e,#fce4ec'};
  try{var v=(M[localStorage.getItem('theme')]||M.blue).split(','),r=document.documentElement.style;
  ['--bg','--blue','--blue-dk','--blue-lt'].forEach(function(k,i){r.setProperty(k,v[i]);});}catch(e){}})();
</script>
<style>
/* ── chinese.html 專屬樣式（shared.css 已涵蓋共用部分）── */

:root {
  --purple: #9b7fe8;
  --grid: min(calc((100vw - 80px) / 2), calc(100vh - 320px), 420px);
}
@media(max-width:600px) {
  :root { --grid: min(calc(100vw - 48px), calc(100vh - 380px), 340px); }
}

/* ── 頂部列 ── */
#page-topbar {
  background: var(--white); box-shadow: 0 2px 12px rgba(0,0,0,.06);
  padding: 11px 16px; display: flex; align-items: center; gap: 10px;
  position: sticky; top: 0; z-index: 100;
}
#page-topbar .btn-back {
  background: var(--blue-lt); border: none; border-radius: 14px;
  padding: 10px 20px; font-size: 1rem; font-weight: 900; color: var(--blue-dk);
  cursor: pointer; font-family: 'Nunito', sans-serif;
  box-shadow: 0 2px 8px rgba(74,144,217,.18); white-space: nowrap;
  transition: all .15s; display: none;
}
#page-topbar .btn-back.show { display: block; }
#page-topbar .btn-back:active { transform: scale(.95); }
#topbar-title { font-size: .95rem; font-weight: 900; color: var(--blue-dk); }
#topbar-title span { color: var(--orange); }

/* ── 畫面切換 ── */
.page { display: none; }
.page.active { display: block; }
.page.fill { display: none; min-height: calc(100vh - 54px); }
.page.fill.active { display: flex; }

/* ── 首頁兩大卡 ── */
#page-mode-select { flex-direction: row; }
@media(max-width:600px) { #page-mode-select { flex-direction: column; } }
.mode-choice {
  flex: 1; display: flex; flex-direction: column; align-items: center;
  justify-content: center; gap: 24px; padding: 48px 32px;
  cursor: pointer; transition: all .18s; border: none;
  font-family: 'Nunito', 'Noto Sans TC', sans-serif;
}
.mode-choice:first-child { background: #e8f4fd; border-right: 1px solid var(--border); }
.mode-choice:last-child  { background: #fff4e6; }
@media(max-width:600px) { .mode-choice:first-child { border-right: none; border-bottom: 1px solid var(--border); } }
.mode-choice:hover  { filter: brightness(.95); transform: scale(1.01); }
.mode-choice:active { filter: brightness(.9);  transform: scale(.99); }
.mode-choice-icon  { font-size: 5rem; }
.mode-choice-title { font-size: 2rem; font-weight: 900; color: var(--text); }
.mode-choice-sub   { font-size: 1rem; font-weight: 600; color: var(--muted); }

/* ── 課程設定頁 ── */
.setup-page  { max-width: 680px; margin: 0 auto; padding: 28px 20px 80px; }
.setup-title { font-size: .8rem; font-weight: 800; color: var(--muted); letter-spacing: 1px; margin-bottom: 18px; }
.setup-card  { background: var(--white); border-radius: 18px; padding: 22px 20px; box-shadow: var(--shadow); margin-bottom: 16px; }
.curriculum-select {
  width: 100%; border: 2px solid #d4e8f8; border-radius: 10px;
  padding: 11px 14px; font-size: .95rem; font-family: 'Noto Sans TC', sans-serif;
  outline: none; background: white; color: var(--text); transition: border-color .2s; margin-bottom: 12px;
}
.curriculum-select:focus { border-color: var(--blue); }
.curriculum-row { display: flex; gap: 12px; }
.curriculum-row .curriculum-select { margin-bottom: 0; }
.lesson-chars-chip {
  display: inline-flex; align-items: center; gap: 4px;
  background: var(--blue-lt); border: 1.5px solid #bfdbfe; border-radius: 8px;
  padding: 5px 12px; font-size: 1.1rem; font-family: 'Noto Serif TC', serif;
  font-weight: 900; letter-spacing: 4px; color: var(--text); margin-top: 12px;
}
.char-input {
  width: 100%; border: 2.5px solid #d4e8f8; border-radius: 12px;
  padding: 12px 16px; font-size: 1.2rem; font-family: 'Noto Sans TC', sans-serif;
  outline: none; transition: border-color .2s; color: var(--text); letter-spacing: 4px;
}
.char-input:focus { border-color: var(--blue); }
.btn-start {
  width: 100%; padding: 16px; border: none; border-radius: 14px;
  background: linear-gradient(135deg, var(--blue), var(--blue-dk)); color: white;
  font-size: 1.1rem; font-weight: 900; cursor: pointer; transition: all .15s;
  font-family: 'Nunito', sans-serif; box-shadow: 0 4px 14px rgba(45,111,168,.35); margin-top: 16px;
}
.btn-start:disabled { opacity: .5; cursor: not-allowed; }
.btn-start:not(:disabled):active { transform: scale(.97); }

/* ── 生字選單 ── */
#page-menu { padding-bottom: 100px; }
.menu-progress-bar   { margin: 12px 16px 0; background: white; border-radius: 14px; padding: 14px 16px; box-shadow: var(--shadow); }
.menu-progress-title { font-size: .8rem; font-weight: 800; color: var(--muted); margin-bottom: 10px; }
.menu-body {
  padding: 16px; display: grid;
  grid-template-columns: repeat(auto-fill, minmax(130px, 160px));
  gap: 14px; align-items: start; grid-auto-rows: min-content;
  justify-content: start;
}
.char-card {
  background: var(--white); border-radius: var(--radius); padding: 20px 12px 16px;
  box-shadow: var(--shadow); display: flex; flex-direction: column; align-items: center;
  gap: 10px; cursor: pointer; transition: transform .18s, box-shadow .18s;
  border: 3px solid transparent; position: relative; overflow: hidden;
  user-select: none; align-self: start;
  min-height: 0;
  contain: layout; 
}
.char-card:active { transform: scale(.93); }
.char-card:hover  { transform: translateY(-4px); box-shadow: var(--shadow-lg); }
.char-card.mastered  { border-color: var(--green); }
.char-card.practiced { border-color: var(--yellow); }
.char-card-glyph  { font-size: 3.6rem; font-family: 'Noto Serif TC', serif; font-weight: 900; color: var(--text); line-height: 1; }
.char-card-status { font-size: .72rem; font-weight: 800; padding: 3px 10px; border-radius: 20px; }
.char-card-check  {
  position: absolute; top: 8px; right: 8px; width: 20px; height: 20px;
  border-radius: 50%; background: var(--green); color: white;
  font-size: .68rem; font-weight: 900; display: none; align-items: center; justify-content: center;
}
.char-card.mastered .char-card-check { display: flex; }
.menu-exam-bar {
  position: fixed; bottom: 0; left: 0; right: 0; padding: 10px 16px 20px;
  background: linear-gradient(to top, rgba(238,245,252,1) 60%, rgba(238,245,252,0)); z-index: 50;
}

/* ── 模式選擇頁 ── */
#page-mode { display: none; align-items: center; justify-content: center; flex-direction: column; gap: 24px; padding: 40px 20px; min-height: calc(100vh - 54px); }
#page-mode.active { display: flex; }
.mode-select-char {
  font-size: 6rem; font-family: 'Noto Serif TC', serif; font-weight: 900;
  color: var(--text); line-height: 1; background: white; border-radius: var(--radius);
  width: 160px; height: 160px; display: flex; align-items: center; justify-content: center;
  box-shadow: var(--shadow-lg); border: 3px solid #c8d8ec;
}
.mode-select-hint { font-size: 1rem; font-weight: 700; color: var(--muted); }

/* ── 學習頁 ── */
#page-learn { display: none; flex-direction: column; min-height: calc(100vh - 54px); }
#page-learn.active { display: flex; }
.btn-back-list {
  background: var(--blue-lt); border: none; border-radius: 12px; padding: 8px 14px;
  font-size: .82rem; font-weight: 900; color: var(--blue-dk); cursor: pointer;
  font-family: 'Nunito', 'Noto Sans TC', sans-serif; white-space: nowrap;
  flex-shrink: 0; transition: all .15s;
}
.btn-back-list:active { transform: scale(.95); }
.learn-body { flex: 1; overflow-y: auto; padding: 16px 16px 110px; display: flex; flex-direction: column; align-items: center; }

/* ── 九宮格（國字練習專用格線） ── */
.nine-grid, .quiz-box, .exam-box {
  border: 3px solid #c8d8ec; border-radius: 18px; background-color: white; flex-shrink: 0;
  background-image:
    linear-gradient(to right,  rgba(200,216,236,.45) 1px, transparent 1px),
    linear-gradient(to bottom, rgba(200,216,236,.45) 1px, transparent 1px),
    linear-gradient(to right,  #c8d8ec 1px, transparent 1px),
    linear-gradient(to bottom, #c8d8ec 1px, transparent 1px);
  background-size:
    calc(var(--grid)/9) calc(var(--grid)/9),
    calc(var(--grid)/9) calc(var(--grid)/9),
    33.333% 33.333%, 33.333% 33.333%;
}
.nine-grid, .quiz-box { width: var(--grid); height: var(--grid); }
.quiz-box { position: relative; cursor: crosshair; overflow: hidden; line-height: 0; }
.quiz-box svg { display: block; border-radius: 15px; }
.exam-box { width: var(--grid); height: var(--grid); position: relative; cursor: crosshair; overflow: hidden; line-height: 0; }
.exam-box svg { display: block; border-radius: 15px; }
#ref-target {
  border: 3px solid #c8d8ec; border-radius: 18px; background-color: white; overflow: visible;
  background-image:
    linear-gradient(to right,  rgba(200,216,236,.45) 1px, transparent 1px),
    linear-gradient(to bottom, rgba(200,216,236,.45) 1px, transparent 1px),
    linear-gradient(to right,  #c8d8ec 1px, transparent 1px),
    linear-gradient(to bottom, #c8d8ec 1px, transparent 1px);
  background-size:
    calc(var(--grid)/9) calc(var(--grid)/9),
    calc(var(--grid)/9) calc(var(--grid)/9),
    33.333% 33.333%, 33.333% 33.333%;
}
#ref-target > * { position: relative; z-index: 1; }

/* ── 練習模式 ── */
.practice-wrap { display: flex; flex-direction: column; align-items: center; gap: 10px; width: 100%; }
.practice-tab-bar {
  display: flex; width: var(--grid); border-radius: 14px; overflow: hidden;
  border: 2.5px solid #c8d8ec; background: #f5f9fd; flex-shrink: 0;
}
.practice-tab {
  flex: 1; padding: 12px 8px; border: none; background: transparent;
  font-family: 'Nunito', 'Noto Sans TC', sans-serif; font-size: .92rem; font-weight: 800;
  color: var(--muted); cursor: pointer; transition: all .2s; border-radius: 11px;
  display: flex; align-items: center; justify-content: center; gap: 5px;
}
.practice-tab.active { background: var(--blue); color: white; box-shadow: 0 2px 8px rgba(74,144,217,.35); }
.practice-grid-wrap { position: relative; width: var(--grid); height: var(--grid); flex-shrink: 0; }
.practice-grid-wrap > * { position: absolute; top: 0; left: 0; width: var(--grid); height: var(--grid); transition: opacity .25s ease; }
.practice-grid-wrap > .hidden-panel { opacity: 0; pointer-events: none; }
.btn-replay {
  display: flex; align-items: center; justify-content: center; gap: 8px;
  padding: 10px 0; border-radius: 13px; border: none; width: var(--grid);
  background: var(--blue); color: white;
  font-family: 'Nunito', 'Noto Sans TC', sans-serif; font-size: .92rem; font-weight: 800;
  cursor: pointer; transition: all .15s;
}
.btn-replay:active { transform: scale(.97); background: var(--blue-dk); }
.feedback-box { width: var(--grid); }
.practice-ctrl { display: flex; gap: 10px; width: var(--grid); margin-top: 4px; flex-wrap: wrap; }
.practice-ctrl .btn-ctrl { flex: 1; min-width: 100px; }

/* ── 默寫模式 ── */
.dict-wrap  { display: flex; flex-direction: column; align-items: center; gap: 14px; width: 100%; }
.dict-info  { background: var(--white); border-radius: 14px; padding: 14px 20px; box-shadow: var(--shadow); width: 100%; max-width: 600px; text-align: center; }
.dict-info-title { font-size: .95rem; font-weight: 900; margin-bottom: 4px; }
.dict-info-sub   { font-size: .82rem; color: var(--muted); font-weight: 600; line-height: 1.7; }
.dict-canvas-wrap {
  width: var(--grid); height: var(--grid);
  border: 3px solid #c8d8ec; border-radius: 18px; background-color: white;
  position: relative; overflow: hidden; flex-shrink: 0;
  background-image:
    linear-gradient(to right,  rgba(200,216,236,.45) 1px, transparent 1px),
    linear-gradient(to bottom, rgba(200,216,236,.45) 1px, transparent 1px),
    linear-gradient(to right,  #c8d8ec 1px, transparent 1px),
    linear-gradient(to bottom, #c8d8ec 1px, transparent 1px);
  background-size:
    calc(var(--grid)/9) calc(var(--grid)/9),
    calc(var(--grid)/9) calc(var(--grid)/9),
    33.333% 33.333%, 33.333% 33.333%;
}
#dict-canvas { display: block; touch-action: none; cursor: crosshair; width: 100%; height: 100%; }
.dict-ctrl   { display: flex; gap: 10px; }
.compare-wrap { display: flex; gap: 12px; align-items: flex-start; justify-content: center; flex-wrap: nowrap; width: 100%; }
.compare-col  { display: flex; flex-direction: column; align-items: center; gap: 5px; flex-shrink: 0; }
.compare-lbl  { font-size: .78rem; font-weight: 800; color: var(--muted); }
.compare-student-wrap {
  width: 140px; height: 140px; border: 3px solid #c8d8ec; border-radius: 14px;
  overflow: hidden; flex-shrink: 0; background-color: white;
  background-image:
    linear-gradient(to right,  rgba(200,216,236,.45) 1px, transparent 1px),
    linear-gradient(to bottom, rgba(200,216,236,.45) 1px, transparent 1px),
    linear-gradient(to right,  #c8d8ec 1px, transparent 1px),
    linear-gradient(to bottom, #c8d8ec 1px, transparent 1px);
  background-size: 33.333% 33.333%, 33.333% 33.333%, 33.333% 33.333%, 33.333% 33.333%;
}
#compare-student { display: block; width: 140px; height: 140px; }
.compare-ref-wrap {
  width: 140px; height: 140px; border: 3px solid #c8d8ec; border-radius: 14px;
  background-color: white; flex-shrink: 0; display: flex; align-items: center; justify-content: center;
  background-image: linear-gradient(to right, #c8d8ec 1px, transparent 1px), linear-gradient(to bottom, #c8d8ec 1px, transparent 1px);
  background-size: 33.333% 33.333%, 33.333% 33.333%;
}
#compare-ref { font-family: 'Noto Serif TC', serif; font-weight: 900; color: var(--text); line-height: 1; font-size: 90px; }
.compare-arrow { font-size: 1.4rem; color: var(--muted); align-self: center; flex-shrink: 0; }
.self-eval-title { font-size: .92rem; font-weight: 900; color: var(--text); text-align: center; }
.self-eval-btns  { display: flex; gap: 10px; flex-wrap: wrap; justify-content: center; width: 100%; }
.btn-eval {
  flex: 1; min-width: 120px; padding: 20px 10px; border-radius: 20px; border: none;
  font-family: 'Nunito', 'Noto Sans TC', sans-serif; font-size: 1.3rem; font-weight: 900;
  cursor: pointer; transition: all .15s; display: flex; flex-direction: column;
  align-items: center; gap: 8px; box-shadow: 0 4px 16px rgba(0,0,0,.12);
}
.btn-eval:active    { transform: scale(.93); }
.btn-eval-icon      { font-size: 2.6rem; }
.btn-eval-great     { background: #e8f8ee; color: var(--green-dk); border: 3px solid var(--green); }
.btn-eval-retry     { background: #fff0f0; color: var(--red);      border: 3px solid #ffb3b3; }
.result-retry-btn   { padding: 11px 22px; border-radius: 12px; border: none; font-family: 'Nunito', 'Noto Sans TC', sans-serif; font-size: .92rem; font-weight: 800; cursor: pointer; transition: all .15s; background: #fff3e0; color: var(--orange); }
.result-retry-btn:active { transform: scale(.96); }

/* ── Toast 位置覆寫（本頁置頂，覆蓋 shared.css 的置底） ── */
#toast { top: 70px; bottom: auto; transform: translateX(-50%) translateY(-16px); }
#toast.show { transform: translateX(-50%) translateY(0); }

/* ── 測驗頁 ── */
#page-exam { display: none; flex-direction: column; min-height: calc(100vh - 54px); }
#page-exam.active { display: flex; }
.exam-progress-bar-wrap { height: 8px; background: #dde8f5; flex-shrink: 0; }
.exam-progress-fill { height: 100%; background: linear-gradient(90deg, var(--blue), var(--purple)); transition: width .4s ease; border-radius: 0 4px 4px 0; }
.exam-q-header   { text-align: center; margin-bottom: 14px; }
.exam-q-num      { font-size: 1rem; font-weight: 900; color: var(--blue-dk); margin-bottom: 4px; }
.exam-q-hint     { font-size: .82rem; font-weight: 600; color: var(--muted); }
.exam-voice-wrap { display: flex; flex-direction: column; align-items: center; gap: 8px; margin: 4px 0 16px; }
.btn-exam-voice  {
  display: flex; align-items: center; gap: 12px;
  background: linear-gradient(135deg, var(--blue), var(--blue-dk));
  color: white; border: none; border-radius: 20px; padding: 16px 36px;
  cursor: pointer; transition: all .15s; box-shadow: 0 4px 16px rgba(74,144,217,.4);
  font-family: 'Nunito', 'Noto Sans TC', sans-serif;
}
.btn-exam-voice:active  { transform: scale(.95); }
.btn-exam-voice.playing { background: linear-gradient(135deg, #389959, #52c97a); }
.exam-voice-icon  { font-size: 2rem; }
.exam-voice-label { font-size: 1.1rem; font-weight: 900; }
.exam-voice-hint  { font-size: .8rem; font-weight: 700; color: var(--muted); }
.exam-score-header { text-align: center; padding: 20px 0 16px; }
.exam-score-icon   { font-size: 3.5rem; margin-bottom: 8px; }
.exam-score-title  { font-size: 1.5rem; font-weight: 900; color: var(--text); margin-bottom: 6px; }
.exam-score-sub    { font-size: .95rem; font-weight: 700; color: var(--muted); }
.exam-score-item {
  background: white;
  border-radius: 16px;
  padding: 16px 12px;
  display: flex;
  flex-direction: column;
  align-items: center;
  gap: 6px;
  box-shadow: var(--shadow);
  border: 2.5px solid transparent;
}
.exam-score-item.pass { border-color: var(--green); }
.exam-score-item.fail { border-color: #ffb3b3; }
.exam-score-grid {
  display: grid;
  grid-template-columns: repeat(auto-fill, minmax(100px, 1fr));
  gap: 12px;
  width: 100%;
}
.exam-topbar {
  display: flex;
  align-items: center;
  gap: 10px;
  padding: 0 12px 0 0;
  background: white;
  box-shadow: 0 2px 8px rgba(0,0,0,.05);
  flex-shrink: 0;
}
.exam-topbar .exam-progress-bar-wrap {
  height: 8px;
  flex: 1;
}
.exam-score-glyph { font-size: 3rem; font-family: 'Noto Serif TC', serif; font-weight: 900; line-height: 1; }
.exam-score-label { font-size: .75rem; font-weight: 800; padding: 3px 10px; border-radius: 20px; }
.round-section       { width: 100%; margin-bottom: 8px; }
.round-section-title { font-size: .92rem; font-weight: 900; padding: 8px 14px; border-radius: 10px; margin-bottom: 10px; text-align: center; }
.round-pass-title    { background: #e8f8ee; color: var(--green-dk); }
.round-fail-title    { background: #fff0f0; color: var(--red); }

/* ── 測驗按鈕動畫（本頁專屬） ── */
@keyframes examBtnPulse {
  0%  { transform: scale(1);    box-shadow: 0 5px 18px rgba(0,0,0,.14); }
  30% { transform: scale(1.04); box-shadow: 0 0 0 10px rgba(255,180,0,.5), 0 0 32px rgba(255,140,0,.55); }
  60% { transform: scale(1);    box-shadow: 0 0 0 20px rgba(255,180,0,0); }
  100%{ transform: scale(1);    box-shadow: 0 5px 18px rgba(0,0,0,.14); }
}
@keyframes examBtnBreath {
  0%,100% { transform: scale(1);    box-shadow: 0 5px 18px rgba(0,0,0,.14); }
  50%     { transform: scale(1.03); box-shadow: 0 0 24px rgba(255,140,0,.5); }
}
@keyframes examBtnShine {
  0%,100% { background: linear-gradient(135deg, #c22, var(--red)); }
  50%     { background: linear-gradient(135deg, #ff6b00, #ffb300); }
}
.btn-exam-pulse   { animation: examBtnPulse 0.7s ease 3, examBtnShine 0.7s ease 3; }
.btn-exam-breathe { animation: examBtnBreath 1.8s ease-in-out infinite, examBtnShine 3.6s ease-in-out infinite; }
</style>

</head>
<body>

<div id="page-topbar">
  <button class="btn-back" id="topbar-back" onclick="goBack()">← 返回</button>
  <div id="topbar-title">✏️ <span>國字學習系統</span></div>
</div>

<div id="page-mode-select" class="page fill active">
  <button class="mode-choice" onclick="showPage('curriculum')">
    <div class="mode-choice-icon">📚</div>
    <div class="mode-choice-title">選擇課程</div>
    <div class="mode-choice-sub">從課本選課文</div>
  </button>
  <button class="mode-choice" onclick="showPage('free')">
    <div class="mode-choice-icon">✏️</div>
    <div class="mode-choice-title">自由練習</div>
    <div class="mode-choice-sub">老師指定生字</div>
  </button>
</div>

<div id="page-curriculum" class="page">
  <div class="setup-page">
    <div class="setup-title">📖 選擇今天的課程</div>
    <div class="setup-card">
      <select class="curriculum-select" id="version-select" onchange="onVersionChange()">
        <option value="">－ 請選擇版本 －</option>
      </select>
      <div class="curriculum-row">
        <select class="curriculum-select" id="book-select" onchange="onBookChange()" disabled>
          <option value="">－ 選擇冊 －</option>
        </select>
        <select class="curriculum-select" id="lesson-select" onchange="onLessonChange()" disabled>
          <option value="">－ 選擇課 －</option>
        </select>
      </div>
      <div id="lesson-chars-preview"></div>
    </div>
    <button class="btn-start" id="btn-start-curriculum" disabled onclick="startCurriculumLesson()">開始上課 →</button>
  </div>
</div>

<div id="page-free" class="page">
  <div class="setup-page">
    <div class="setup-title">✏️ 輸入今天要練習的字</div>
    <div class="setup-card">
      <input class="char-input" id="char-input" type="text" placeholder="例如：山水火土木" maxlength="20" oninput="onCharInput()" value="">
      <div style="font-size:.8rem;color:var(--muted);margin-top:8px;font-weight:600">最多 20 個字</div>
    </div>
    <button class="btn-start" id="btn-start-free" disabled onclick="startLesson()">開始上課 →</button>
  </div>
</div>

<div id="page-menu" class="page">
  <div class="menu-progress-bar" id="menu-progress-bar">
    <div class="menu-progress-title">📊 今日學習進度</div>
    <div class="progress-track">
      <div class="progress-seg mastered"  id="prog-mastered"  style="width:0%"></div>
      <div class="progress-seg practiced" id="prog-practiced" style="width:0%"></div>
      <div class="progress-seg new"       id="prog-new"       style="width:100%"></div>
    </div>
    <div class="progress-counts" id="prog-counts"></div>
  </div>
  <div class="menu-body" id="menu-body"></div>
  <div class="menu-exam-bar">
    <button class="btn-big btn-big-danger" id="btn-start-exam" onclick="startFullExam()">
      <span class="btn-big-icon">📝</span><span>開始今日測驗</span>
    </button>
  </div>
</div>

<div id="page-mode" class="page">
  <div class="mode-select-char" id="mode-select-char"></div>
  <div class="mode-select-hint">請選擇要做什麼</div>
  <div class="mode-select-btns">
    <button class="btn-mode-select btn-mode-practice" onclick="enterPracticeMode()">
      <span class="btn-mode-select-icon">✏️</span>
      <span class="btn-mode-select-title">練　習</span>
      <span class="btn-mode-select-sub">看筆順、照著寫</span>
    </button>
    <button class="btn-mode-select btn-mode-exam" onclick="enterExamMode()">
      <span class="btn-mode-select-icon">📝</span>
      <span class="btn-mode-select-title">測　驗</span>
      <span class="btn-mode-select-sub">靠自己的記憶寫</span>
    </button>
  </div>
</div>

<div id="page-learn" class="page">
  <div class="mode-banner">
    <button class="btn-back-list" onclick="showPage('menu')">← 生字列表</button>
    <div class="mode-icon" id="mode-icon">✏️</div>
    <div>
      <div class="mode-info-title" id="mode-title">筆順練習</div>
      <div class="mode-info-sub"  id="mode-sub">看左邊筆順，在右邊格子照著寫</div>
    </div>
  </div>
  <div class="learn-body" id="learn-body">
    <div id="panel-practice">
      <div class="practice-wrap">
        <div class="practice-tab-bar">
          <button class="practice-tab active" id="tab-ref"  onclick="switchPracticeTab('ref')">👁 範例筆順</button>
          <button class="practice-tab"        id="tab-quiz" onclick="switchPracticeTab('quiz')">✍️ 練習格</button>
        </div>
        <div class="practice-grid-wrap">
          <div id="ref-target"></div>
          <div class="quiz-box" id="quiz-target"></div>
        </div>
        <div class="feedback-box fb-idle" id="feedback-box">照著左邊的筆順<br>在右邊一筆一筆寫！</div>
        <div class="practice-ctrl" id="quiz-controls" style="display:none">
          <button class="btn-ctrl btn-ctrl-clear" onclick="restartQuiz()">🔄 重寫</button>
          <button class="btn-ctrl btn-ctrl-next" id="btn-next-char" disabled onclick="nextChar()">下一字 →</button>
        </div>
        <div id="ref-controls">
          <button class="btn-replay" onclick="playRef()">▶ 再播一次筆順</button>
        </div>
      </div>
    </div>
    <div id="panel-dict" style="display:none">
      <div class="dict-wrap">
        <div class="dict-info">
          <div class="dict-info-title">📝 默寫測驗</div>
          <div class="dict-info-sub">靠自己的記憶把這個字寫出來！<br>寫完後按下方的「交　卷」按鈕。</div>
        </div>
        <div class="dict-canvas-wrap" id="dict-canvas-wrap">
          <canvas id="dict-canvas"></canvas>
        </div>
        <div id="dict-ctrl-row" style="display:flex;gap:12px;justify-content:space-between;align-items:center;margin-top:12px">
          <button class="btn-ctrl btn-ctrl-clear" onclick="clearDictCanvas()">🗑 清除重寫</button>
          <button id="btn-dict-submit" onclick="submitDictation()"
            style="padding:13px 28px;border:none;border-radius:50px;background:linear-gradient(135deg,#c22,var(--red));color:white;font-size:1rem;font-weight:900;cursor:pointer;font-family:inherit;display:flex;align-items:center;gap:8px;box-shadow:0 4px 16px rgba(0,0,0,.2)">
            <span>✓</span><span>交　卷</span>
          </button>
        </div>
        <div class="result-panel" id="result-panel">
          <div style="font-size:1rem;font-weight:900;text-align:center">✏️ 對照結果</div>
          <div class="compare-wrap">
            <div class="compare-col">
              <div class="compare-lbl">✍️ 你寫的</div>
              <div class="compare-student-wrap"><canvas id="compare-student"></canvas></div>
            </div>
            <div class="compare-arrow">↔</div>
            <div class="compare-col">
              <div class="compare-lbl">📖 正確字形</div>
              <div class="compare-ref-wrap"><div id="compare-ref"></div></div>
            </div>
          </div>
          <div class="self-eval-title">你覺得寫得像嗎？</div>
          <div class="self-eval-btns">
            <button class="btn-eval btn-eval-great" onclick="selfEval('great')">
              <span class="btn-eval-icon">⭕</span><span>像！</span>
            </button>
            <button class="btn-eval btn-eval-retry" onclick="selfEval('retry')">
              <span class="btn-eval-icon">✖</span><span>不像</span>
            </button>
          </div>
          <div id="after-eval" style="display:none;flex-direction:column;align-items:center;gap:12px;width:100%">
            <div id="eval-verdict" style="border-radius:14px;padding:14px 20px;text-align:center;font-size:1.2rem;font-weight:900;width:100%"></div>
            <button class="btn-big btn-big-primary" id="btn-dict-next" onclick="showPage('menu')" style="max-width:320px;font-size:1.1rem">
              <span class="btn-big-icon">📋</span><span>回到列表</span>
            </button>
          </div>
          <div id="retry-only-btn" style="display:none;width:100%">
            <button class="btn-big btn-big-danger" onclick="switchToPractice()" style="font-size:1.1rem">
              <span class="btn-big-icon">✏️</span><span>再練習一次</span>
            </button>
          </div>
        </div>
      </div>
    </div>
  </div>
  <div class="bottom-bar" id="bottom-bar"></div>
</div>

<div id="page-exam" class="page">
  <div class="exam-progress-bar-wrap"><div class="exam-progress-fill" id="exam-progress-fill"></div></div>
  <div class="learn-body" id="exam-body">
    <div id="exam-question-panel">
      <div class="exam-q-header">
        <div class="exam-q-num" id="exam-q-num">第 1 題 / 共 5 題</div>
        <div class="exam-q-hint">仔細聽，把你聽到的字寫出來</div>
      </div>
    <div class="exam-voice-wrap" style="flex-direction:row; align-items:center; gap:12px;">
      <button class="btn-exam-voice" id="btn-exam-voice" onclick="playExamVoice()">
        <span class="exam-voice-icon">🔊</span><span class="exam-voice-label">再聽一次</span>
      </button>
      <button class="btn-exam-voice" onclick="showPage('menu')">
  <span class="exam-voice-icon">📋</span><span class="exam-voice-label">返回生字列表</span>
</button>
    </div>
      <div class="exam-box" id="exam-quiz-target"></div>
      <button class="btn-ctrl btn-ctrl-clear" style="margin-top:10px;width:var(--grid)" onclick="skipExamChar()">⏭ 我不會，跳過</button>
    </div>
    <div id="exam-round-panel" style="display:none">
      <div class="exam-score-header">
        <div class="exam-score-icon" id="round-icon">📊</div>
        <div class="exam-score-title" id="round-title">第 1 輪結算</div>
        <div class="exam-score-sub" id="round-sub"></div>
      </div>
      <div class="round-section" id="round-pass-section">
        <div class="round-section-title round-pass-title">✅ 這些字答對了！</div>
        <div class="exam-score-grid" id="round-pass-grid"></div>
      </div>
      <div class="round-section" id="round-fail-section">
        <div class="round-section-title round-fail-title">💪 這些字要再練！</div>
        <div class="exam-score-grid" id="round-fail-grid"></div>
      </div>
      <button class="btn-big btn-big-danger" id="btn-ctrl-next-round" onclick="doStartNextRound()" style="margin-top:8px">
        <span class="btn-big-icon">▶</span><span id="btn-ctrl-next-round-label">開始第 2 輪</span>
      </button>
    </div>
    <div id="exam-result-panel" style="display:none">
      <div class="exam-score-header">
        <div class="exam-score-icon" id="exam-score-icon">🎉</div>
        <div class="exam-score-title" id="exam-score-title">測驗完成！</div>
        <div class="exam-score-sub" id="exam-score-sub"></div>
      </div>
      <div class="exam-score-grid" id="exam-score-grid"></div>
      <div style="display:flex;gap:12px;flex-wrap:wrap;justify-content:center;margin-top:8px">
        <button class="btn-big btn-big-primary" style="max-width:260px" onclick="showPage('menu')">
          <span class="btn-big-icon">📋</span><span>回到生字選單</span>
        </button>
      </div>
    </div>
  </div>
</div>

<div id="toast"></div>
<script src="../shared.js"></script>
<script src="js/nav.js"></script>
<script src="js/state.js"></script>
<script src="js/voice.js"></script>
<script src="js/curriculum.js"></script>
<script src="js/menu.js"></script>
<script src="js/practice.js"></script>
<script src="js/dictation.js"></script>
<script src="js/exam.js"></script>
<script src="js/init.js"></script>
</body>
</html>
