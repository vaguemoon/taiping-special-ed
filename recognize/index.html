<!DOCTYPE html>
<html lang="zh-TW">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<meta name="theme-color" content="#4a90d9">
<title>認字趣｜上學趣</title>
<link rel="manifest" href="/QuEDU/manifest.json">
<script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-firestore-compat.js"></script>
<link rel="stylesheet" href="../shared/shared.css">
<script>
(function(){var M={blue:'#eef5fc,#4a90d9,#2d6fa8,#e8f4fd',green:'#edfbf4,#27ae60,#1e8449,#d5f5e3',
  purple:'#f3f0fc,#8e44ad,#6c3483,#e8daef',orange:'#fff8f0,#e67e22,#ca6f1e,#fdebd0',
  teal:'#f0fafa,#16a085,#0e6655,#d1f2eb',pink:'#fff0f8,#d63384,#a0255e,#fce4ec'};
  try{var v=(M[localStorage.getItem('theme')]||M.blue).split(','),r=document.documentElement.style;
  ['--bg','--blue','--blue-dk','--blue-lt'].forEach(function(k,i){r.setProperty(k,v[i]);});}catch(e){}})();
</script>
<link rel="stylesheet" href="recognize.css">
<link href="https://fonts.googleapis.com/css2?family=LXGW+WenKai+TC&family=Noto+Serif+TC:wght@400;700;900&display=swap" rel="stylesheet">
</head>
<body>

<!-- ── 頂端列 ── -->
<div id="page-topbar">
  <button class="btn-back-hub" onclick="backToHub()">← 主頁</button>
  <button class="btn-back hidden" id="topbar-back" onclick="goBack()">← 返回</button>
  <div id="topbar-title">🔊 <span>認字趣</span></div>
  <div id="topbar-breadcrumb" class="hidden">
    <span id="tb-crumb-1" class="tb-crumb">出版社</span>
    <span class="tb-sep">›</span>
    <span id="tb-crumb-2" class="tb-crumb">冊次</span>
    <span class="tb-sep">›</span>
    <span id="tb-crumb-3" class="tb-crumb">課次</span>
  </div>
  <div id="topbar-student" onclick="toggleLogoutMenu()">
    <span id="topbar-avatar">🐣</span>
    <span id="topbar-name">—</span>
    <div id="topbar-logout-menu" class="logout-menu hidden">
      <button class="lm-btn lm-settings" onclick="goToSettings(event)">⚙️ 設定</button>
      <button class="lm-btn lm-logout"   onclick="sendLogout(event)">🚪 登出</button>
    </div>
  </div>
</div>

<!-- ── 課程選擇 ── -->
<div id="page-curriculum" class="page active">

  <div class="curr-step" id="curr-step-1">
    <div class="curr-step-title">📖 選擇出版社</div>
    <div class="curr-ver-cards" id="version-cards">
      <div class="curr-loading">載入課程資料中…</div>
    </div>
  </div>

  <div class="curr-step" id="curr-step-2" style="display:none">
    <div class="curr-step-title" id="step2-title">選擇冊次</div>
    <div class="curr-book-cards" id="book-cards"></div>
  </div>

  <div class="curr-step" id="curr-step-3" style="display:none">
    <div class="curr-step-title" id="step3-title">選擇課次</div>
    <div class="curr-lesson-cards" id="lesson-cards"></div>
  </div>

</div>

<!-- ── 字詞列表 ── -->
<div id="page-menu" class="page">
  <div class="menu-progress-bar" id="menu-progress-bar">
    <div class="menu-progress-title">📊 本課學習進度</div>
    <div class="progress-track">
      <div class="progress-seg mastered"  id="prog-mastered"  style="width:0%"></div>
      <div class="progress-seg practiced" id="prog-practiced" style="width:0%"></div>
      <div class="progress-seg new"       id="prog-new"       style="width:100%"></div>
    </div>
    <div class="progress-counts" id="prog-counts"></div>
  </div>
  <div class="menu-body" id="menu-body"></div>
  <div class="menu-action-bar" id="menu-action-bar"></div>
</div>

<!-- ── 練習模式 ── -->
<div id="page-practice" class="page">
  <div class="q-progress-bar-wrap"><div class="q-progress-fill" id="prac-progress-fill"></div></div>
  <div class="q-panel">
    <div class="q-header">
      <span class="q-num" id="prac-q-num">第 1 題 / 共 ? 題</span>
      <span class="q-type" id="prac-q-type">聽音選字</span>
    </div>
    <div class="play-btn-wrap">
      <button class="play-btn" onclick="replayPracticeAudio()">
        <span class="play-btn-icon">🔊</span><span>再聽一次</span>
      </button>
    </div>
    <div class="option-grid" id="prac-option-grid"></div>
    <button class="btn-result btn-result-secondary" style="margin-top:4px"
      onclick="showPage('menu')">📋 離開練習</button>
  </div>
</div>

<!-- ── 練習結果 ── -->
<div id="page-practice-result" class="page">
  <div class="result-panel">
    <div class="result-icon" id="prac-result-icon">🎉</div>
    <div class="result-title" id="prac-result-title">練習完成！</div>
    <div class="result-sub"   id="prac-result-sub"></div>
    <div class="result-btns">
      <button class="btn-result btn-result-primary" onclick="startPractice()">🔄 再練一次</button>
      <button class="btn-result btn-result-secondary" onclick="showPage('menu')">📋 回到字詞列表</button>
    </div>
  </div>
</div>

<!-- ── 測驗模式 ── -->
<div id="page-exam" class="page">
  <div class="q-progress-bar-wrap"><div class="q-progress-fill" id="exam-progress-fill"></div></div>
  <div class="q-panel">
    <div class="q-header">
      <span class="q-num" id="exam-q-num">第 1 題 / 共 ? 題</span>
      <span class="q-round" id="exam-round-label">Round 1</span>
      <span class="q-type"  id="exam-q-type">聽音選字</span>
    </div>
    <div class="play-btn-wrap">
      <button class="play-btn" onclick="replayExamAudio()">
        <span class="play-btn-icon">🔊</span><span>再聽一次</span>
      </button>
    </div>
    <div class="option-grid" id="exam-option-grid"></div>
  </div>
</div>

<!-- ── 每輪結算畫面 ── -->
<div id="page-exam-round-result" class="page">
  <div class="round-panel">
    <div class="round-icon" id="round-icon">📊</div>
    <div class="round-title" id="round-title">Round 1 結算</div>
    <div class="round-sub"   id="round-sub"></div>
    <div class="round-sections">
      <div class="round-section" id="round-pass-section">
        <div class="round-section-title round-pass-title">✅ 答對了！</div>
        <div class="round-grid" id="round-pass-grid"></div>
      </div>
      <div class="round-section" id="round-fail-section">
        <div class="round-section-title round-fail-title">💪 再試試看！</div>
        <div class="round-grid" id="round-fail-grid"></div>
      </div>
    </div>
    <button class="btn-result btn-result-green" id="btn-next-round" onclick="startNextRound()">
      開始 Round 2 →
    </button>
    <button class="btn-result btn-result-secondary" onclick="showPage('menu')">📋 回到字詞列表</button>
  </div>
</div>

<!-- ── 測驗最終結果 ── -->
<div id="page-exam-result" class="page">
  <div class="result-panel">
    <div class="result-icon" id="exam-result-icon">🎉</div>
    <div class="result-title" id="exam-result-title">測驗完成！</div>
    <div class="result-sub"   id="exam-result-sub"></div>
    <div class="result-detail" id="exam-result-r1"></div>
    <div class="result-detail" id="exam-result-r2"></div>
    <div class="result-btns">
      <button class="btn-result btn-result-primary" onclick="startExam()">🔄 重新測驗</button>
      <button class="btn-result btn-result-secondary" onclick="showPage('menu')">📋 回到字詞列表</button>
    </div>
  </div>
</div>

<!-- ── 設定 ── -->
<div id="page-settings" class="page">
  <div class="settings-body">
    <div class="settings-section-title">🐾 頭像</div>
    <div id="settings-avatar-grid"></div>
    <div class="settings-section-title">🎨 主題色系</div>
    <div id="theme-grid"></div>
    <div class="settings-section-title">🔊 音效</div>
    <div class="sound-row">
      <span class="sound-label">練習音效</span>
      <button class="sound-toggle-btn" id="sound-toggle-btn" onclick="toggleSound();applySound();">
        <div class="sound-toggle-knob" id="sound-toggle-knob"></div>
      </button>
    </div>
  </div>
</div>

<div id="toast"></div>
<script src="../shared/shared.js"></script>
<script src="js/nav.js"></script>
<script src="js/state.js"></script>
<script src="js/voice.js"></script>
<script src="js/curriculum.js"></script>
<script src="js/menu.js"></script>
<script src="js/practice.js"></script>
<script src="js/exam.js"></script>
<script src="js/init.js"></script>
</body>
</html>
