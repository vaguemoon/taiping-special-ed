<!DOCTYPE html>
<html lang="zh-TW">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<title>臺東縣太平國小資源班學習系統</title>
<script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-firestore-compat.js"></script>
<style>
@import url('https://fonts.googleapis.com/css2?family=Nunito:wght@400;700;800;900&family=Noto+Sans+TC:wght@400;500;700;900&display=swap');

:root {
  --blue:     #4a90d9;
  --blue-dk:  #2d6fa8;
  --blue-lt:  #e8f4fd;
  --green:    #52c97a;
  --green-dk: #389959;
  --orange:   #ff8c42;
  --red:      #e84444;
  --yellow:   #ffd54f;
  --bg:       #eef5fc;
  --text:     #1e2d3d;
  --muted:    #7a99b5;
  --white:    #ffffff;
  --border:   #d4e8f8;
  --radius:   22px;
  --shadow:   0 6px 28px rgba(44,100,160,.13);
  --shadow-lg:0 12px 48px rgba(44,100,160,.2);
}

* { box-sizing:border-box; margin:0; padding:0; -webkit-tap-highlight-color:transparent; }
body { font-family:'Nunito','Noto Sans TC',sans-serif; background:var(--bg); color:var(--text); height:100vh; overflow:hidden; }

.app { position:relative; width:100vw; height:100vh; overflow:hidden; }
.screen {
  position:absolute; inset:0; overflow-y:auto;
  transition:transform .38s cubic-bezier(.77,0,.175,1), opacity .38s ease;
  will-change:transform,opacity;
}
.screen.active { transform:translateX(0);     opacity:1;  pointer-events:all; }
.screen.right  { transform:translateX(100%);  opacity:.3; pointer-events:none; }
.screen.left   { transform:translateX(-100%); opacity:.3; pointer-events:none; }

/* ── 登入畫面 ── */
#screen-login {
  background:linear-gradient(160deg,#1a3a5c 0%,#2d6fa8 60%,#4a90d9 100%);
  display:flex; flex-direction:column; align-items:center; justify-content:center;
  min-height:100vh; padding:24px;
}
.login-logo { text-align:center; margin-bottom:22px; color:white; }
.login-logo-icon { font-size:3.2rem; margin-bottom:8px; display:block; }
.login-school { font-size:.8rem; letter-spacing:3px; opacity:.75; margin-bottom:4px; }
.login-title  { font-size:1.55rem; font-weight:900; line-height:1.3; }
.login-title em { color:var(--yellow); font-style:normal; }

/* 身份 Tab  [修正#2] */
.role-tabs {
  display:flex; width:100%; max-width:380px;
  background:rgba(255,255,255,.15); border-radius:13px;
  padding:4px; gap:4px; margin-bottom:14px;
}
.role-tab {
  flex:1; padding:10px 6px; border:none; border-radius:10px;
  font-family:'Nunito',sans-serif; font-size:.88rem; font-weight:800;
  cursor:pointer; transition:all .2s; color:rgba(255,255,255,.65);
  background:transparent;
}
.role-tab.active { background:white; color:var(--blue-dk); }

.login-card {
  background:white; border-radius:var(--radius);
  padding:22px 20px; box-shadow:0 16px 48px rgba(0,0,0,.25);
  width:100%; max-width:380px;
}
.login-card-title { font-size:.96rem; font-weight:900; color:var(--blue-dk); text-align:center; margin-bottom:16px; }
.login-field { margin-bottom:13px; }
.login-label { font-size:.79rem; font-weight:800; color:var(--muted); margin-bottom:5px; display:block; }
.login-input {
  width:100%; border:2.5px solid var(--border); border-radius:12px;
  padding:11px 14px; font-size:1.02rem;
  font-family:'Noto Sans TC',sans-serif; outline:none;
  transition:border-color .2s; color:var(--text);
}
.login-input:focus { border-color:var(--blue); }

.pin-display { display:flex; gap:8px; justify-content:center; margin-bottom:13px; }
.pin-dot { width:16px; height:16px; border-radius:50%; border:3px solid #c8d8ec; background:transparent; transition:all .15s; }
.pin-dot.filled { background:var(--blue); border-color:var(--blue); }
.pin-pad { display:grid; grid-template-columns:repeat(3,1fr); gap:8px; margin-bottom:13px; }
.pin-btn {
  padding:14px; border:2.5px solid var(--border); border-radius:12px;
  background:white; font-size:1.3rem; font-weight:900;
  color:var(--text); cursor:pointer; transition:all .15s; font-family:'Nunito',sans-serif;
}
.pin-btn:active { background:var(--blue-lt); transform:scale(.95); }
.pin-btn-del { background:#fff0f0; color:var(--red); border-color:#ffb3b3; font-size:1rem; }
.pin-btn-ok  { background:var(--green); color:white; border-color:var(--green); font-size:.92rem; }

.btn-login {
  width:100%; padding:13px; border:none; border-radius:12px;
  background:linear-gradient(135deg,var(--blue),var(--blue-dk));
  color:white; font-size:.98rem; font-weight:900; cursor:pointer;
  font-family:'Nunito',sans-serif; box-shadow:0 4px 14px rgba(45,111,168,.35);
  transition:all .15s; margin-top:2px;
}
.btn-login:active { transform:scale(.97); }
.btn-login:disabled { background:#b0c8e8; cursor:not-allowed; box-shadow:none; }
.login-error {
  background:#fff0f0; color:var(--red); border-radius:9px;
  padding:8px 12px; font-size:.82rem; font-weight:700;
  text-align:center; margin-top:9px; display:none;
}
.login-error.show { display:block; }
.login-switch { text-align:center; margin-top:11px; font-size:.8rem; font-weight:600; color:var(--muted); }
.login-switch a { color:var(--blue); font-weight:800; cursor:pointer; text-decoration:none; }

/* 教師登入 */
.teacher-field { margin-bottom:12px; }

/* ── Hub 畫面 ── */
#screen-hub { background:linear-gradient(160deg,#dbeeff 0%,#eef5fc 100%); display:flex; flex-direction:column; min-height:100vh; }
.hub-topbar {
  background:white; padding:11px 16px;
  display:flex; align-items:center; justify-content:space-between;
  box-shadow:0 2px 12px rgba(0,0,0,.06); position:sticky; top:0; z-index:50;
}
.hub-brand { display:flex; align-items:center; gap:8px; font-weight:900; font-size:.92rem; color:var(--blue-dk); }
.hub-brand span { font-size:1.2rem; }
.hub-right { display:flex; align-items:center; gap:8px; }

/* [修正#3] 學生徽章 → 個人資料，不是登出 */
.student-badge {
  display:none; align-items:center; gap:6px;
  background:var(--blue-lt); border-radius:20px; padding:5px 12px;
  font-size:.8rem; font-weight:800; color:var(--blue-dk);
  cursor:pointer; border:none; font-family:'Nunito',sans-serif; transition:all .15s;
}
.student-badge:active { transform:scale(.95); }
.student-badge.show { display:flex; }
.badge-hint { font-size:.68rem; opacity:.65; }

.hub-body { padding:22px 16px 60px; max-width:580px; margin:0 auto; width:100%; }

.hub-hero { text-align:center; margin-bottom:26px; }
.hub-avatar { font-size:2.6rem; display:block; margin-bottom:7px; }
.hub-welcome { font-size:1.45rem; font-weight:900; color:var(--blue-dk); margin-bottom:4px; line-height:1.3; }
.hub-welcome em { color:var(--orange); font-style:normal; }
.hub-school { font-size:.78rem; font-weight:700; color:var(--muted); letter-spacing:2px; }

.hub-section-label {
  font-size:.76rem; font-weight:900; color:var(--muted); letter-spacing:2px; margin-bottom:12px;
  display:flex; align-items:center; gap:8px;
}
.hub-section-label::after { content:''; flex:1; height:1.5px; background:#d0e6f7; border-radius:2px; }

/* [修正#4] 只顯示已完成的兩個科目，移除「即將推出」卡片 */
.subjects-grid { display:grid; grid-template-columns:1fr 1fr; gap:13px; margin-bottom:26px; }
.subject-card {
  background:white; border-radius:var(--radius); padding:20px 14px 16px;
  box-shadow:var(--shadow); display:flex; flex-direction:column; align-items:center; gap:8px;
  cursor:pointer; border:3px solid transparent;
  transition:transform .18s, box-shadow .18s; user-select:none;
}
.subject-card:hover  { transform:translateY(-4px); box-shadow:var(--shadow-lg); }
.subject-card:active { transform:scale(.95); }
.subject-card.theme-blue   { border-color:#b3d7f5; }
.subject-card.theme-orange { border-color:#ffc9a0; }
.subject-icon { font-size:2.6rem; line-height:1; }
.subject-name { font-family:'Nunito',sans-serif; font-weight:900; font-size:1.02rem; color:var(--text); }
.subject-desc { font-size:.74rem; color:var(--muted); font-weight:600; text-align:center; line-height:1.5; }
.subject-badge { font-size:.68rem; font-weight:800; padding:3px 9px; border-radius:18px; }
.subject-badge.green  { background:#e8f8ee; color:var(--green-dk); }
.subject-badge.orange { background:#fff3e8; color:#c05a10; }

/* 近期記錄 */
.activity-card { background:white; border-radius:var(--radius); padding:16px 16px; box-shadow:var(--shadow); margin-bottom:16px; }
.activity-row { display:flex; align-items:center; gap:11px; padding:9px 0; border-bottom:1px solid #eef3f8; }
.activity-row:last-child { border-bottom:none; padding-bottom:0; }
.activity-icon { font-size:1.35rem; width:32px; text-align:center; flex-shrink:0; }
.activity-info { flex:1; }
.activity-title { font-size:.86rem; font-weight:800; color:var(--text); }
.activity-sub   { font-size:.72rem; color:var(--muted); font-weight:600; margin-top:2px; }
.activity-score { font-family:'Nunito',sans-serif; font-weight:900; font-size:.88rem; color:var(--blue-dk); background:var(--blue-lt); padding:3px 10px; border-radius:12px; }
.activity-empty { text-align:center; padding:18px; color:var(--muted); font-size:.84rem; font-weight:600; }

/* Toast */
#toast {
  position:fixed; bottom:24px; left:50%; transform:translateX(-50%) translateY(20px);
  background:#1e2d3d; color:white; padding:10px 20px; border-radius:26px;
  font-size:.86rem; font-weight:700; opacity:0; transition:all .3s;
  z-index:999; white-space:nowrap; pointer-events:none;
}
#toast.show { opacity:1; transform:translateX(-50%) translateY(0); }

.spinner {
  display:inline-block; width:14px; height:14px;
  border:2.5px solid rgba(255,255,255,.4); border-top-color:white;
  border-radius:50%; animation:spin .7s linear infinite; margin-right:6px; vertical-align:middle;
}
@keyframes spin { to { transform:rotate(360deg); } }

/* 彈窗 */
.overlay {
  position:fixed; inset:0; background:rgba(18,32,46,.5); backdrop-filter:blur(4px);
  z-index:200; display:flex; align-items:center; justify-content:center;
  opacity:0; pointer-events:none; transition:opacity .25s;
}
.overlay.show { opacity:1; pointer-events:all; }
.overlay-box { background:white; border-radius:var(--radius); padding:28px 24px; max-width:300px; width:90%; text-align:center; box-shadow:var(--shadow-lg); animation:popIn .3s both; }
.overlay-icon  { font-size:2.2rem; margin-bottom:9px; }
.overlay-title { font-size:1.02rem; font-weight:900; color:var(--text); margin-bottom:5px; }
.overlay-sub   { font-size:.82rem; color:var(--muted); font-weight:600; margin-bottom:18px; }
.overlay-btns  { display:flex; gap:9px; }
.overlay-btns button { flex:1; padding:11px; border:none; border-radius:11px; font-family:'Nunito',sans-serif; font-weight:800; font-size:.9rem; cursor:pointer; transition:all .15s; }
.btn-cancel  { background:#f1f5f9; color:var(--muted); }
.btn-confirm { background:linear-gradient(135deg,var(--red),#c0392b); color:white; }
.btn-cancel:active,.btn-confirm:active { transform:scale(.96); }

@keyframes popIn { 0%{opacity:0;transform:scale(.88) translateY(10px)} 100%{opacity:1;transform:scale(1) translateY(0)} }

/* ── 個人資料畫面 ── */
#screen-profile { background:var(--bg); }
.profile-topbar {
  display:flex; align-items:center; gap:10px;
  padding:14px 18px; background:white;
  border-bottom:1px solid var(--border);
  position:sticky; top:0; z-index:10;
}
.profile-body { padding:20px 18px; max-width:480px; margin:0 auto; }
.avatar-grid { display:grid; grid-template-columns:repeat(5,1fr); gap:10px; margin-bottom:8px; }
.avatar-btn {
  font-size:2rem; border:3px solid transparent;
  border-radius:14px; background:white; cursor:pointer;
  padding:8px; transition:all .18s; line-height:1; aspect-ratio:1;
}
.avatar-btn.selected {
  border-color:var(--blue); background:var(--blue-lt);
  transform:scale(1.1); box-shadow:0 0 0 3px rgba(74,144,217,.15);
}
.level-card {
  background:linear-gradient(135deg,var(--blue),var(--blue-dk));
  border-radius:16px; padding:20px; color:white;
  display:flex; align-items:center; gap:16px;
  margin-bottom:16px; box-shadow:0 6px 20px rgba(44,111,168,.3);
}
.level-icon { font-size:3rem; line-height:1; }
.level-info { flex:1; }
.level-title { font-size:1.2rem; font-weight:900; margin-bottom:2px; }
.level-sub   { font-size:.8rem; opacity:.85; font-weight:600; }
.level-progress { height:10px; background:rgba(255,255,255,.25); border-radius:20px; overflow:hidden; margin-top:10px; }
.level-progress-fill { height:100%; background:white; border-radius:20px; transition:width .6s; }
.achievement-grid { display:grid; grid-template-columns:1fr 1fr; gap:10px; margin-bottom:16px; }
.achievement-item {
  background:white; border-radius:14px; padding:14px;
  border:1.5px solid var(--border);
  display:flex; flex-direction:column; align-items:center; gap:6px;
  box-shadow:var(--shadow);
}
.achievement-icon { font-size:1.8rem; }
.achievement-num  { font-size:1.6rem; font-weight:900; color:var(--blue-dk); line-height:1; }
.achievement-lbl  { font-size:.72rem; font-weight:700; color:var(--muted); text-align:center; }
.profile-card {
  background:white; border-radius:14px; padding:18px;
  border:1.5px solid var(--border); box-shadow:var(--shadow); margin-bottom:16px;
}
.profile-card-title { font-size:.82rem; font-weight:800; color:var(--muted); margin-bottom:12px; letter-spacing:.5px; }
.profile-input {
  width:100%; border:2px solid var(--border); border-radius:10px;
  padding:11px 14px; font-size:1rem; font-family:inherit;
  outline:none; transition:border-color .2s; color:var(--text); background:var(--bg);
}
.profile-input:focus { border-color:var(--blue); background:white; }
.btn-profile-save {
  width:100%; padding:13px; border:none; border-radius:12px;
  background:linear-gradient(135deg,var(--blue),var(--blue-dk));
  color:white; font-size:1rem; font-weight:800;
  cursor:pointer; font-family:'Nunito',sans-serif; transition:all .15s;
  box-shadow:0 4px 12px rgba(44,111,168,.3); margin-top:4px;
}
.btn-profile-save:active { transform:scale(.97); }
.btn-back-profile {
  background:var(--blue-lt); border:none; border-radius:14px;
  padding:9px 18px; font-size:.95rem; font-weight:900;
  color:var(--blue-dk); cursor:pointer; transition:all .15s;
  font-family:'Nunito',sans-serif;
}
.btn-back-profile:active { transform:scale(.95); }
.logout-row {
  display:flex; align-items:center; justify-content:space-between;
  padding:14px 18px; background:white; border-top:1px solid var(--border);
  margin-top:8px;
}
.btn-logout-profile {
  background:#fff0f0; color:var(--red); border:none; border-radius:11px;
  padding:10px 20px; font-size:.9rem; font-weight:800; cursor:pointer;
  font-family:'Nunito',sans-serif; transition:all .15s;
}
.btn-logout-profile:active { transform:scale(.95); }

@media(max-width:400px){
  .subjects-grid{gap:10px}
  .subject-card{padding:15px 10px 13px}
  .subject-icon{font-size:2.2rem}
  .hub-welcome{font-size:1.25rem}
}
</style>
</head>
<body>
<script>
// 同步執行：若有 Hub sessionStorage（從子頁面返回），立即隱藏登入畫面避免閃爍
(function() {
  try {
    var saved = sessionStorage.getItem('hub_student');
    if (saved) {
      JSON.parse(saved);
      var style = document.createElement('style');
      style.textContent = '#screen-login { opacity:0 !important; pointer-events:none !important; }';
      document.head.appendChild(style);
    }
  } catch(e) {}
})();
</script>
<div class="app">

<!-- ════ 登入畫面 ════ -->
<div id="screen-login" class="screen active">
  <div class="login-logo">
    <span class="login-logo-icon">🏫</span>
    <div class="login-school">臺 東 縣 太 平 國 小</div>
    <!-- [修正#1] 改為「資源班學習系統」，移除特教字眼 -->
    <div class="login-title">資源班<em>學習系統</em></div>
  </div>

  <!-- [修正#2] 教師／學生切換 Tab -->
  <div class="role-tabs">
    <button class="role-tab active" id="tab-student" onclick="switchRole('student')">👤 學生登入</button>
    <button class="role-tab"        id="tab-teacher" onclick="switchRole('teacher')">🏫 教師登入</button>
  </div>

  <!-- 學生登入卡 -->
  <div class="login-card" id="card-student">
    <div class="login-card-title">👤 學生登入</div>
    <div class="login-field">
      <label class="login-label">姓名</label>
      <input class="login-input" type="text" id="login-name" placeholder="輸入你的名字" autocomplete="off" oninput="onLoginNameInput()">
    </div>
    <div class="login-field">
      <label class="login-label">PIN 碼（4位數）</label>
      <div class="pin-display">
        <div class="pin-dot" id="pd0"></div><div class="pin-dot" id="pd1"></div>
        <div class="pin-dot" id="pd2"></div><div class="pin-dot" id="pd3"></div>
      </div>
      <div class="pin-pad">
        <button class="pin-btn" onclick="pinInput('1')">1</button>
        <button class="pin-btn" onclick="pinInput('2')">2</button>
        <button class="pin-btn" onclick="pinInput('3')">3</button>
        <button class="pin-btn" onclick="pinInput('4')">4</button>
        <button class="pin-btn" onclick="pinInput('5')">5</button>
        <button class="pin-btn" onclick="pinInput('6')">6</button>
        <button class="pin-btn" onclick="pinInput('7')">7</button>
        <button class="pin-btn" onclick="pinInput('8')">8</button>
        <button class="pin-btn" onclick="pinInput('9')">9</button>
        <button class="pin-btn pin-btn-del" onclick="pinDelete()">⌫</button>
        <button class="pin-btn" onclick="pinInput('0')">0</button>
        <button class="pin-btn pin-btn-ok" onclick="doStudentLogin()">✓</button>
      </div>
    </div>
    <button class="btn-login" id="btn-login" onclick="doStudentLogin()" disabled>登入</button>
    <div class="login-error" id="login-error"></div>
    <div class="login-switch">還沒有帳號？<a onclick="showToast('請聯絡老師為您建立帳號 🙏')">請聯絡老師</a></div>
  </div>

  <!-- 教師登入卡：只需密碼 -->
  <div class="login-card" id="card-teacher" style="display:none">
    <div class="login-card-title">🏫 教師登入</div>
    <div class="login-field" style="margin-bottom:0">
      <label class="login-label">教師密碼</label>
      <input class="login-input" type="password" id="teacher-pwd"
             placeholder="請輸入教師密碼" autocomplete="off"
             onkeydown="if(event.key==='Enter')doTeacherLogin()">
    </div>
    <button class="btn-login" style="margin-top:14px" onclick="doTeacherLogin()">進入管理後台 →</button>
    <div class="login-error" id="teacher-error"></div>
  </div>
</div>

<!-- ════ Hub 主畫面 ════ -->
<div id="screen-hub" class="screen right">
  <div class="hub-topbar">
    <!-- [修正#1] 改名 -->
    <div class="hub-brand"><span>🏫</span> 太平國小資源班</div>
    <div class="hub-right">
      <button class="student-badge" id="student-badge" onclick="goToProfile()">
        <span id="badge-avatar">🐣</span>
        <span id="badge-name">學生</span>
        <span class="badge-hint">▸ 個人資料</span>
      </button>
    </div>
  </div>

  <div class="hub-body">
    <div class="hub-hero">
      <span class="hub-avatar" id="hub-avatar">🐣</span>
      <div class="hub-welcome">嗨，<em id="hub-name">同學</em>！<br>今天要練習什麼？</div>
      <!-- [修正#1] -->
      <div class="hub-school">臺東縣太平國小資源班</div>
    </div>

    <!-- [修正#4] 移除「即將推出」卡片，只保留已完成的兩個科目 -->
    <div class="hub-section-label">📚 學習區</div>
    <div class="subjects-grid">
      <div class="subject-card theme-blue" onclick="goToSubject('chinese')">
        <span class="subject-icon">🈶</span>
        <div class="subject-name">國字練習</div>
        <div class="subject-desc">筆順練習<br>默寫測驗</div>
        <div class="subject-badge green">可以練習</div>
      </div>
      <div class="subject-card theme-orange" onclick="goToSubject('math')">
        <span class="subject-icon">✖️</span>
        <div class="subject-name">乘法練習</div>
        <div class="subject-desc">選擇題・填空題<br>關卡解鎖</div>
        <div class="subject-badge orange">可以練習</div>
      </div>
    </div>

    <div class="hub-section-label">📊 近期記錄</div>
    <div class="activity-card">

<script>
// ── Firebase ──
var firebaseConfig = {
  apiKey: "AIzaSyBLhonzZkR1ORDPKgxmaVLFUwvPiEMpdj0",
  authDomain: "tainping-hanzi-app.firebaseapp.com",
  projectId: "tainping-hanzi-app",
  storageBucket: "tainping-hanzi-app.firebasestorage.app",
  messagingSenderId: "158917910126",
  appId: "1:158917910126:web:e52a1d0456d1fd4fe6907f"
};
var db = null;
function initFirebase() {
  if (typeof firebase === 'undefined' || typeof firebase.firestore === 'undefined') { setTimeout(initFirebase,150); return; }
  try {
    if (!firebase.apps.length) firebase.initializeApp(firebaseConfig);
    db = firebase.firestore();
  } catch(e) { db=null; setTimeout(initFirebase,300); }
}

// ── 狀態 ──
var currentStudent = null;
var loginPin = '';
// 教師密碼：與 admin.html 統一，只需密碼不需帳號
var TEACHER_PASSWORD = '381418';

// [修正#5] sessionStorage 讓子頁面讀取，不需重新登入
function saveSession(s) { sessionStorage.setItem('hub_student', JSON.stringify(s)); }
function clearSession()  { sessionStorage.removeItem('hub_student'); sessionStorage.removeItem('return_to'); }

// ── 畫面切換 ──
var SCREENS = ['screen-login','screen-hub','screen-profile'];
function goTo(id) {
  var order = SCREENS.indexOf(id);
  SCREENS.forEach(function(sid,i){
    var el = document.getElementById(sid); if (!el) return;
    if (sid===id)     el.className='screen active';
    else if (i<order) el.className='screen left';
    else              el.className='screen right';
  });
}

// [修正#2] 身份 Tab
function switchRole(role) {
  var isS = role==='student';
  document.getElementById('tab-student').classList.toggle('active', isS);
  document.getElementById('tab-teacher').classList.toggle('active',!isS);
  document.getElementById('card-student').style.display = isS?'':'none';
  document.getElementById('card-teacher').style.display = isS?'none':'';
  document.getElementById('login-error').classList.remove('show');
  document.getElementById('teacher-error').classList.remove('show');
}

// ── PIN 輸入 ──
function pinInput(d) {
  if (loginPin.length>=4) return;
  loginPin+=d; updatePinDisplay(loginPin);
  if (loginPin.length===4 && document.getElementById('login-name').value.trim()) doStudentLogin();
}
function pinDelete() { loginPin=loginPin.slice(0,-1); updatePinDisplay(loginPin); updateLoginBtn(); }
function onLoginNameInput() { updateLoginBtn(); }
function updatePinDisplay(pin) {
  for(var i=0;i<4;i++){ var d=document.getElementById('pd'+i); if(d) d.classList.toggle('filled',i<pin.length); }
  updateLoginBtn();
}
function updateLoginBtn() {
  var btn=document.getElementById('btn-login');
  if(btn) btn.disabled=!(document.getElementById('login-name').value.trim() && loginPin.length===4);
}

// ── 學生登入 ──
function doStudentLogin() {
  var name=document.getElementById('login-name').value.trim();
  if (!name||loginPin.length<4) return;
  var errEl=document.getElementById('login-error');
  errEl.classList.remove('show');
  var btn=document.getElementById('btn-login');
  btn.innerHTML='<span class="spinner"></span>登入中…'; btn.disabled=true;
  if (!db) { setTimeout(doStudentLogin,800); return; }
  var id=name+'_'+loginPin;
  db.collection('students').doc(id).get().then(function(doc){
    if (!doc.exists) {
      btn.textContent='登入'; btn.disabled=false;
      loginPin=''; updatePinDisplay('');
      errEl.textContent='找不到這個帳號，請確認姓名和 PIN 碼。'; errEl.classList.add('show'); return;
    }
    var data=doc.data();
    currentStudent={ id:id, name:name, pin:loginPin, nickname:data.nickname||'', avatar:data.avatar||'🐣', role:'student' };
    saveSession(currentStudent); // [修正#5]
    updateHubUI(); loadActivity(); goTo('screen-hub');
    btn.textContent='登入';
    showToast('👋 歡迎 '+(currentStudent.nickname||currentStudent.name)+'！');
  }).catch(function(){
    btn.textContent='登入'; btn.disabled=false;
    errEl.textContent='連線失敗，請檢查網路後再試。'; errEl.classList.add('show');
  });
}

// [修正] 教師登入：只驗密碼，存 adminAuth 到 sessionStorage，admin.html 以此驗證
function doTeacherLogin() {
  var pwd = (document.getElementById('teacher-pwd').value || '').trim();
  var errEl = document.getElementById('teacher-error');
  errEl.classList.remove('show');
  if (pwd !== TEACHER_PASSWORD) {
    errEl.textContent = '密碼錯誤，請再試一次。';
    errEl.classList.add('show');
    document.getElementById('teacher-pwd').value = '';
    document.getElementById('teacher-pwd').focus();
    return;
  }
  // 存入 sessionStorage，admin.html 啟動時讀取驗證
  sessionStorage.setItem('adminAuth', TEACHER_PASSWORD);
  window.location.href = 'admin.html';
}

// ── Hub UI ──
function updateHubUI() {
  var n=currentStudent.nickname||currentStudent.name, av=currentStudent.avatar||'🐣';
  document.getElementById('hub-name').textContent=n;
  document.getElementById('hub-avatar').textContent=av;
  document.getElementById('badge-name').textContent=n;
  document.getElementById('badge-avatar').textContent=av;
  document.getElementById('student-badge').classList.add('show');
}

// [修正#3] 徽章點擊 → 個人資料（在 index.html 內切換，不跳頁）
function goToProfile() {
  saveSession(currentStudent);
  // 從 Hub 進來，return_to 清空（返回時回 screen-hub）
  sessionStorage.removeItem('return_to');
  loadProfileData(function(){ goTo('screen-profile'); });
}

// 從子頁面跳回個人資料後，返回按鈕的處理
function goBackFromProfile() {
  var returnTo = sessionStorage.getItem('return_to');
  sessionStorage.removeItem('return_to');
  if (returnTo) {
    window.location.href = returnTo;
  } else {
    goTo('screen-hub');
  }
}

// ── 個人資料資料載入 ──
var AVATARS = ['🐣','🐱','🐶','🐻','🐼','🦊','🐸','🐧','🦁','🐯',
               '🐨','🐮','🐷','🐰','🐹','🦋','🌸','⭐','🌈','🎯'];

var LEVELS = [
  { min:0,   max:99,  icon:'⭐',    title:'一級' },
  { min:100, max:199, icon:'⭐⭐',   title:'二級' },
  { min:200, max:299, icon:'⭐⭐⭐',  title:'三級' },
  { min:300, max:399, icon:'🌟',    title:'四級' },
  { min:400, max:499, icon:'🌟🌟',   title:'五級' },
  { min:500, max:599, icon:'🌟🌟🌟', title:'六級' },
  { min:600, max:699, icon:'🏅',    title:'七級' },
  { min:700, max:799, icon:'🎖️',   title:'八級' },
  { min:800, max:899, icon:'🏆',    title:'九級' },
  { min:900, max:Infinity, icon:'👑', title:'十級' }
];

function getLevelInfo(n) {
  var lv = LEVELS.find(function(l){ return n >= l.min && n <= l.max; }) || LEVELS[LEVELS.length-1];
  var pct = lv.max === Infinity ? 100 : Math.round((n - lv.min) / (lv.max - lv.min + 1) * 100);
  return { icon:lv.icon, title:lv.title, pct:pct, nextCount: lv.max === Infinity ? null : lv.max + 1 - n };
}

function loadProfileData(cb) {
  if (!currentStudent) return;
  var el = function(id){ return document.getElementById(id); };
  // 基本資料
  if (el('profile-real-name')) el('profile-real-name').textContent = currentStudent.name;
  if (el('profile-nickname'))  el('profile-nickname').value = currentStudent.nickname || '';
  if (el('logout-name'))       el('logout-name').textContent = currentStudent.nickname || currentStudent.name;
  renderAvatarGrid(currentStudent.avatar || '🐣');
  applySound();
  renderThemeGrid();

  if (!db) { if(cb) cb(); return; }

  var mastered = 0, practiced = 0, mathStars = 0, streak = 0;
  var pending = 2;
  function done() {
    if (--pending > 0) return;
    var lv = getLevelInfo(mastered);
    if (el('profile-level-icon'))  el('profile-level-icon').textContent  = lv.icon;
    if (el('profile-level-title')) el('profile-level-title').textContent = lv.title;
    if (el('profile-level-sub'))   el('profile-level-sub').textContent   =
      '通過測驗 ' + mastered + ' 個字' + (lv.nextCount ? '（再 ' + lv.nextCount + ' 字升級）' : ' 🎉 最高等級！');
    if (el('profile-level-bar'))   el('profile-level-bar').style.width = lv.pct + '%';
    if (el('ach-mastered'))    el('ach-mastered').textContent    = mastered;
    if (el('ach-practiced'))   el('ach-practiced').textContent   = practiced;
    if (el('ach-math-stars'))  el('ach-math-stars').textContent  = mathStars;
    if (el('ach-streak'))      el('ach-streak').textContent      = streak;
    if (cb) cb();
  }

  db.collection('students').doc(currentStudent.id).collection('progress').doc('hanzi').get()
    .then(function(doc){
      if (doc.exists) {
        var cs = doc.data().charStatus || {};
        mastered  = Object.values(cs).filter(function(v){ return v==='mastered'; }).length;
        practiced = Object.values(cs).filter(function(v){ return v==='practiced'; }).length;
        streak    = doc.data().streak || 0;
      }
      done();
    }).catch(done);

  db.collection('students').doc(currentStudent.id).collection('progress').doc('math').get()
    .then(function(doc){
      if (doc.exists) mathStars = doc.data().totalStars || 0;
      done();
    }).catch(done);
}

function renderAvatarGrid(selectedAvatar) {
  var grid = document.getElementById('avatar-grid');
  if (!grid) return;
  grid.innerHTML = '';
  AVATARS.forEach(function(av) {
    var btn = document.createElement('button');
    btn.className = 'avatar-btn' + (av === selectedAvatar ? ' selected' : '');
    btn.textContent = av;
    btn.addEventListener('click', function() {
      document.querySelectorAll('.avatar-btn').forEach(function(b){ b.classList.remove('selected'); });
      btn.classList.add('selected');
    });
    grid.appendChild(btn);
  });
}

function saveProfile() {
  if (!currentStudent || !db) return;
  var nickname = (document.getElementById('profile-nickname').value || '').trim();
  var selected = document.querySelector('.avatar-btn.selected');
  var avatar   = selected ? selected.textContent : (currentStudent.avatar || '🐣');
  currentStudent.nickname = nickname;
  currentStudent.avatar   = avatar;
  saveSession(currentStudent);
  db.collection('students').doc(currentStudent.id).update({ nickname:nickname, avatar:avatar })
    .then(function(){ showToast('✅ 資料已儲存！'); updateHubUI(); })
    .catch(function(e){ showToast('❌ 儲存失敗：'+e.message); });
}

// ── 音效 ──
var soundEnabled = localStorage.getItem('soundEnabled') !== 'false';
function applySound() {
  var btn  = document.getElementById('sound-toggle-btn');
  var knob = document.getElementById('sound-toggle-knob');
  if (!btn || !knob) return;
  btn.style.background = soundEnabled ? 'var(--green)' : '#cbd5e1';
  knob.style.left      = soundEnabled ? '29px' : '3px';
}
function toggleSound() {
  soundEnabled = !soundEnabled;
  localStorage.setItem('soundEnabled', soundEnabled);
  applySound();
}

// ── 主題 ──
var THEMES = [
  { id:'blue',   name:'藍天',   bg:'#eef5fc', blue:'#4a90d9', blueDk:'#2d6fa8', blueLt:'#e8f4fd' },
  { id:'green',  name:'森林',   bg:'#edfbf4', blue:'#27ae60', blueDk:'#1e8449', blueLt:'#d5f5e3' },
  { id:'purple', name:'薰衣草', bg:'#f3f0fc', blue:'#8e44ad', blueDk:'#6c3483', blueLt:'#e8daef' },
  { id:'orange', name:'夕陽',   bg:'#fff8f0', blue:'#e67e22', blueDk:'#ca6f1e', blueLt:'#fdebd0' },
  { id:'teal',   name:'青空',   bg:'#f0fafa', blue:'#16a085', blueDk:'#0e6655', blueLt:'#d1f2eb' },
  { id:'pink',   name:'粉紅',   bg:'#fff0f8', blue:'#d63384', blueDk:'#a0255e', blueLt:'#fce4ec' },
];
var currentTheme = localStorage.getItem('theme') || 'blue';
function applyTheme(themeId) {
  var t = THEMES.find(function(th){ return th.id===themeId; }) || THEMES[0];
  var r = document.documentElement.style;
  r.setProperty('--bg',      t.bg);
  r.setProperty('--blue',    t.blue);
  r.setProperty('--blue-dk', t.blueDk);
  r.setProperty('--blue-lt', t.blueLt);
  currentTheme = themeId;
  localStorage.setItem('theme', themeId);
  renderThemeGrid();
}
function renderThemeGrid() {
  var grid = document.getElementById('theme-grid');
  if (!grid) return;
  grid.innerHTML = '';
  THEMES.forEach(function(t) {
    var btn = document.createElement('button');
    btn.style.cssText = 'display:flex;flex-direction:column;align-items:center;gap:4px;padding:10px 4px;border-radius:12px;border:2.5px solid '
      +(t.id===currentTheme?'var(--blue)':'var(--border)')+';background:'+(t.id===currentTheme?'var(--blue-lt)':'white')+';cursor:pointer;font-family:inherit;transition:all .15s;';
    btn.innerHTML = '<span style="font-size:1.4rem;display:inline-block;width:28px;height:28px;border-radius:50%;background:'+t.blue+'"></span>'
      +'<span style="font-size:.7rem;font-weight:800;color:var(--text)">'+t.name+'</span>';
    btn.addEventListener('click', function(){ applyTheme(t.id); });
    grid.appendChild(btn);
  });
}

// ── 近期活動 ──
function loadActivity() {
  if (!db||!currentStudent) return;
  var list=document.getElementById('activity-list');
  list.innerHTML='<div class="activity-empty">載入中…</div>';
  var activities=[], pending=2;
  function done(){ if(--pending===0) renderActivity(activities); }

  db.collection('students').doc(currentStudent.id).collection('progress').doc('hanzi').get()
    .then(function(doc){
      if(doc.exists){ var cs=doc.data().charStatus||{};
        var m=Object.values(cs).filter(function(v){return v==='mastered';}).length;
        var p=Object.values(cs).filter(function(v){return v==='practiced';}).length;
        if(m+p>0) activities.push({icon:'🈶',title:'國字練習',sub:'通過測驗 '+m+' 字，通過練習 '+p+' 字',score:m+p+' 字'});
      } done();
    }).catch(done);

  db.collection('students').doc(currentStudent.id).collection('progress').doc('math').get()
    .then(function(doc){
      if(doc.exists){ var d=doc.data();
        if(d.totalAnswered>0){ var pct=Math.round(d.totalCorrect/d.totalAnswered*100);
          activities.push({icon:'✖️',title:'乘法練習',sub:'作答 '+d.totalAnswered+' 題，正確率 '+pct+'%',score:'⭐ '+(d.totalStars||0)});
        }
      } done();
    }).catch(done);
}
function renderActivity(activities) {
  var list=document.getElementById('activity-list');
  if (!activities.length){ list.innerHTML='<div class="activity-empty">還沒有學習記錄，快去練習吧！🚀</div>'; return; }
  list.innerHTML=activities.map(function(a){
    return '<div class="activity-row"><div class="activity-icon">'+a.icon+'</div>'
      +'<div class="activity-info"><div class="activity-title">'+a.title+'</div>'
      +'<div class="activity-sub">'+a.sub+'</div></div>'
      +'<div class="activity-score">'+a.score+'</div></div>';
  }).join('');
}

// [修正#5] 前往科目：子頁面從 sessionStorage 讀取，不重新登入
function goToSubject(subject) {
  if (!currentStudent) return;
  saveSession(currentStudent);
  if (subject==='chinese') window.location.href='chinese.html';
  else if (subject==='math') window.location.href='math.html';
}

// ── 登出 ──
function showLogoutConfirm() { document.getElementById('logout-overlay').classList.add('show'); }
function hideLogoutConfirm() { document.getElementById('logout-overlay').classList.remove('show'); }
function doLogout() {
  currentStudent=null; clearSession(); loginPin=''; updatePinDisplay('');
  document.getElementById('login-name').value='';
  document.getElementById('login-error').classList.remove('show');
  var btn=document.getElementById('btn-login'); btn.disabled=true; btn.textContent='登入';
  document.getElementById('student-badge').classList.remove('show');
  document.getElementById('activity-list').innerHTML='<div class="activity-empty">登入後查看學習記錄 📖</div>';
  hideLogoutConfirm(); switchRole('student'); goTo('screen-login');
  showToast('已登出，掰掰！👋');
}

// ── Toast ──
function showToast(msg) {
  var t=document.getElementById('toast'); t.textContent=msg; t.classList.add('show');
  setTimeout(function(){ t.classList.remove('show'); },2800);
}

// ── 啟動 ──
window.addEventListener('load',function(){
  initFirebase();
  applyTheme(currentTheme);
  applySound();
  // 從子頁面返回時自動恢復登入，不需重新輸入
  try {
    var saved=sessionStorage.getItem('hub_student');
    if (saved){
      currentStudent=JSON.parse(saved);
      // 移除早期注入的隱藏 style，切換到正確畫面
      var hideStyle = document.querySelector('style[data-hide-login]');
      if (!hideStyle) {
        // 找到 head 中沒有 id 的 style（就是我們注入的那個）
        var styles = document.head.querySelectorAll('style');
        styles.forEach(function(s){
          if (s.textContent.indexOf('screen-login') !== -1 && s.textContent.indexOf('opacity') !== -1) {
            s.remove();
          }
        });
      }
      updateHubUI();
      loadActivity();
      if (window.location.search.indexOf('screen=profile') !== -1) {
        loadProfileData(function(){ goTo('screen-profile'); });
      } else {
        goTo('screen-hub');
      }
    }
  } catch(e){}
});
</script>
</body>
</html>
