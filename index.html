<!DOCTYPE html>
<html lang="zh-TW">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<title>臺東縣太平國小資源班</title>
<script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-firestore-compat.js"></script>
<link rel="stylesheet" href="shared.css">
<script>
(function(){var M={blue:'#eef5fc,#4a90d9,#2d6fa8,#e8f4fd',green:'#edfbf4,#27ae60,#1e8449,#d5f5e3',
  purple:'#f3f0fc,#8e44ad,#6c3483,#e8daef',orange:'#fff8f0,#e67e22,#ca6f1e,#fdebd0',
  teal:'#f0fafa,#16a085,#0e6655,#d1f2eb',pink:'#fff0f8,#d63384,#a0255e,#fce4ec'};
  try{var v=(M[localStorage.getItem('theme')]||M.blue).split(','),r=document.documentElement.style;
  ['--bg','--blue','--blue-dk','--blue-lt'].forEach(function(k,i){r.setProperty(k,v[i]);});}catch(e){}})();
</script>
<style>
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:'Nunito','Noto Sans TC',sans-serif;background:var(--bg);color:var(--text);height:100vh;overflow:hidden}
.app{width:100vw;height:100vh;display:flex;flex-direction:column}

/* === TOPBAR === */
#main-topbar{flex-shrink:0;background:var(--white);padding:10px 16px;display:flex;align-items:center;justify-content:space-between;box-shadow:0 2px 12px rgba(0,0,0,.07);z-index:100;min-height:54px}
#main-topbar.hidden{display:none}
.topbar-brand-name{font-size:.95rem;font-weight:900;color:var(--blue-dk)}
.topbar-brand-sub{font-size:.72rem;color:var(--muted);font-weight:600}
.topbar-right{display:flex;align-items:center;gap:10px}
.student-badge{display:flex;align-items:center;gap:6px;background:var(--blue-lt);border-radius:20px;padding:5px 12px;cursor:pointer;border:1.5px solid rgba(74,144,217,.25);transition:all .15s}
.student-badge:active{transform:scale(.96)}
.student-badge-avatar{font-size:1.2rem}
.student-badge-name{font-size:.85rem;font-weight:800;color:var(--blue-dk)}
.btn-back-subject{background:var(--blue-lt);border:none;border-radius:12px;padding:7px 14px;font-size:.82rem;font-weight:800;color:var(--blue-dk);cursor:pointer;font-family:inherit;transition:all .15s;display:none}
.btn-back-subject.show{display:block}
.btn-back-subject:active{transform:scale(.95)}

/* === PANELS === */
#main-content{flex:1;position:relative;overflow:hidden}
.panel{position:absolute;inset:0;overflow-y:auto;transition:transform .35s cubic-bezier(.77,0,.175,1),opacity .35s ease}
.panel.active{transform:translateX(0);opacity:1;pointer-events:all}
.panel.right{transform:translateX(100%);opacity:0;pointer-events:none}
.panel.left{transform:translateX(-100%);opacity:0;pointer-events:none}

/* === 登入 === */
#panel-login{display:flex;flex-direction:column;align-items:center;justify-content:center;min-height:100%;padding:24px;background:linear-gradient(160deg,#dbeeff 0%,var(--bg) 60%)}
.login-card{width:100%;max-width:360px;background:var(--white);border-radius:24px;padding:28px 24px;box-shadow:0 8px 32px rgba(44,100,160,.15)}
.login-school{text-align:center;font-size:.85rem;font-weight:700;color:var(--muted);letter-spacing:2px;margin-bottom:6px}
.login-title{text-align:center;font-size:1.6rem;font-weight:900;color:var(--blue-dk);margin-bottom:24px}
.login-title span{color:var(--orange)}
.login-label{font-size:.8rem;font-weight:800;color:var(--muted);display:block;margin-bottom:8px}
.login-input{width:100%;border:2.5px solid #d4e8f8;border-radius:12px;padding:12px 16px;font-size:1rem;font-family:'Noto Sans TC',sans-serif;outline:none;transition:border-color .2s;color:var(--text);margin-bottom:16px}
.login-input:focus{border-color:var(--blue)}
.pin-display{display:flex;justify-content:center;gap:12px;margin-bottom:16px}
.pin-dot{width:18px;height:18px;border-radius:50%;border:2.5px solid #c8d8ec;background:transparent;transition:all .15s}
.pin-dot.filled{background:var(--blue);border-color:var(--blue)}
.pin-pad{display:grid;grid-template-columns:repeat(3,1fr);gap:10px;margin-bottom:20px}
.pin-btn{padding:14px;border:none;border-radius:14px;background:var(--blue-lt);color:var(--blue-dk);font-size:1.3rem;font-weight:900;cursor:pointer;transition:all .15s;font-family:inherit}
.pin-btn:active{background:var(--blue);color:white;transform:scale(.93)}
.pin-btn-del{background:#fff3e0;color:var(--orange)}
.pin-btn-ok{background:var(--blue);color:white}
.pin-btn-ok:disabled{background:#b0c8e8;cursor:not-allowed}
.login-error{text-align:center;font-size:.85rem;font-weight:700;color:var(--red);padding:10px;border-radius:10px;background:#fff0f0;display:none;margin-bottom:10px}
.login-error.show{display:block}
.login-switch{text-align:center;font-size:.82rem;font-weight:700;color:var(--muted);margin-top:14px}
.login-switch a{color:var(--blue);cursor:pointer;font-weight:800}
.teacher-entry{margin-top:10px;text-align:center}
.btn-teacher{background:none;border:none;font-size:.78rem;font-weight:700;color:var(--muted);cursor:pointer;font-family:inherit;padding:4px 8px}
.teacher-pin-wrap{display:flex;gap:8px;justify-content:center;align-items:center;margin-top:10px}
.teacher-pin-wrap.hidden{display:none}
.teacher-pin-input{border:2px solid #d4e8f8;border-radius:10px;padding:8px 12px;font-size:.9rem;font-family:inherit;outline:none;width:130px;text-align:center}
.btn-teacher-go{padding:8px 14px;border:none;border-radius:10px;background:var(--blue);color:white;font-size:.82rem;font-weight:800;cursor:pointer;font-family:inherit}

/* === HUB === */
#panel-hub{background:var(--bg)}
.hub-body{max-width:600px;margin:0 auto;padding:28px 16px 60px}
.hub-welcome{margin-bottom:28px}
.hub-welcome-avatar{font-size:3rem;margin-bottom:8px}
.hub-welcome-name{font-size:1.5rem;font-weight:900;color:var(--blue-dk)}
.hub-welcome-sub{font-size:.85rem;color:var(--muted);font-weight:600;margin-top:4px}
.hub-section-label{font-size:.78rem;font-weight:900;color:var(--muted);letter-spacing:1px;margin-bottom:12px}
.subjects-grid{display:grid;grid-template-columns:1fr 1fr;gap:13px;margin-bottom:28px}
.subject-card{background:var(--white);border-radius:20px;padding:20px 14px 18px;box-shadow:0 4px 18px rgba(44,100,160,.1);display:flex;flex-direction:column;align-items:center;gap:8px;cursor:pointer;transition:all .18s;border:2.5px solid transparent;text-align:center}
.subject-card:hover{transform:translateY(-4px);box-shadow:0 8px 28px rgba(44,100,160,.18)}
.subject-card:active{transform:scale(.95)}
.subject-card.theme-blue{border-color:#b3d7f5}
.subject-card.theme-orange{border-color:#ffc9a0}
.subject-card.theme-green{border-color:#a8e6c0}
.subject-card.theme-purple{border-color:#d4b8f0}
.subject-icon{font-size:2.2rem}
.subject-name{font-size:1rem;font-weight:900;color:var(--blue-dk)}
.subject-desc{font-size:.75rem;color:var(--muted);font-weight:600;line-height:1.5}
.subject-badge{font-size:.72rem;font-weight:800;padding:3px 10px;border-radius:20px;margin-top:4px}
.subject-badge.green{background:#e8f8ee;color:var(--green-dk)}
.subject-badge.orange{background:#fff3e0;color:#b05000}
.activity-card{background:var(--white);border-radius:18px;padding:16px;box-shadow:0 4px 18px rgba(44,100,160,.08)}
.activity-row{display:flex;align-items:center;gap:12px;padding:10px 0;border-bottom:1px solid #f0f4f8}
.activity-row:last-child{border-bottom:none}
.activity-icon{font-size:1.5rem;flex-shrink:0}
.activity-info{flex:1}
.activity-title{font-size:.9rem;font-weight:800}
.activity-sub{font-size:.75rem;color:var(--muted);font-weight:600;margin-top:2px}
.activity-score{font-size:.85rem;font-weight:900;color:var(--blue-dk);white-space:nowrap}
.activity-empty{text-align:center;padding:20px;font-size:.88rem;color:var(--muted);font-weight:600}

/* === IFRAME === */
#panel-subject{background:#000}
#subject-frame{width:100%;height:100%;border:none;display:block}

/* === 個人設定 === */
#panel-profile{background:var(--bg)}
.profile-header{background:linear-gradient(135deg,var(--blue),var(--blue-dk));padding:28px 20px 24px;display:flex;align-items:center;gap:16px}
.profile-avatar-big{font-size:3rem}
.profile-header-name{font-size:1.3rem;font-weight:900;color:white}
.profile-header-sub{font-size:.82rem;color:rgba(255,255,255,.75);font-weight:600;margin-top:4px}
.profile-body{padding:16px;max-width:600px;margin:0 auto}
.profile-section{background:var(--white);border-radius:18px;padding:18px 16px;margin-bottom:14px;box-shadow:0 4px 18px rgba(44,100,160,.08)}
.profile-section-title{font-size:.82rem;font-weight:900;color:var(--muted);letter-spacing:1px;margin-bottom:14px}
.profile-input{width:100%;border:2px solid #d4e8f8;border-radius:10px;padding:10px 14px;font-size:.95rem;font-family:'Noto Sans TC',sans-serif;outline:none;color:var(--text);transition:border-color .2s}
.profile-input:focus{border-color:var(--blue)}
.avatar-grid{display:grid;grid-template-columns:repeat(6,1fr);gap:8px}
.avatar-btn{font-size:1.6rem;padding:8px;border:2.5px solid transparent;border-radius:12px;cursor:pointer;background:var(--blue-lt);transition:all .15s;text-align:center}
.avatar-btn.selected{border-color:var(--blue);background:#d4e8f8}
.avatar-btn:active{transform:scale(.9)}
.theme-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:10px}
.theme-btn{padding:10px;border-radius:12px;border:2.5px solid transparent;cursor:pointer;font-size:.82rem;font-weight:800;transition:all .15s;text-align:center}
.theme-btn.selected{border-color:var(--blue-dk)}
.theme-btn:active{transform:scale(.95)}
.sound-row{display:flex;align-items:center;justify-content:space-between}
.sound-toggle{width:52px;height:28px;border-radius:20px;border:none;cursor:pointer;position:relative;transition:background .25s}
.sound-knob{position:absolute;top:3px;width:22px;height:22px;border-radius:50%;background:white;transition:left .25s;box-shadow:0 2px 4px rgba(0,0,0,.2)}
.btn-save-profile{width:100%;padding:14px;border:none;border-radius:14px;background:linear-gradient(135deg,var(--blue),var(--blue-dk));color:white;font-size:1rem;font-weight:900;cursor:pointer;font-family:inherit;margin-bottom:14px;box-shadow:0 4px 14px rgba(45,111,168,.3);transition:all .15s}
.btn-save-profile:active{transform:scale(.97)}
.btn-logout{width:100%;padding:12px;border:2px solid #ffb3b3;border-radius:14px;background:#fff0f0;color:var(--red);font-size:.95rem;font-weight:800;cursor:pointer;font-family:inherit;transition:all .15s;margin-bottom:40px}
.btn-logout:active{transform:scale(.97)}
.overlay{position:fixed;inset:0;z-index:500;background:rgba(0,0,0,.5);backdrop-filter:blur(4px);display:none;align-items:center;justify-content:center;padding:20px}
.overlay.show{display:flex}
.overlay-box{background:white;border-radius:24px;padding:28px 24px;max-width:320px;width:100%;text-align:center;box-shadow:0 12px 40px rgba(0,0,0,.2)}
.overlay-icon{font-size:2.5rem;margin-bottom:10px}
.overlay-title{font-size:1.2rem;font-weight:900;margin-bottom:6px}
.overlay-sub{font-size:.88rem;color:var(--muted);font-weight:600;margin-bottom:20px}
.overlay-btns{display:flex;gap:10px}
.btn-cancel{flex:1;padding:12px;border:2px solid #d4e8f8;border-radius:12px;background:var(--blue-lt);color:var(--blue-dk);font-weight:800;cursor:pointer;font-family:inherit}
.btn-confirm{flex:1;padding:12px;border:none;border-radius:12px;background:var(--red);color:white;font-weight:800;cursor:pointer;font-family:inherit}
.spinner{width:36px;height:36px;border:4px solid rgba(74,144,217,.2);border-top-color:var(--blue);border-radius:50%;animation:spin .7s linear infinite;margin:40px auto}
@keyframes spin{to{transform:rotate(360deg)}}
</style>
</head>
<body>
<div class="app">

  <!-- 主系統 Topbar：子項目不碰這裡 -->
  <div id="main-topbar" class="hidden">
    <div>
      <div class="topbar-brand-name">太平國小資源班</div>
      <div class="topbar-brand-sub" id="topbar-sub">學習系統</div>
    </div>
    <div class="topbar-right">
      <button class="btn-back-subject" id="btn-back-subject" onclick="backToHub()">← 返回主頁</button>
      <div class="student-badge" onclick="showProfile()">
        <span class="student-badge-avatar" id="badge-avatar">🐣</span>
        <span class="student-badge-name"   id="badge-name">—</span>
      </div>
    </div>
  </div>

  <div id="main-content">

    <!-- 登入 -->
    <div class="panel active" id="panel-login">
      <div class="login-card">
        <div class="login-school">臺東縣太平國小資源班</div>
        <div class="login-title">學習<span>系統</span></div>
        <div id="login-form">
          <label class="login-label">你的名字</label>
          <input class="login-input" id="login-name" type="text" placeholder="輸入姓名" autocomplete="off" oninput="updateLoginBtn()">
          <label class="login-label">PIN 碼（4位數字）</label>
          <div class="pin-display" id="pin-display">
            <div class="pin-dot" id="pd0"></div><div class="pin-dot" id="pd1"></div>
            <div class="pin-dot" id="pd2"></div><div class="pin-dot" id="pd3"></div>
          </div>
          <div class="pin-pad">
            <button class="pin-btn" onclick="pinInput('1')">1</button>
            <button class="pin-btn" onclick="pinInput('2')">2</button>
            <button class="pin-btn" onclick="pinInput('3')">3</button>
            <button class="pin-btn" onclick="pinInput('4')">4</button>
            <button class="pin-btn" onclick="pinInput('5')">5</button>
            <button class="pin-btn" onclick="pinInput('6')">6</button>
            <button class="pin-btn" onclick="pinInput('7')">7</button>
            <button class="pin-btn" onclick="pinInput('8')">8</button>
            <button class="pin-btn" onclick="pinInput('9')">9</button>
            <button class="pin-btn pin-btn-del" onclick="pinDelete()">⌫</button>
            <button class="pin-btn" onclick="pinInput('0')">0</button>
            <button class="pin-btn pin-btn-ok" id="btn-login-ok" onclick="doLogin()" disabled>✓</button>
          </div>
          <div class="login-error" id="login-error">名字或 PIN 碼不正確，請再試一次</div>
          <div class="login-switch">還沒有帳號？<a onclick="showRegister()">點這裡註冊</a></div>
        </div>
        <div id="register-form" style="display:none">
          <label class="login-label">你的名字</label>
          <input class="login-input" id="reg-name" type="text" placeholder="輸入姓名" autocomplete="off" oninput="updateRegBtn()">
          <label class="login-label">設定 PIN 碼（4位數字）</label>
          <div class="pin-display" id="reg-pin-display">
            <div class="pin-dot" id="rpd0"></div><div class="pin-dot" id="rpd1"></div>
            <div class="pin-dot" id="rpd2"></div><div class="pin-dot" id="rpd3"></div>
          </div>
          <div class="pin-pad">
            <button class="pin-btn" onclick="regPinInput('1')">1</button>
            <button class="pin-btn" onclick="regPinInput('2')">2</button>
            <button class="pin-btn" onclick="regPinInput('3')">3</button>
            <button class="pin-btn" onclick="regPinInput('4')">4</button>
            <button class="pin-btn" onclick="regPinInput('5')">5</button>
            <button class="pin-btn" onclick="regPinInput('6')">6</button>
            <button class="pin-btn" onclick="regPinInput('7')">7</button>
            <button class="pin-btn" onclick="regPinInput('8')">8</button>
            <button class="pin-btn" onclick="regPinInput('9')">9</button>
            <button class="pin-btn pin-btn-del" onclick="regPinDelete()">⌫</button>
            <button class="pin-btn" onclick="regPinInput('0')">0</button>
            <button class="pin-btn pin-btn-ok" id="btn-reg-ok" onclick="doRegister()" disabled>✓</button>
          </div>
          <div class="login-error" id="reg-error"></div>
          <div class="login-switch">已有帳號？<a onclick="showLogin()">點這裡登入</a></div>
        </div>
        <div class="teacher-entry">
          <button class="btn-teacher" onclick="toggleTeacherEntry()">🔑 教師登入</button>
          <div class="teacher-pin-wrap hidden" id="teacher-pin-wrap">
            <input class="teacher-pin-input" id="teacher-pin-input" type="password" placeholder="教師密碼">
            <button class="btn-teacher-go" onclick="doTeacherLogin()">進入</button>
          </div>
        </div>
      </div>
    </div>

    <!-- Hub 主頁 -->
    <div class="panel right" id="panel-hub">
      <div class="hub-body">
        <div class="hub-welcome">
          <div class="hub-welcome-avatar" id="hub-avatar">🐣</div>
          <div class="hub-welcome-name"   id="hub-name">—</div>
          <div class="hub-welcome-sub">歡迎回來</div>
        </div>
        <div class="hub-section-label">📚 學習區</div>
        <div class="subjects-grid" id="subjects-grid"></div>
        <div class="hub-section-label">📊 近期記錄</div>
        <div class="activity-card">
          <div id="activity-list"><div class="activity-empty">載入中…</div></div>
        </div>
      </div>
    </div>

    <!-- 子項目 iframe（子項目的一切在這裡，和主系統完全隔離）-->
    <div class="panel right" id="panel-subject">
      <iframe id="subject-frame" src="about:blank" allow="microphone"></iframe>
    </div>

    <!-- 個人設定 -->
    <div class="panel right" id="panel-profile">
      <div class="profile-header">
        <div class="profile-avatar-big" id="profile-avatar-big">🐣</div>
        <div>
          <div class="profile-header-name" id="profile-header-name">—</div>
          <div class="profile-header-sub">個人設定</div>
        </div>
      </div>
      <div class="profile-body">
        <div class="profile-section">
          <div class="profile-section-title">暱稱</div>
          <input class="profile-input" id="profile-nickname" type="text" placeholder="輸入暱稱（選填）" maxlength="10">
        </div>
        <div class="profile-section">
          <div class="profile-section-title">頭像</div>
          <div class="avatar-grid" id="avatar-grid"></div>
        </div>
        <div class="profile-section">
          <div class="profile-section-title">主題色系</div>
          <div class="theme-grid" id="theme-grid"></div>
        </div>
        <div class="profile-section">
          <div class="profile-section-title">音效</div>
          <div class="sound-row">
            <span style="font-size:.9rem;font-weight:700">練習音效</span>
            <button class="sound-toggle" id="sound-toggle" onclick="toggleSoundUI()">
              <div class="sound-knob" id="sound-knob"></div>
            </button>
          </div>
        </div>
        <button class="btn-save-profile" onclick="saveProfile()">💾 儲存設定</button>
        <button class="btn-logout" onclick="showLogoutConfirm()">登出</button>
      </div>
    </div>

  </div>
</div>

<div class="overlay" id="logout-overlay">
  <div class="overlay-box">
    <div class="overlay-icon">👋</div>
    <div class="overlay-title">要登出嗎？</div>
    <div class="overlay-sub">下次再來繼續學習！</div>
    <div class="overlay-btns">
      <button class="btn-cancel"  onclick="hideLogoutConfirm()">取消</button>
      <button class="btn-confirm" onclick="doLogout()">登出</button>
    </div>
  </div>
</div>

<div id="toast"></div>
<script src="shared.js"></script>
<script>
'use strict';

/* 科目清單：新增科目只改這裡 */
var SUBJECTS = [
  {
    id:'chinese', file:'chinese.html',
    icon:'國', name:'國字練習', desc:'筆順練習・默寫測驗',
    theme:'theme-blue', badge:'可以練習', badgeClass:'green',
    activity:function(sid){
      return db.collection('students').doc(sid).collection('progress').doc('hanzi').get()
        .then(function(doc){
          if(!doc.exists) return null;
          var cs=doc.data().charStatus||{};
          var m=Object.values(cs).filter(function(v){return v==='mastered';}).length;
          var p=Object.values(cs).filter(function(v){return v==='practiced';}).length;
          return (m+p)?{sub:'通過測驗 '+m+' 字，通過練習 '+p+' 字',score:(m+p)+' 字'}:null;
        });
    }
  }
];

/* 狀態 */
var currentStudent=null, loginPin='', regPin='', currentPanel='login', selectedAvatar='🐣';
var AVATARS=['🐣','🐱','🐶','🐻','🐼','🦊','🐸','🐧','🦁','🐯','🐨','🐮','🐷','🐙','🦋','🌟','🌈','🎈','🚀','🎯'];
var ADMIN_PASSWORD='381418';
var PANELS=['login','hub','subject','profile'];

/* 畫面切換 */
function showPanel(name){
  if(currentPanel===name) return;
  var fromEl=document.getElementById('panel-'+currentPanel);
  var toEl=document.getElementById('panel-'+name);
  if(!fromEl||!toEl) return;
  var fwd=PANELS.indexOf(name)>=PANELS.indexOf(currentPanel);
  toEl.style.transition='none';
  toEl.style.transform=fwd?'translateX(100%)':'translateX(-100%)';
  toEl.style.opacity='0';
  toEl.className='panel';
  requestAnimationFrame(function(){
    requestAnimationFrame(function(){
      var t='.35s cubic-bezier(.77,0,.175,1)';
      fromEl.style.transition='transform '+t+',opacity '+t;
      fromEl.style.transform=fwd?'translateX(-100%)':'translateX(100%)';
      fromEl.style.opacity='0';
      fromEl.style.pointerEvents='none';
      toEl.style.transition='transform '+t+',opacity '+t;
      toEl.style.transform='translateX(0)';
      toEl.style.opacity='1';
      toEl.style.pointerEvents='all';
      currentPanel=name;
      setTimeout(function(){
        fromEl.style.cssText=''; toEl.style.cssText='';
        fromEl.className='panel left'; toEl.className='panel active';
      },370);
    });
  });
}

/* Topbar */
function showTopbar(){document.getElementById('main-topbar').classList.remove('hidden');}
function hideTopbar(){document.getElementById('main-topbar').classList.add('hidden');}
function setTopbarMode(mode){
  document.getElementById('btn-back-subject').classList.toggle('show', mode==='subject');
}
function updateBadge(){
  if(!currentStudent) return;
  document.getElementById('badge-name').textContent  =currentStudent.nickname||currentStudent.name;
  document.getElementById('badge-avatar').textContent=currentStudent.avatar||'🐣';
}

/* 登入 */
function updateLoginBtn(){
  document.getElementById('btn-login-ok').disabled=
    !(document.getElementById('login-name').value.trim()&&loginPin.length===4);
}
function pinInput(d){
  if(loginPin.length>=4) return;
  loginPin+=d; updatePinDisplay('pd',loginPin); updateLoginBtn();
}
function pinDelete(){
  loginPin=loginPin.slice(0,-1); updatePinDisplay('pd',loginPin); updateLoginBtn();
}
function updatePinDisplay(prefix,pin){
  for(var i=0;i<4;i++) document.getElementById(prefix+i).classList.toggle('filled',i<pin.length);
}
function doLogin(){
  var name=document.getElementById('login-name').value.trim();
  if(!name||loginPin.length!==4) return;
  document.getElementById('btn-login-ok').disabled=true;
  document.getElementById('login-error').classList.remove('show');
  if(!db){setTimeout(doLogin,300);return;}
  db.collection('students').doc(name+'_'+loginPin).get().then(function(doc){
    if(!doc.exists){
      document.getElementById('login-error').classList.add('show');
      document.getElementById('btn-login-ok').disabled=false;
      loginPin=''; updatePinDisplay('pd',''); return;
    }
    var d=doc.data();
    onLoginSuccess({id:name+'_'+loginPin,name:name,pin:loginPin,nickname:d.nickname||'',avatar:d.avatar||'🐣'});
  }).catch(function(){showToast('連線失敗，請重試');document.getElementById('btn-login-ok').disabled=false;});
}
function onLoginSuccess(student){
  currentStudent=student; selectedAvatar=student.avatar||'🐣';
  sessionStorage.setItem('hub_student',JSON.stringify(student));
  updateBadge(); renderHub(); showTopbar(); setTopbarMode('hub'); showPanel('hub');
  loadActivity();
  showToast('👋 歡迎，'+(student.nickname||student.name)+'！');
}

/* 註冊 */
function showRegister(){document.getElementById('login-form').style.display='none';document.getElementById('register-form').style.display='';}
function showLogin(){document.getElementById('register-form').style.display='none';document.getElementById('login-form').style.display='';}
function updateRegBtn(){
  document.getElementById('btn-reg-ok').disabled=
    !(document.getElementById('reg-name').value.trim()&&regPin.length===4);
}
function regPinInput(d){if(regPin.length>=4)return;regPin+=d;updatePinDisplay('rpd',regPin);updateRegBtn();}
function regPinDelete(){regPin=regPin.slice(0,-1);updatePinDisplay('rpd',regPin);updateRegBtn();}
function doRegister(){
  var name=document.getElementById('reg-name').value.trim();
  if(!name||regPin.length!==4) return;
  document.getElementById('btn-reg-ok').disabled=true;
  var id=name+'_'+regPin;
  db.collection('students').doc(id).get().then(function(doc){
    if(doc.exists){
      var err=document.getElementById('reg-error');
      err.textContent='這個名字和 PIN 已被使用';err.classList.add('show');
      document.getElementById('btn-reg-ok').disabled=false;return;
    }
    return db.collection('students').doc(id).set({name:name,pin:regPin,nickname:'',avatar:'🐣',createdAt:new Date()})
      .then(function(){onLoginSuccess({id:id,name:name,pin:regPin,nickname:'',avatar:'🐣'});showToast('🎉 帳號建立成功！');});
  }).catch(function(){showToast('建立失敗，請重試');document.getElementById('btn-reg-ok').disabled=false;});
}

/* 教師 */
function toggleTeacherEntry(){document.getElementById('teacher-pin-wrap').classList.toggle('hidden');}
function doTeacherLogin(){
  if(document.getElementById('teacher-pin-input').value===ADMIN_PASSWORD){
    sessionStorage.setItem('adminAuth',ADMIN_PASSWORD);window.location.href='admin.html';
  }else{showToast('密碼不正確');}
}

/* Hub */
function renderHub(){
  if(!currentStudent) return;
  document.getElementById('hub-avatar').textContent=currentStudent.avatar||'🐣';
  document.getElementById('hub-name').textContent=currentStudent.nickname||currentStudent.name;
  var grid=document.getElementById('subjects-grid');
  grid.style.gridTemplateColumns=SUBJECTS.length===1?'1fr':'1fr 1fr';
  grid.innerHTML=SUBJECTS.map(function(s){
    return '<div class="subject-card '+s.theme+'" onclick="openSubject(\''+s.id+'\')">'+
      '<span class="subject-icon">'+s.icon+'</span>'+
      '<div class="subject-name">'+s.name+'</div>'+
      '<div class="subject-desc">'+s.desc+'</div>'+
      '<div class="subject-badge '+s.badgeClass+'">'+s.badge+'</div></div>';
  }).join('');
}

/* 子項目 iframe */
function openSubject(id){
  var s=SUBJECTS.find(function(x){return x.id===id;});
  if(!s||!currentStudent) return;
  sessionStorage.setItem('hub_student',JSON.stringify(currentStudent));
  document.getElementById('subject-frame').src=s.file;
  document.getElementById('topbar-sub').textContent=s.name;
  setTopbarMode('subject'); showPanel('subject');
}
function backToHub(){
  document.getElementById('subject-frame').src='about:blank';
  document.getElementById('topbar-sub').textContent='學習系統';
  setTopbarMode('hub'); showPanel('hub');
}

/* 近期記錄 */
function loadActivity(){
  if(!db||!currentStudent) return;
  var list=document.getElementById('activity-list');
  list.innerHTML='<div class="activity-empty">載入中…</div>';
  Promise.all(SUBJECTS.map(function(s){
    return s.activity(currentStudent.id)
      .then(function(r){return r?{icon:s.icon,name:s.name,sub:r.sub,score:r.score}:null;})
      .catch(function(){return null;});
  })).then(function(results){
    var valid=results.filter(Boolean);
    list.innerHTML=valid.length
      ?valid.map(function(a){return '<div class="activity-row"><div class="activity-icon">'+a.icon+'</div>'+
          '<div class="activity-info"><div class="activity-title">'+a.name+'</div>'+
          '<div class="activity-sub">'+a.sub+'</div></div>'+
          '<div class="activity-score">'+a.score+'</div></div>';}).join('')
      :'<div class="activity-empty">還沒有學習記錄，快去練習吧！🚀</div>';
  });
}

/* 個人設定 */
function showProfile(){
  if(!currentStudent) return;
  document.getElementById('profile-nickname').value=currentStudent.nickname||'';
  document.getElementById('profile-avatar-big').textContent=currentStudent.avatar||'🐣';
  document.getElementById('profile-header-name').textContent=currentStudent.nickname||currentStudent.name;
  selectedAvatar=currentStudent.avatar||'🐣';
  renderAvatarGrid(); renderThemeGrid(); applySoundUI();
  showPanel('profile');
}
function renderAvatarGrid(){
  document.getElementById('avatar-grid').innerHTML=AVATARS.map(function(av){
    return '<button class="avatar-btn'+(av===selectedAvatar?' selected':'')+
      '" onclick="selectAvatar(\''+av+'\')">'+av+'</button>';
  }).join('');
}
function selectAvatar(av){selectedAvatar=av;document.getElementById('profile-avatar-big').textContent=av;renderAvatarGrid();}
function renderThemeGrid(){
  var cur=localStorage.getItem('theme')||'blue';
  document.getElementById('theme-grid').innerHTML=THEMES.map(function(t){
    return '<button class="theme-btn'+(t.id===cur?' selected':'')+
      '" style="background:'+t.bg+';color:'+t.blueDk+'" onclick="selectTheme(\''+t.id+'\')">'+t.name+'</button>';
  }).join('');
}
function selectTheme(id){applyTheme(id);renderThemeGrid();}
function applySoundUI(){
  var on=soundEnabled;
  var btn=document.getElementById('sound-toggle');
  var knob=document.getElementById('sound-knob');
  if(!btn) return;
  btn.style.background=on?'var(--blue)':'#ccc';
  knob.style.left=on?'27px':'3px';
}
function toggleSoundUI(){
  soundEnabled=!soundEnabled;
  localStorage.setItem('soundEnabled',soundEnabled);
  applySoundUI();
}
function saveProfile(){
  if(!currentStudent||!db) return;
  var nickname=document.getElementById('profile-nickname').value.trim();
  currentStudent.nickname=nickname;
  currentStudent.avatar=selectedAvatar;
  sessionStorage.setItem('hub_student',JSON.stringify(currentStudent));
  updateBadge();
  db.collection('students').doc(currentStudent.id)
    .set({nickname:nickname,avatar:selectedAvatar},{merge:true})
    .then(function(){showToast('✅ 已儲存！');renderHub();showPanel('hub');setTopbarMode('hub');})
    .catch(function(){showToast('儲存失敗，請重試');});
}

/* 登出 */
function showLogoutConfirm(){document.getElementById('logout-overlay').classList.add('show');}
function hideLogoutConfirm(){document.getElementById('logout-overlay').classList.remove('show');}
function doLogout(){
  currentStudent=null; loginPin=''; regPin='';
  sessionStorage.removeItem('hub_student');
  updatePinDisplay('pd',''); updatePinDisplay('rpd','');
  document.getElementById('login-name').value='';
  document.getElementById('btn-login-ok').disabled=true;
  document.getElementById('subject-frame').src='about:blank';
  document.getElementById('activity-list').innerHTML='<div class="activity-empty">登入後查看學習記錄</div>';
  hideLogoutConfirm(); hideTopbar(); showPanel('login');
  showToast('已登出，掰掰！👋');
}

/* 啟動 */
window.addEventListener('load',function(){
  initFirebase(); applyTheme(currentTheme);
  try{
    var saved=sessionStorage.getItem('hub_student');
    if(saved){
      var student=JSON.parse(saved);
      currentStudent=student; selectedAvatar=student.avatar||'🐣';
      updateBadge(); renderHub(); showTopbar(); setTopbarMode('hub'); showPanel('hub');
      (function waitDb(){if(!db){setTimeout(waitDb,200);return;}loadActivity();})();
    }
  }catch(e){}
});
</script>
</body>
</html>
