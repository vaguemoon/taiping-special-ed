<!DOCTYPE html>
<html lang="zh-TW">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<meta name="theme-color" content="#4a90d9">
<title>上學趣</title>
<link rel="manifest" href="/taiping-special-ed/manifest.json">
<script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-firestore-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-auth-compat.js"></script>
<link rel="stylesheet" href="shared.css">
<script>
(function(){var M={blue:'#eef5fc,#4a90d9,#2d6fa8,#e8f4fd',green:'#edfbf4,#27ae60,#1e8449,#d5f5e3',
  purple:'#f3f0fc,#8e44ad,#6c3483,#e8daef',orange:'#fff8f0,#e67e22,#ca6f1e,#fdebd0',
  teal:'#f0fafa,#16a085,#0e6655,#d1f2eb',pink:'#fff0f8,#d63384,#a0255e,#fce4ec'};
  try{var v=(M[localStorage.getItem('theme')]||M.blue).split(','),r=document.documentElement.style;
  ['--bg','--blue','--blue-dk','--blue-lt'].forEach(function(k,i){r.setProperty(k,v[i]);});}catch(e){}})();
</script>
<link rel="stylesheet" href="index.css">
</head>
<body>
<div class="app">
  <div id="main-content">

    <!-- ① 角色選擇（預設顯示） -->
    <div class="panel active" id="panel-role">
      <div class="role-wrap">
        <div class="role-header">
          <div class="role-school" id="school-name-tap">上學趣</div>
          <div class="role-title">學習<span>系統</span></div>
          <div class="role-subtitle">請選擇你的身份</div>
        </div>
        <!-- 公告橫幅（由 checkSiteSettings 控制顯示） -->
        <div id="announcement-banner" style="display:none;background:#fffbeb;border:1.5px solid #fbbf24;border-radius:10px;padding:11px 14px;margin-bottom:16px;font-size:.88rem;font-weight:700;color:#92400e;gap:8px;align-items:flex-start">
          <span>📢</span>
          <span id="announcement-text"></span>
        </div>

        <div class="role-cards">
          <button class="role-card role-teacher" onclick="showPanel('teacher-login')">
            <div class="role-icon">👩‍🏫</div>
            <div class="role-name">教　師</div>
            <div class="role-sub">管理課程與班級</div>
          </button>
          <button class="role-card role-student" onclick="showPanel('login')">
            <div class="role-icon">🧒</div>
            <div class="role-name">學　生</div>
            <div class="role-sub">開始今天的學習</div>
          </button>
        </div>
      </div>
    </div>

    <!-- ② 教師登入 -->
    <div class="panel right" id="panel-teacher-login">
      <div class="tlogin-wrap">
        <div class="tlogin-card">
          <button class="btn-back-role" onclick="showPanel('role')">← 返回</button>
          <div class="login-school">教師後台</div>
          <div class="login-title">教師<span>登入</span></div>

          <!-- Google 登入 -->
          <button class="btn-google" onclick="doGoogleLogin()">
            <svg width="18" height="18" viewBox="0 0 18 18" fill="none" xmlns="http://www.w3.org/2000/svg">
              <path d="M17.64 9.2c0-.637-.057-1.251-.164-1.84H9v3.481h4.844c-.209 1.125-.843 2.078-1.796 2.716v2.259h2.908c1.702-1.567 2.684-3.875 2.684-6.615z" fill="#4285F4"/>
              <path d="M9 18c2.43 0 4.467-.806 5.956-2.18l-2.908-2.259c-.806.54-1.837.86-3.048.86-2.344 0-4.328-1.584-5.036-3.711H.957v2.332A8.997 8.997 0 0 0 9 18z" fill="#34A853"/>
              <path d="M3.964 10.71A5.41 5.41 0 0 1 3.682 9c0-.593.102-1.17.282-1.71V4.958H.957A8.996 8.996 0 0 0 0 9c0 1.452.348 2.827.957 4.042l3.007-2.332z" fill="#FBBC05"/>
              <path d="M9 3.58c1.321 0 2.508.454 3.44 1.345l2.582-2.58C13.463.891 11.426 0 9 0A8.997 8.997 0 0 0 .957 4.958L3.964 7.29C4.672 5.163 6.656 3.58 9 3.58z" fill="#EA4335"/>
            </svg>
            以 Google 帳號登入
          </button>

          <div class="login-divider"><span>或以 Email 登入</span></div>

          <!-- 登入表單 -->
          <div id="teacher-login-form">
            <input class="login-input" id="teacher-email-input" type="email"
              placeholder="教師 Email" autocomplete="username">
            <input class="login-input" id="teacher-password-input" type="password"
              placeholder="密碼" autocomplete="current-password"
              onkeydown="if(event.key==='Enter')doTeacherLogin()">
            <div class="login-error" id="teacher-login-error"></div>
            <button class="btn-login-primary" id="btn-teacher-go" onclick="doTeacherLogin()">登入後台</button>
            <div class="login-switch">還沒有帳號？<a onclick="showTeacherRegister()">點這裡註冊</a></div>
          </div>

          <!-- 註冊表單 -->
          <div id="teacher-register-form" style="display:none">
            <input class="login-input" id="teacher-reg-email" type="email"
              placeholder="教師 Email" autocomplete="username">
            <input class="login-input" id="teacher-reg-password" type="password"
              placeholder="設定密碼（至少 6 位）" autocomplete="new-password">
            <input class="login-input" id="teacher-reg-confirm" type="password"
              placeholder="再輸入一次密碼" autocomplete="new-password"
              onkeydown="if(event.key==='Enter')doTeacherRegister()">
            <div class="login-error" id="teacher-reg-error"></div>
            <button class="btn-login-primary" id="btn-teacher-reg" onclick="doTeacherRegister()">建立帳號</button>
            <div class="login-switch">已有帳號？<a onclick="showTeacherLogin()">點這裡登入</a></div>
          </div>
        </div>
      </div>
    </div>

    <!-- ③ 學生登入 -->
    <div class="panel right" id="panel-login">
      <div class="slogin-wrap">
        <div class="login-card">
          <button class="btn-back-role" onclick="showPanel('role')">← 返回</button>
          <div class="login-school">學生登入</div>
          <div class="login-title">歡迎<span>回來</span></div>

          <div id="login-form">
            <label class="login-label">你的名字</label>
            <input class="login-input" id="login-name" type="text" placeholder="輸入姓名"
              autocomplete="off" oninput="updateLoginBtn()">
            <label class="login-label">PIN 碼（4位數字）</label>
            <div class="pin-display" id="pin-display">
              <div class="pin-dot" id="pd0"></div><div class="pin-dot" id="pd1"></div>
              <div class="pin-dot" id="pd2"></div><div class="pin-dot" id="pd3"></div>
            </div>
            <div class="pin-pad">
              <button class="pin-btn" onclick="pinInput('1')">1</button>
              <button class="pin-btn" onclick="pinInput('2')">2</button>
              <button class="pin-btn" onclick="pinInput('3')">3</button>
              <button class="pin-btn" onclick="pinInput('4')">4</button>
              <button class="pin-btn" onclick="pinInput('5')">5</button>
              <button class="pin-btn" onclick="pinInput('6')">6</button>
              <button class="pin-btn" onclick="pinInput('7')">7</button>
              <button class="pin-btn" onclick="pinInput('8')">8</button>
              <button class="pin-btn" onclick="pinInput('9')">9</button>
              <button class="pin-btn pin-btn-del" onclick="pinDelete()">⌫</button>
              <button class="pin-btn" onclick="pinInput('0')">0</button>
              <button class="pin-btn pin-btn-ok" id="btn-login-ok" onclick="doLogin()" disabled>✓</button>
            </div>
            <div class="login-error" id="login-error">名字或 PIN 碼不正確，請再試一次</div>
            <div class="login-switch">還沒有帳號？<a onclick="showRegister()">點這裡註冊</a></div>
          </div>

          <div id="register-form" style="display:none">
            <label class="login-label">你的名字</label>
            <input class="login-input" id="reg-name" type="text" placeholder="輸入姓名"
              autocomplete="off" oninput="updateRegBtn()">
            <label class="login-label">設定 PIN 碼（4位數字）</label>
            <div class="pin-display" id="reg-pin-display">
              <div class="pin-dot" id="rpd0"></div><div class="pin-dot" id="rpd1"></div>
              <div class="pin-dot" id="rpd2"></div><div class="pin-dot" id="rpd3"></div>
            </div>
            <div class="pin-pad">
              <button class="pin-btn" onclick="regPinInput('1')">1</button>
              <button class="pin-btn" onclick="regPinInput('2')">2</button>
              <button class="pin-btn" onclick="regPinInput('3')">3</button>
              <button class="pin-btn" onclick="regPinInput('4')">4</button>
              <button class="pin-btn" onclick="regPinInput('5')">5</button>
              <button class="pin-btn" onclick="regPinInput('6')">6</button>
              <button class="pin-btn" onclick="regPinInput('7')">7</button>
              <button class="pin-btn" onclick="regPinInput('8')">8</button>
              <button class="pin-btn" onclick="regPinInput('9')">9</button>
              <button class="pin-btn pin-btn-del" onclick="regPinDelete()">⌫</button>
              <button class="pin-btn" onclick="regPinInput('0')">0</button>
              <button class="pin-btn pin-btn-ok" id="btn-reg-ok" onclick="doRegister()" disabled>✓</button>
            </div>
            <div class="login-error" id="reg-error"></div>
            <div class="login-switch">已有帳號？<a onclick="showLogin()">點這裡登入</a></div>
          </div>
        </div>
      </div>
    </div>

    <!-- ④ Hub 主頁 -->
    <div class="panel right" id="panel-hub">
      <div class="hub-body">
        <button class="hub-profile-card" onclick="showProfile()">
          <div class="hub-profile-left">
            <div class="hub-profile-avatar" id="hub-avatar">🐣</div>
            <div>
              <div class="hub-welcome-name" id="hub-name">—</div>
              <div class="hub-welcome-sub">歡迎回來・點此編輯個人資料</div>
            </div>
          </div>
          <span class="hub-profile-arrow">›</span>
        </button>
        <div class="hub-section-label">📚 學習區</div>
        <div class="subjects-grid" id="subjects-grid"></div>
        <div class="hub-section-label">📊 近期記錄</div>
        <div class="activity-card">
          <div id="activity-list"><div class="activity-empty">載入中…</div></div>
        </div>
      </div>
    </div>

    <!-- ⑤ 子項目 iframe -->
    <div class="panel right" id="panel-subject">
      <iframe id="subject-frame" src="about:blank" allow="microphone"></iframe>
    </div>

    <!-- ⑥ 個人設定 -->
    <div class="panel right" id="panel-profile">
      <div class="profile-nav-row">
        <button class="btn-back-profile" onclick="showPanel('hub')">← 返回</button>
      </div>
      <div class="profile-header">
        <div class="profile-avatar-big" id="profile-avatar-big">🐣</div>
        <div>
          <div class="profile-header-name" id="profile-header-name">—</div>
          <div class="profile-header-sub">個人設定</div>
        </div>
      </div>
      <div class="profile-body">
        <div class="profile-section">
          <div class="profile-section-title">暱稱</div>
          <input class="profile-input" id="profile-nickname" type="text"
            placeholder="輸入暱稱（選填）" maxlength="10">
        </div>
        <div class="profile-section">
          <div class="profile-section-title">頭像</div>
          <div class="avatar-grid" id="avatar-grid"></div>
        </div>
        <div class="profile-section">
          <div class="profile-section-title">主題色系</div>
          <div class="theme-grid" id="theme-grid"></div>
        </div>
        <div class="profile-section">
          <div class="profile-section-title">音效</div>
          <div class="sound-row">
            <span style="font-size:.9rem;font-weight:700">練習音效</span>
            <button class="sound-toggle" id="sound-toggle" onclick="toggleSoundUI()">
              <div class="sound-knob" id="sound-knob"></div>
            </button>
          </div>
        </div>
        <div class="profile-section">
          <div class="profile-section-title">班級</div>
          <div id="class-join-wrap"><div style="color:var(--muted);font-size:.85rem;font-weight:600">載入中…</div></div>
        </div>
        <button class="btn-save-profile" onclick="saveProfile()">💾 儲存設定</button>
        <button class="btn-logout" onclick="showLogoutConfirm()">登出</button>
      </div>
    </div>

  </div>
</div>

<!-- 維護模式覆蓋層（由 checkSiteSettings 控制顯示） -->
<div id="maintenance-overlay" style="display:none;position:fixed;inset:0;z-index:9999;background:rgba(15,23,42,.92);align-items:center;justify-content:center;flex-direction:column;text-align:center;padding:32px">
  <div style="font-size:3.5rem;margin-bottom:20px">🔧</div>
  <div style="font-size:1.5rem;font-weight:900;color:white;margin-bottom:10px">系統維護中</div>
  <div style="font-size:.95rem;font-weight:600;color:rgba(255,255,255,.7);max-width:320px;line-height:1.6">系統目前正在進行維護，請稍後再回來。<br>造成不便，敬請見諒。</div>
</div>

<div class="overlay" id="logout-overlay">
  <div class="overlay-box">
    <div class="overlay-icon">👋</div>
    <div class="overlay-title">要登出嗎？</div>
    <div class="overlay-sub">下次再來繼續學習！</div>
    <div class="overlay-btns">
      <button class="btn-cancel"  onclick="hideLogoutConfirm()">取消</button>
      <button class="btn-confirm" onclick="doLogout()">登出</button>
    </div>
  </div>
</div>

<!-- PWA 安裝橫幅 -->
<div id="pwa-install-banner" class="pwa-banner" style="display:none">
  <div class="pwa-banner-left">
    <div class="pwa-banner-icon">📱</div>
    <div>
      <div class="pwa-banner-title">安裝練字趣 App</div>
      <div class="pwa-banner-sub">加入主畫面，隨時快速開啟</div>
    </div>
  </div>
  <div class="pwa-banner-btns">
    <button class="btn-pwa-install" onclick="doInstallPwa()">安裝</button>
    <button class="btn-pwa-dismiss" onclick="dismissPwaBanner()">✕</button>
  </div>
</div>

<div id="toast"></div>
<script src="shared.js"></script>
<script src="auth.js"></script>
<script src="hub.js"></script>
<script>
if ('serviceWorker' in navigator) {
  window.addEventListener('load', function() {
    navigator.serviceWorker.register('/taiping-special-ed/sw.js')
      .catch(function(err) { console.warn('SW 註冊失敗:', err); });
  });
}

/* ── PWA 安裝提示 ── */
var _deferredInstallPrompt = null;

window.addEventListener('beforeinstallprompt', function(e) {
  e.preventDefault(); // 阻止瀏覽器自動顯示（含「Chrome 捷徑」選項的那個）
  _deferredInstallPrompt = e;
  // 若本次 session 未被關閉，延遲 2 秒後顯示我們的橫幅
  if (!sessionStorage.getItem('pwa-banner-dismissed')) {
    setTimeout(function() {
      var banner = document.getElementById('pwa-install-banner');
      if (banner) banner.style.display = 'flex';
    }, 2000);
  }
});

function doInstallPwa() {
  if (!_deferredInstallPrompt) return;
  _deferredInstallPrompt.prompt(); // 直接呼叫 → 只顯示「加入主畫面」對話框，無 Chrome 捷徑選項
  _deferredInstallPrompt.userChoice.then(function() {
    _deferredInstallPrompt = null;
    var banner = document.getElementById('pwa-install-banner');
    if (banner) banner.style.display = 'none';
  });
}

function dismissPwaBanner() {
  var banner = document.getElementById('pwa-install-banner');
  if (banner) banner.style.display = 'none';
  sessionStorage.setItem('pwa-banner-dismissed', '1');
}

window.addEventListener('appinstalled', function() {
  var banner = document.getElementById('pwa-install-banner');
  if (banner) banner.style.display = 'none';
});
</script>
</body>
</html>
