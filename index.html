<!DOCTYPE html>
<html lang="zh-TW">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<title>臺東縣太平國小資源班</title>
<script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-firestore-compat.js"></script>
<link rel="stylesheet" href="shared.css">
<script>
(function(){var M={blue:'#eef5fc,#4a90d9,#2d6fa8,#e8f4fd',green:'#edfbf4,#27ae60,#1e8449,#d5f5e3',
  purple:'#f3f0fc,#8e44ad,#6c3483,#e8daef',orange:'#fff8f0,#e67e22,#ca6f1e,#fdebd0',
  teal:'#f0fafa,#16a085,#0e6655,#d1f2eb',pink:'#fff0f8,#d63384,#a0255e,#fce4ec'};
  try{var v=(M[localStorage.getItem('theme')]||M.blue).split(','),r=document.documentElement.style;
  ['--bg','--blue','--blue-dk','--blue-lt'].forEach(function(k,i){r.setProperty(k,v[i]);});}catch(e){}})();
</script>
<link rel="stylesheet" href="index.css">
</head>
<body>
<div class="app">

  <!-- 主系統 Topbar：子項目不碰這裡 -->
  <div id="main-topbar" class="hidden">
    <div>
      <div class="topbar-brand-name">太平國小資源班</div>
      <div class="topbar-brand-sub" id="topbar-sub">學習系統</div>
    </div>
    <div class="topbar-right">
      <button class="btn-back-subject" id="btn-back-subject" onclick="backToHub()">← 返回</button>
      <div class="student-badge" onclick="showProfile()">
        <span class="student-badge-avatar" id="badge-avatar">🐣</span>
        <span class="student-badge-name"   id="badge-name">—</span>
      </div>
    </div>
  </div>

  <div id="main-content">

    <!-- 登入 -->
    <div class="panel active" id="panel-login">
      <div class="login-card">
        <div class="login-school">臺東縣太平國小資源班</div>
        <div class="login-title">學習<span>系統</span></div>
        <div id="login-form">
          <label class="login-label">你的名字</label>
          <input class="login-input" id="login-name" type="text" placeholder="輸入姓名" autocomplete="off" oninput="updateLoginBtn()">
          <label class="login-label">PIN 碼（4位數字）</label>
          <div class="pin-display" id="pin-display">
            <div class="pin-dot" id="pd0"></div><div class="pin-dot" id="pd1"></div>
            <div class="pin-dot" id="pd2"></div><div class="pin-dot" id="pd3"></div>
          </div>
          <div class="pin-pad">
            <button class="pin-btn" onclick="pinInput('1')">1</button>
            <button class="pin-btn" onclick="pinInput('2')">2</button>
            <button class="pin-btn" onclick="pinInput('3')">3</button>
            <button class="pin-btn" onclick="pinInput('4')">4</button>
            <button class="pin-btn" onclick="pinInput('5')">5</button>
            <button class="pin-btn" onclick="pinInput('6')">6</button>
            <button class="pin-btn" onclick="pinInput('7')">7</button>
            <button class="pin-btn" onclick="pinInput('8')">8</button>
            <button class="pin-btn" onclick="pinInput('9')">9</button>
            <button class="pin-btn pin-btn-del" onclick="pinDelete()">⌫</button>
            <button class="pin-btn" onclick="pinInput('0')">0</button>
            <button class="pin-btn pin-btn-ok" id="btn-login-ok" onclick="doLogin()" disabled>✓</button>
          </div>
          <div class="login-error" id="login-error">名字或 PIN 碼不正確，請再試一次</div>
          <div class="login-switch">還沒有帳號？<a onclick="showRegister()">點這裡註冊</a></div>
        </div>
        <div id="register-form" style="display:none">
          <label class="login-label">你的名字</label>
          <input class="login-input" id="reg-name" type="text" placeholder="輸入姓名" autocomplete="off" oninput="updateRegBtn()">
          <label class="login-label">設定 PIN 碼（4位數字）</label>
          <div class="pin-display" id="reg-pin-display">
            <div class="pin-dot" id="rpd0"></div><div class="pin-dot" id="rpd1"></div>
            <div class="pin-dot" id="rpd2"></div><div class="pin-dot" id="rpd3"></div>
          </div>
          <div class="pin-pad">
            <button class="pin-btn" onclick="regPinInput('1')">1</button>
            <button class="pin-btn" onclick="regPinInput('2')">2</button>
            <button class="pin-btn" onclick="regPinInput('3')">3</button>
            <button class="pin-btn" onclick="regPinInput('4')">4</button>
            <button class="pin-btn" onclick="regPinInput('5')">5</button>
            <button class="pin-btn" onclick="regPinInput('6')">6</button>
            <button class="pin-btn" onclick="regPinInput('7')">7</button>
            <button class="pin-btn" onclick="regPinInput('8')">8</button>
            <button class="pin-btn" onclick="regPinInput('9')">9</button>
            <button class="pin-btn pin-btn-del" onclick="regPinDelete()">⌫</button>
            <button class="pin-btn" onclick="regPinInput('0')">0</button>
            <button class="pin-btn pin-btn-ok" id="btn-reg-ok" onclick="doRegister()" disabled>✓</button>
          </div>
          <div class="login-error" id="reg-error"></div>
          <div class="login-switch">已有帳號？<a onclick="showLogin()">點這裡登入</a></div>
        </div>
        <div class="teacher-entry">
          <button class="btn-teacher" onclick="toggleTeacherEntry()">🔑 教師登入</button>
          <div class="teacher-pin-wrap hidden" id="teacher-pin-wrap">
            <input class="teacher-pin-input" id="teacher-pin-input" type="password" placeholder="教師密碼">
            <button class="btn-teacher-go" onclick="doTeacherLogin()">進入</button>
          </div>
        </div>
      </div>
    </div>

    <!-- Hub 主頁 -->
    <div class="panel right" id="panel-hub">
      <div class="hub-body">
        <div class="hub-welcome">
          <div class="hub-welcome-avatar" id="hub-avatar">🐣</div>
          <div class="hub-welcome-name"   id="hub-name">—</div>
          <div class="hub-welcome-sub">歡迎回來</div>
        </div>
        <div class="hub-section-label">📚 學習區</div>
        <div class="subjects-grid" id="subjects-grid"></div>
        <div class="hub-section-label">📊 近期記錄</div>
        <div class="activity-card">
          <div id="activity-list"><div class="activity-empty">載入中…</div></div>
        </div>
      </div>
    </div>

    <!-- 子項目 iframe（子項目的一切在這裡，和主系統完全隔離）-->
    <div class="panel right" id="panel-subject">
      <iframe id="subject-frame" src="about:blank" allow="microphone"></iframe>
    </div>

    <!-- 個人設定 -->
    <div class="panel right" id="panel-profile">
      <div class="profile-header">
        <div class="profile-avatar-big" id="profile-avatar-big">🐣</div>
        <div>
          <div class="profile-header-name" id="profile-header-name">—</div>
          <div class="profile-header-sub">個人設定</div>
        </div>
      </div>
      <div class="profile-body">
        <div class="profile-section">
          <div class="profile-section-title">暱稱</div>
          <input class="profile-input" id="profile-nickname" type="text" placeholder="輸入暱稱（選填）" maxlength="10">
        </div>
        <div class="profile-section">
          <div class="profile-section-title">頭像</div>
          <div class="avatar-grid" id="avatar-grid"></div>
        </div>
        <div class="profile-section">
          <div class="profile-section-title">主題色系</div>
          <div class="theme-grid" id="theme-grid"></div>
        </div>
        <div class="profile-section">
          <div class="profile-section-title">音效</div>
          <div class="sound-row">
            <span style="font-size:.9rem;font-weight:700">練習音效</span>
            <button class="sound-toggle" id="sound-toggle" onclick="toggleSoundUI()">
              <div class="sound-knob" id="sound-knob"></div>
            </button>
          </div>
        </div>
        <button class="btn-save-profile" onclick="saveProfile()">💾 儲存設定</button>
        <button class="btn-logout" onclick="showLogoutConfirm()">登出</button>
      </div>
    </div>

  </div>
</div>

<div class="overlay" id="logout-overlay">
  <div class="overlay-box">
    <div class="overlay-icon">👋</div>
    <div class="overlay-title">要登出嗎？</div>
    <div class="overlay-sub">下次再來繼續學習！</div>
    <div class="overlay-btns">
      <button class="btn-cancel"  onclick="hideLogoutConfirm()">取消</button>
      <button class="btn-confirm" onclick="doLogout()">登出</button>
    </div>
  </div>
</div>

<div id="toast"></div>
<script src="shared.js"></script>
<script src="index.js"></script>
</body>
</html>
