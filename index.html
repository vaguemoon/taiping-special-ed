<!DOCTYPE html>
<html lang="zh-TW">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<meta name="theme-color" content="#4a90d9">
<title>上學趣</title>
<link rel="manifest" href="/QuEDU/manifest.json">
<script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-firestore-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-auth-compat.js"></script>
<link rel="stylesheet" href="shared/shared.css">
<script>
(function(){var M={blue:'#eef5fc,#4a90d9,#2d6fa8,#e8f4fd',green:'#edfbf4,#27ae60,#1e8449,#d5f5e3',
  purple:'#f3f0fc,#8e44ad,#6c3483,#e8daef',orange:'#fff8f0,#e67e22,#ca6f1e,#fdebd0',
  teal:'#f0fafa,#16a085,#0e6655,#d1f2eb',pink:'#fff0f8,#d63384,#a0255e,#fce4ec'};
  try{var v=(M[localStorage.getItem('theme')]||M.blue).split(','),r=document.documentElement.style;
  ['--bg','--blue','--blue-dk','--blue-lt'].forEach(function(k,i){r.setProperty(k,v[i]);});}catch(e){}})();
</script>
<link rel="stylesheet" href="src/index.css">
</head>
<body>
<div class="app">
  <div id="main-content">

    <!-- ① 角色選擇（預設顯示） -->
    <div class="panel active" id="panel-role">
      <div class="role-wrap">
        <div class="role-header">
          <img src="assets/登入icon.png" class="role-logo-img" alt="上學趣">
          <div class="role-subtitle">請選擇你的身份</div>
        </div>
        <!-- 公告橫幅（由 checkSiteSettings 控制顯示） -->
        <div id="announcement-banner" style="display:none;background:#fffbeb;border:1.5px solid #fbbf24;border-radius:10px;padding:11px 14px;margin-bottom:16px;font-size:.88rem;font-weight:700;color:#92400e;gap:8px;align-items:flex-start">
          <span>📢</span>
          <span id="announcement-text"></span>
        </div>

        <div class="role-cards">
          <button class="role-card role-teacher" onclick="showPanel('teacher-login')">
            <div class="role-icon">👩‍🏫</div>
            <div class="role-name">教　師</div>
            <div class="role-sub">管理課程與班級</div>
          </button>
          <button class="role-card role-student" onclick="window.location.href='login.html'">
            <div class="role-icon">🧒</div>
            <div class="role-name">學　生</div>
            <div class="role-sub">開始今天的學習</div>
          </button>
        </div>
      </div>
    </div>

    <!-- ② 教師登入 -->
    <div class="panel right" id="panel-teacher-login">
      <div class="tlogin-wrap">
        <div class="tlogin-card">
          <button class="btn-back-role" onclick="showPanel('role')">← 返回</button>
          <div class="login-school">教師後台</div>
          <div class="login-title">教師<span>登入</span></div>

          <!-- Google 登入 -->
          <button class="btn-google" onclick="doGoogleLogin()">
            <svg width="18" height="18" viewBox="0 0 18 18" fill="none" xmlns="http://www.w3.org/2000/svg">
              <path d="M17.64 9.2c0-.637-.057-1.251-.164-1.84H9v3.481h4.844c-.209 1.125-.843 2.078-1.796 2.716v2.259h2.908c1.702-1.567 2.684-3.875 2.684-6.615z" fill="#4285F4"/>
              <path d="M9 18c2.43 0 4.467-.806 5.956-2.18l-2.908-2.259c-.806.54-1.837.86-3.048.86-2.344 0-4.328-1.584-5.036-3.711H.957v2.332A8.997 8.997 0 0 0 9 18z" fill="#34A853"/>
              <path d="M3.964 10.71A5.41 5.41 0 0 1 3.682 9c0-.593.102-1.17.282-1.71V4.958H.957A8.996 8.996 0 0 0 0 9c0 1.452.348 2.827.957 4.042l3.007-2.332z" fill="#FBBC05"/>
              <path d="M9 3.58c1.321 0 2.508.454 3.44 1.345l2.582-2.58C13.463.891 11.426 0 9 0A8.997 8.997 0 0 0 .957 4.958L3.964 7.29C4.672 5.163 6.656 3.58 9 3.58z" fill="#EA4335"/>
            </svg>
            以 Google 帳號登入
          </button>

          <div class="login-divider"><span>或以 Email 登入</span></div>

          <!-- 登入表單 -->
          <div id="teacher-login-form">
            <input class="login-input" id="teacher-email-input" type="email"
              placeholder="教師 Email" autocomplete="username">
            <input class="login-input" id="teacher-password-input" type="password"
              placeholder="密碼" autocomplete="current-password"
              onkeydown="if(event.key==='Enter')doTeacherLogin()">
            <div class="login-error" id="teacher-login-error"></div>
            <button class="btn-login-primary" id="btn-teacher-go" onclick="doTeacherLogin()">登入後台</button>
            <div class="login-switch">還沒有帳號？<a onclick="showTeacherRegister()">點這裡註冊</a></div>
          </div>

          <!-- 註冊表單 -->
          <div id="teacher-register-form" style="display:none">
            <input class="login-input" id="teacher-reg-email" type="email"
              placeholder="教師 Email" autocomplete="username">
            <input class="login-input" id="teacher-reg-password" type="password"
              placeholder="設定密碼（至少 6 位）" autocomplete="new-password">
            <input class="login-input" id="teacher-reg-confirm" type="password"
              placeholder="再輸入一次密碼" autocomplete="new-password"
              onkeydown="if(event.key==='Enter')doTeacherRegister()">
            <div class="login-error" id="teacher-reg-error"></div>
            <button class="btn-login-primary" id="btn-teacher-reg" onclick="doTeacherRegister()">建立帳號</button>
            <div class="login-switch">已有帳號？<a onclick="showTeacherLogin()">點這裡登入</a></div>
          </div>
        </div>
      </div>
    </div>

  </div>
</div>

<!-- 維護模式覆蓋層（由 checkSiteSettings 控制顯示） -->
<div id="maintenance-overlay" style="display:none;position:fixed;inset:0;z-index:9999;background:rgba(15,23,42,.92);align-items:center;justify-content:center;flex-direction:column;text-align:center;padding:32px">
  <div style="font-size:3.5rem;margin-bottom:20px">🔧</div>
  <div style="font-size:1.5rem;font-weight:900;color:white;margin-bottom:10px">系統維護中</div>
  <div style="font-size:.95rem;font-weight:600;color:rgba(255,255,255,.7);max-width:320px;line-height:1.6">系統目前正在進行維護，請稍後再回來。<br>造成不便，敬請見諒。</div>
</div>

<!-- iOS 安裝引導覆蓋層 -->
<div id="ios-install-overlay" style="display:none;position:fixed;inset:0;z-index:9000;background:rgba(0,0,0,.72);align-items:center;justify-content:center;padding:24px">
  <div style="background:white;border-radius:24px;padding:28px 24px;max-width:360px;width:100%;box-shadow:0 20px 60px rgba(0,0,0,.35)">
    <div style="text-align:center;margin-bottom:22px">
      <div style="font-size:2.6rem;margin-bottom:8px">🏫</div>
      <div style="font-size:1.1rem;font-weight:900;color:#1a1a2e">歡迎使用上學趣！</div>
      <div style="font-size:.82rem;font-weight:600;color:#999;margin-top:4px">請先將 App 加到主畫面，以後直接點圖示開啟</div>
    </div>

    <!-- Step 1 -->
    <div style="display:flex;align-items:flex-start;gap:14px;margin-bottom:16px">
      <div style="min-width:28px;height:28px;border-radius:50%;background:#4a90d9;color:white;font-weight:900;font-size:.85rem;display:flex;align-items:center;justify-content:center">1</div>
      <div>
        <div style="font-weight:800;font-size:.9rem;color:#222">點右上角的 🧭 羅盤圖示</div>
        <div style="font-size:.78rem;color:#999;margin-top:3px;font-weight:600;line-height:1.5">選擇「在 Safari 中開啟」</div>
      </div>
    </div>

    <!-- Step 2 -->
    <div style="display:flex;align-items:flex-start;gap:14px;margin-bottom:16px">
      <div style="min-width:28px;height:28px;border-radius:50%;background:#4a90d9;color:white;font-weight:900;font-size:.85rem;display:flex;align-items:center;justify-content:center">2</div>
      <div>
        <div style="font-weight:800;font-size:.9rem;color:#222">點下方工具列的 <span style="font-size:1.05rem">⬜↑</span> 分享按鈕</div>
        <div style="font-size:.78rem;color:#999;margin-top:3px;font-weight:600;line-height:1.5">在選單中找到「加入主畫面」並點選</div>
      </div>
    </div>

    <!-- Step 3 -->
    <div style="display:flex;align-items:flex-start;gap:14px;margin-bottom:26px">
      <div style="min-width:28px;height:28px;border-radius:50%;background:#4a90d9;color:white;font-weight:900;font-size:.85rem;display:flex;align-items:center;justify-content:center">3</div>
      <div>
        <div style="font-weight:800;font-size:.9rem;color:#222">點右上角「新增」</div>
        <div style="font-size:.78rem;color:#999;margin-top:3px;font-weight:600;line-height:1.5">完成後關閉 Safari<br>從主畫面的上學趣圖示進入 App</div>
      </div>
    </div>

    <button onclick="dismissInstallGuide()"
      style="width:100%;padding:13px;border:none;border-radius:12px;background:linear-gradient(135deg,#4a90d9,#2d6fa8);color:white;font-size:.95rem;font-weight:900;cursor:pointer;font-family:inherit;margin-bottom:9px">
      ✅ 已加入主畫面，進入 App
    </button>
    <button onclick="skipInstallGuide()"
      style="width:100%;padding:10px;border:1.5px solid #ddd;border-radius:12px;background:white;color:#aaa;font-size:.83rem;font-weight:700;cursor:pointer;font-family:inherit">
      暫時略過
    </button>
  </div>
</div>

<div id="toast"></div>
<script src="shared/shared.js"></script>
<script src="src/auth.js"></script>
<script>
if ('serviceWorker' in navigator) {
  window.addEventListener('load', function() {
    navigator.serviceWorker.register('/QuEDU/sw.js')
      .catch(function(err) { console.warn('SW 註冊失敗:', err); });
  });
}

/* ── iOS 安裝引導 ── */
(function() {
  var isIOS = /iPad|iPhone|iPod/.test(navigator.userAgent);
  var isStandalone = window.navigator.standalone === true;
  if (isIOS && !isStandalone
      && !localStorage.getItem('ios-install-guided')
      && !sessionStorage.getItem('ios-install-skipped')) {
    document.getElementById('ios-install-overlay').style.display = 'flex';
  }
})();

function dismissInstallGuide() {
  localStorage.setItem('ios-install-guided', '1');
  document.getElementById('ios-install-overlay').style.display = 'none';
}

function skipInstallGuide() {
  sessionStorage.setItem('ios-install-skipped', '1');
  document.getElementById('ios-install-overlay').style.display = 'none';
}
</script>
</body>
</html>
