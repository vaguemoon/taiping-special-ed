<!DOCTYPE html>
<html lang="zh-TW">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<title>語文練習</title>
<link rel="stylesheet" href="chinese-quiz.css">
<script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-firestore-compat.js"></script>
</head>
<body>

<div class="entry-page">
  <div class="entry-card">
    <div class="entry-logo">📝</div>
    <h1 class="entry-title">語文練習</h1>
    <div class="entry-student" id="entry-student">載入中…</div>
    <div class="entry-error"   id="entry-error"></div>

    <!-- Step: 輸入測驗代碼 -->
    <div class="setup-step" id="step-code" style="display:none">
      <div class="setup-label">輸入老師給的測驗代碼</div>
      <input id="code-input" type="text" maxlength="4"
        placeholder="例如：AB12"
        autocomplete="off" autocorrect="off" autocapitalize="characters" spellcheck="false"
        style="width:100%;text-align:center;font-size:2rem;font-weight:900;letter-spacing:.25em;
               border:3px solid var(--ink-lt);border-radius:12px;padding:12px;
               font-family:monospace;outline:none;background:var(--paper);color:var(--ink);
               text-transform:uppercase;margin-bottom:4px"
        oninput="this.value=this.value.toUpperCase()"
        onkeydown="if(event.key==='Enter')lookupSession()">
      <div id="code-error" style="font-size:.82rem;font-weight:700;color:#d93025;min-height:20px;margin-bottom:8px;text-align:center"></div>
      <button class="btn-start" id="btn-join" onclick="lookupSession()">進入測驗</button>
      <!-- 曾參加過且仍開放的測驗 -->
      <div id="history-section" style="display:none;margin-top:20px"></div>
    </div>

    <!-- Step: 確認資訊 -->
    <div class="setup-step" id="step-confirm" style="display:none">
      <div id="session-info" style="background:var(--paper-dk,#f0ede4);border-radius:10px;padding:14px 16px;margin-bottom:16px;font-size:.88rem;line-height:1.9"></div>
      <button class="btn-start" onclick="goQuiz()">開始作答</button>
      <button class="setup-back" style="margin-top:8px;width:100%;text-align:center" onclick="showStep('code')">‹ 重新輸入代碼</button>
    </div>

    <!-- Offline fallback -->
    <div class="setup-step" id="step-offline" style="display:none">
      <div class="offline-notice">⚠️ 無法連線伺服器<br>請確認網路後再試</div>
      <button class="btn-start" onclick="showStep('code')">重試</button>
    </div>

    <div class="entry-divider"></div>
    <button class="btn-entry-return" onclick="returnToHub()">← 返回主頁</button>
  </div>
</div>

<script>
'use strict';

var FB_CONFIG = {
  apiKey:            'AIzaSyBLhonzZkR1ORDPKgxmaVLFUwvPiEMpdj0',
  authDomain:        'tainping-hanzi-app.firebaseapp.com',
  projectId:         'tainping-hanzi-app',
  storageBucket:     'tainping-hanzi-app.firebasestorage.app',
  messagingSenderId: '158917910126',
  appId:             '1:158917910126:web:e52a1d0456d1fd4fe6907f'
};

var db            = null;
var sessionData   = null;   /* loaded quizSession document data */
var HISTORY_KEY   = 'cq_session_history';

/* ── Navigation ── */
function returnToHub() {
  window.parent.postMessage({ type: 'chinese-quiz-back-to-hub' }, '*');
}

function showStep(name) {
  ['code', 'confirm', 'offline'].forEach(function(s) {
    var el = document.getElementById('step-' + s);
    if (el) el.style.display = (s === name) ? '' : 'none';
  });
  if (name === 'code') {
    var ce = document.getElementById('code-error');
    var ci = document.getElementById('code-input');
    if (ce) ce.textContent = '';
    if (ci) ci.value = '';
    setTimeout(function() {
      var inp = document.getElementById('code-input');
      if (inp) try { inp.focus(); } catch(e) {}
    }, 80);
  }
}

/* ── Init ── */
(function init() {
  /* Wrap everything — if any uncaught exception occurs we still show a usable screen */
  try {
    var stuEl = document.getElementById('entry-student');

    /* hub_student is optional: app works with or without it (direct access / testing) */
    var student = null;
    try {
      var saved = sessionStorage.getItem('hub_student');
      if (saved) student = JSON.parse(saved);
    } catch(e) {}

    var name = (student && (student.nickname || student.name)) || '';
    stuEl.textContent = name ? name + '，請輸入老師給的測驗代碼' : '請輸入老師給的測驗代碼';

    try {
      if (!firebase.apps.length) firebase.initializeApp(FB_CONFIG);
      db = firebase.firestore();
    } catch(e) { db = null; }

    if (!db) { showStep('offline'); return; }
    showStep('code');
    renderHistorySection();
  } catch(e) {
    /* Last-resort fallback: show the code input anyway */
    try { showStep('code'); } catch(e2) {}
  }
})();

/* ── 查詢測驗代碼 ── */
function lookupSession() {
  var code    = (document.getElementById('code-input').value || '').trim().toUpperCase();
  var errEl   = document.getElementById('code-error');
  var btn     = document.getElementById('btn-join');

  if (!code) { errEl.textContent = '請輸入代碼'; return; }
  if (code.length !== 4) { errEl.textContent = '代碼為 4 碼，請確認'; return; }

  errEl.textContent    = '';
  btn.disabled         = true;
  btn.textContent      = '查詢中…';

  db.collection('quizSessions')
    .where('code',   '==', code)
    .where('active', '==', true)
    .get()
    .then(function(snap) {
      btn.disabled    = false;
      btn.textContent = '進入測驗';

      if (snap.empty) {
        errEl.textContent = '找不到代碼「' + code + '」，請確認代碼是否正確或測驗是否已關閉';
        return;
      }

      sessionData     = snap.docs[0].data();
      var counts      = sessionData.counts || {};
      var total       = (counts.explain || 0) + (counts.fillIn || 0) + (counts.mc || 0);

      var infoEl = document.getElementById('session-info');
      infoEl.innerHTML =
        '<div style="font-size:1rem;font-weight:900;margin-bottom:6px">' + escHtml(sessionData.name || '未命名') + '</div>' +
        '<div>📚 ' + escHtml(sessionData.grade || '') + '　第 ' + escHtml(sessionData.lesson || '') + ' 課　' + escHtml(sessionData.lessonName || '') + '</div>' +
        '<div style="color:var(--ink-lt);font-size:.82rem;margin-top:4px">' +
          '詞語解釋 ' + (counts.explain || 0) + ' 題 ／ ' +
          '詞語填空 ' + (counts.fillIn  || 0) + ' 題 ／ ' +
          '選擇題 '   + (counts.mc      || 0) + ' 題　共 <strong>' + total + '</strong> 題' +
        '</div>';

      showStep('confirm');
    })
    .catch(function(e) {
      btn.disabled    = false;
      btn.textContent = '進入測驗';
      errEl.textContent = '查詢失敗，請確認網路連線';
    });
}

/* ── 歷史記錄 ── */
function loadHistory() {
  try { return JSON.parse(localStorage.getItem(HISTORY_KEY)) || []; }
  catch(e) { return []; }
}

function saveToHistory(data) {
  var list = loadHistory().filter(function(h) { return h.code !== data.code; });
  list.unshift({
    code:       data.code       || '',
    name:       data.name       || '未命名',
    grade:      data.grade      || '',
    lesson:     data.lesson     || '',
    lessonName: data.lessonName || '',
    teacherUid: data.teacherUid || '',
    counts:     data.counts     || {}
  });
  try { localStorage.setItem(HISTORY_KEY, JSON.stringify(list.slice(0, 10))); }
  catch(e) {}
}

function renderHistorySection() {
  var histEl = document.getElementById('history-section');
  if (!histEl || !db) return;
  var list = loadHistory().filter(function(h) { return h.code; });
  if (!list.length) return;
  var codes = list.map(function(h) { return h.code; }).slice(0, 10);
  db.collection('quizSessions')
    .where('code', 'in', codes)
    .where('active', '==', true)
    .get()
    .then(function(snap) {
      var active = {};
      snap.docs.forEach(function(d) { active[d.data().code] = true; });
      var items = list.filter(function(h) { return active[h.code]; });
      if (!items.length) return;
      var html = '<div class="history-title">最近的測驗</div>';
      items.forEach(function(h) {
        var c = h.counts || {};
        var total = (c.explain || 0) + (c.fillIn || 0) + (c.mc || 0);
        html +=
          '<div class="history-item">' +
            '<div class="history-item-info">' +
              '<div class="history-item-name">' + escHtml(h.name) + '</div>' +
              '<div class="history-item-meta">' +
                escHtml(h.grade) + '　第 ' + escHtml(h.lesson) + ' 課' +
                (h.lessonName && h.lessonName !== h.lesson ? '　' + escHtml(h.lessonName) : '') +
                (total ? '　共 ' + total + ' 題' : '') +
              '</div>' +
            '</div>' +
            '<button class="btn-history-enter" onclick="enterFromHistory(\'' + escJs(h.code) + '\')">重新進入</button>' +
          '</div>';
      });
      histEl.innerHTML = html;
      histEl.style.display = '';
    })
    .catch(function() {});
}

function enterFromHistory(code) {
  var ci = document.getElementById('code-input');
  if (ci) ci.value = code;
  lookupSession();
}

/* ── 進入作答 ── */
function goQuiz() {
  if (!sessionData) return;
  saveToHistory(sessionData);
  try {
    sessionStorage.setItem('quiz_settings', JSON.stringify({
      grade:      sessionData.grade,
      lesson:     sessionData.lesson,
      lessonName: sessionData.lessonName || sessionData.lesson,
      teacherUid: sessionData.teacherUid || '',
      counts: {
        '詞語解釋': sessionData.counts.explain || 0,
        '詞語填空': sessionData.counts.fillIn  || 0,
        '選擇題':   sessionData.counts.mc      || 0
      }
    }));
  } catch(e) {}
  window.location.href = 'quiz.html';
}

/* ── Helpers ── */
function escHtml(s) {
  return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;')
                  .replace(/"/g,'&quot;').replace(/'/g,'&#39;');
}
</script>
</body>
</html>
