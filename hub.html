<!DOCTYPE html>
<html lang="zh-TW">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<meta name="theme-color" content="#4a90d9">
<title>上學趣 — 學習中心</title>
<link rel="manifest" href="/QuEDU/manifest.json">
<script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-firestore-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-auth-compat.js"></script>
<link rel="stylesheet" href="shared/shared.css">
<script>
(function(){var M={blue:'#eef5fc,#4a90d9,#2d6fa8,#e8f4fd',green:'#edfbf4,#27ae60,#1e8449,#d5f5e3',
  purple:'#f3f0fc,#8e44ad,#6c3483,#e8daef',orange:'#fff8f0,#e67e22,#ca6f1e,#fdebd0',
  teal:'#f0fafa,#16a085,#0e6655,#d1f2eb',pink:'#fff0f8,#d63384,#a0255e,#fce4ec'};
  try{var v=(M[localStorage.getItem('theme')]||M.blue).split(','),r=document.documentElement.style;
  ['--bg','--blue','--blue-dk','--blue-lt'].forEach(function(k,i){r.setProperty(k,v[i]);});}catch(e){}})();
</script>
<link rel="stylesheet" href="src/index.css">
</head>
<body>
<div class="app">
  <div id="main-content">

    <!-- Hub 主頁 -->
    <div class="panel active" id="panel-hub">
      <div class="hub-screen">

        <!-- 左側 sidebar（桌面版） -->
        <aside class="hub-sidebar">
          <div class="hub-sidebar-brand">
            <div class="hub-sidebar-avatar" id="hub-avatar">🐣</div>
            <div>
              <div class="hub-sidebar-name" id="hub-name">—</div>
              <div class="hub-sidebar-sub">上學趣</div>
            </div>
          </div>
          <nav class="hub-sidebar-nav">
            <button class="hub-tab active" id="hub-tab-learn" onclick="switchHubTab('learn')">📚 學習區</button>
            <button class="hub-tab" id="hub-tab-quiz" onclick="switchHubTab('quiz')">📝 測驗區</button>
          </nav>
          <div class="hub-sidebar-footer">
            <button class="hub-tab" id="hub-tab-profile" onclick="switchHubTab('profile')">⚙️ 個人設定</button>
            <button class="btn-logout-hub" onclick="showLogoutConfirm()">🚪 登出</button>
          </div>
        </aside>

        <!-- 主內容區 -->
        <main class="hub-content">

          <!-- 學習區 -->
          <div class="hub-panel active" id="hub-panel-learn">
            <div class="hub-section-label">📚 學習區</div>
            <div class="subjects-grid" id="subjects-grid"></div>
          </div>

          <!-- 測驗區 -->
          <div class="hub-panel" id="hub-panel-quiz">
            <div class="hub-section-label">📝 測驗區</div>
            <div class="subjects-grid" id="quiz-grid"></div>
          </div>

          <!-- 個人資料 -->
          <div class="hub-panel" id="hub-panel-profile">
            <div class="hub-section-label">⚙️ 個人設定</div>
            <div class="profile-body">
              <div class="profile-avatar-big" id="profile-avatar-big">🐣</div>
              <div class="profile-section">
                <div class="profile-section-title">暱稱</div>
                <input class="profile-input" id="profile-nickname" type="text"
                  placeholder="輸入暱稱（選填）" maxlength="10">
              </div>
              <div class="profile-section">
                <div class="profile-section-title">頭像</div>
                <div class="avatar-grid" id="avatar-grid"></div>
              </div>
              <div class="profile-section">
                <div class="profile-section-title">主題色系</div>
                <div class="theme-grid" id="theme-grid"></div>
              </div>
              <div class="profile-section">
                <div class="profile-section-title">音效</div>
                <div class="sound-row">
                  <span style="font-size:.9rem;font-weight:700">練習音效</span>
                  <button class="sound-toggle" id="sound-toggle" onclick="toggleSoundUI()">
                    <div class="sound-knob" id="sound-knob"></div>
                  </button>
                </div>
              </div>
              <div class="profile-section">
                <div class="profile-section-title">班級</div>
                <div id="class-join-wrap"><div style="color:var(--muted);font-size:.85rem;font-weight:600">載入中…</div></div>
              </div>
              <button class="btn-save-profile" onclick="saveProfile()">💾 儲存設定</button>
            </div>
          </div>

        </main>

        <!-- 手機版底部 tab bar -->
        <nav class="hub-bottom-nav">
          <button class="hub-bottom-btn active" id="hub-bottom-learn" onclick="switchHubTab('learn')">
            <span class="hub-bottom-icon">📚</span>
            <span class="hub-bottom-label">學習區</span>
          </button>
          <button class="hub-bottom-btn" id="hub-bottom-quiz" onclick="switchHubTab('quiz')">
            <span class="hub-bottom-icon">📝</span>
            <span class="hub-bottom-label">測驗區</span>
          </button>
          <button class="hub-bottom-btn" id="hub-bottom-profile" onclick="switchHubTab('profile')">
            <span class="hub-bottom-icon">⚙️</span>
            <span class="hub-bottom-label">個人設定</span>
          </button>
        </nav>

      </div>
    </div>

    <!-- 子項目 iframe -->
    <div class="panel right" id="panel-subject">
      <iframe id="subject-frame" src="about:blank" allow="microphone"></iframe>
    </div>

  </div>
</div>

<!-- 登出確認覆蓋層 -->
<div class="overlay" id="logout-overlay">
  <div class="overlay-box">
    <div class="overlay-icon">👋</div>
    <div class="overlay-title">要登出嗎？</div>
    <div class="overlay-sub">下次再來繼續學習！</div>
    <div class="overlay-btns">
      <button class="btn-cancel"  onclick="hideLogoutConfirm()">取消</button>
      <button class="btn-confirm" onclick="doLogout()">登出</button>
    </div>
  </div>
</div>

<div id="toast"></div>
<script src="shared/shared.js"></script>
<script src="src/auth.js"></script>
<script src="src/hub.js"></script>
<script>
if ('serviceWorker' in navigator) {
  window.addEventListener('load', function() {
    navigator.serviceWorker.register('/QuEDU/sw.js')
      .catch(function(err) { console.warn('SW 註冊失敗:', err); });
  });
}

/* ── 管理者隱藏入口：連點學校名稱 5 次 ── */
(function() {
  var taps = 0, timer = null;
  document.addEventListener('click', function(e) {
    if (!e.target || e.target.id !== 'school-name-tap') { taps = 0; return; }
    taps++;
    clearTimeout(timer);
    if (taps >= 5) { taps = 0; window.location.href = 'super-admin/login.html'; return; }
    timer = setTimeout(function() { taps = 0; }, 1500);
  });
})();
</script>
</body>
</html>
