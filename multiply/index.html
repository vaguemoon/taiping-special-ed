<!DOCTYPE html>
<html lang="zh-TW">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<meta name="theme-color" content="#4a90d9">
<title>乘法趣｜上學趣</title>
<link rel="manifest" href="/QuEDU/manifest.json">
<script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-firestore-compat.js"></script>
<link rel="stylesheet" href="../shared/shared.css">
<script>
(function(){var M={blue:'#eef5fc,#4a90d9,#2d6fa8,#e8f4fd',green:'#edfbf4,#27ae60,#1e8449,#d5f5e3',
  purple:'#f3f0fc,#8e44ad,#6c3483,#e8daef',orange:'#fff8f0,#e67e22,#ca6f1e,#fdebd0',
  teal:'#f0fafa,#16a085,#0e6655,#d1f2eb',pink:'#fff0f8,#d63384,#a0255e,#fce4ec'};
  try{var v=(M[localStorage.getItem('theme')]||M.blue).split(','),r=document.documentElement.style;
  ['--bg','--blue','--blue-dk','--blue-lt'].forEach(function(k,i){r.setProperty(k,v[i]);});}catch(e){}})();
</script>
<link rel="stylesheet" href="multiply.css">
</head>
<body>

<!-- ══════════════════ TOPBAR ══════════════════ -->
<div id="page-topbar">
  <button class="btn-back-hub" onclick="backToHub()">← 主頁</button>
  <button class="btn-back hidden" id="topbar-back" onclick="goBack()">← 返回</button>
  <div id="topbar-title">✖️ <span>乘法趣</span></div>
  <div id="topbar-right">
    <span id="topbar-stars" class="topbar-stars">★ 0</span>
    <div id="topbar-student" onclick="toggleLogoutMenu()">
      <span id="topbar-avatar">🐣</span>
      <span id="topbar-name">—</span>
      <div id="topbar-logout-menu" class="logout-menu hidden">
        <button class="lm-btn" onclick="goToSettings(event)">⚙️ 設定</button>
        <button class="lm-btn" onclick="goToAchievement(event)">🏆 成就</button>
        <button class="lm-btn lm-logout" onclick="sendLogout(event)">🚪 登出</button>
      </div>
    </div>
  </div>
</div>

<!-- ══════════════════ PAGE: HOME ══════════════════ -->
<div id="page-home" class="page page-fill active">
  <div class="home-wrap">
    <div class="home-title">✖️ 乘法趣</div>
    <div class="home-sub">選擇你想要的模式</div>
    <button class="mode-card" onclick="showPage('practice-select');initPracticeSelect();">
      <div class="mode-card-icon">✏️</div>
      <div class="mode-card-title">練習模式</div>
      <div class="mode-card-sub">自選題目、無限練習</div>
    </button>
    <button class="mode-card mode-card-exam" onclick="showPage('exam-select');initExamSelect();">
      <div class="mode-card-icon">⏱</div>
      <div class="mode-card-title">測驗模式</div>
      <div class="mode-card-sub">倒數計時、多輪精熟</div>
    </button>
  </div>
</div>

<!-- ══════════════════ PAGE: PRACTICE-SELECT ══════════════════ -->
<div id="page-practice-select" class="page">
  <div class="select-body">

    <div class="select-section">
      <div class="select-label-row">
        <span class="select-label">選擇乘法表</span>
        <button id="toggle-a-chips" class="toggle-all-btn" onclick="toggleSelectAll('a-chips')">全選</button>
      </div>
      <div id="a-chips" class="chips-wrap"></div>
    </div>

    <div class="select-section">
      <div class="select-label">題型</div>
      <div class="type-btn-group">
        <button id="ptype-fill"    class="type-btn active" onclick="setPracticeType('fill')">乘法填空</button>
        <button id="ptype-reverse" class="type-btn"        onclick="setPracticeType('reverse')">積的拆解</button>
      </div>
    </div>

    <div id="practice-pair-count" class="pair-count-hint">已選 0 組題目</div>

    <button class="btn-start-big" onclick="startPractice()">開始練習 →</button>
  </div>
</div>

<!-- ══════════════════ PAGE: PRACTICE ══════════════════ -->
<div id="page-practice" class="page">
  <div class="game-wrap">

    <!-- 統計列 -->
    <div class="stats-row">
      <div class="stat-item">
        <span class="stat-label">連續答對</span>
        <span class="stat-val streak" id="practice-streak">0</span>
      </div>
      <div class="stat-item">
        <span class="stat-label">答對</span>
        <span class="stat-val" id="practice-correct">0</span>
      </div>
      <div class="stat-item">
        <span class="stat-label">總題數</span>
        <span class="stat-val" id="practice-total">0</span>
      </div>
    </div>

    <!-- 題目 -->
    <div id="practice-question" class="q-display"></div>

    <!-- 選項（選擇題 / 積的拆解） -->
    <div id="practice-options" class="options-grid" style="display:none"></div>

    <!-- 填空數字鍵盤 -->
    <div id="practice-fill-pad" class="fill-pad" style="display:none">
      <div class="fill-pad-row">
        <button class="fill-btn" onclick="fillAppend('7')">7</button>
        <button class="fill-btn" onclick="fillAppend('8')">8</button>
        <button class="fill-btn" onclick="fillAppend('9')">9</button>
      </div>
      <div class="fill-pad-row">
        <button class="fill-btn" onclick="fillAppend('4')">4</button>
        <button class="fill-btn" onclick="fillAppend('5')">5</button>
        <button class="fill-btn" onclick="fillAppend('6')">6</button>
      </div>
      <div class="fill-pad-row">
        <button class="fill-btn" onclick="fillAppend('1')">1</button>
        <button class="fill-btn" onclick="fillAppend('2')">2</button>
        <button class="fill-btn" onclick="fillAppend('3')">3</button>
      </div>
      <div class="fill-pad-row">
        <button class="fill-btn fill-del" onclick="fillBackspace()">⌫</button>
        <button class="fill-btn" onclick="fillAppend('0')">0</button>
        <button class="fill-btn fill-ok" onclick="onPracticeFillSubmit()">✓</button>
      </div>
    </div>

    <!-- 答錯時顯示「下一題」按鈕 -->
    <button id="practice-next-btn" class="btn-next-q hidden" onclick="doNextPracticeQuestion()">下一題 →</button>

    <button class="btn-end-practice" onclick="goBack()">結束練習</button>
  </div>
</div>

<!-- ══════════════════ PAGE: EXAM-SELECT ══════════════════ -->
<div id="page-exam-select" class="page">
  <div class="select-body">

    <div class="select-section">
      <div class="select-label-row">
        <span class="select-label">選擇乘法表</span>
        <button id="toggle-exam-tables" class="toggle-all-btn" onclick="toggleSelectAllExamTables()">全選</button>
      </div>
      <div id="exam-table-chips" class="chips-wrap"></div>
    </div>

    <div class="select-section">
      <div class="select-label">每題限時</div>
      <div class="type-btn-group">
        <button id="etimer-5"  class="type-btn" onclick="setExamTimer(5)">5 秒</button>
        <button id="etimer-8"  class="type-btn active" onclick="setExamTimer(8)">8 秒</button>
        <button id="etimer-10" class="type-btn" onclick="setExamTimer(10)">10 秒</button>
      </div>
    </div>

    <div id="exam-q-preview" class="pair-count-hint">共 0 題</div>

    <button class="btn-start-big btn-start-exam" onclick="startExam()">開始測驗 →</button>
  </div>
</div>

<!-- ══════════════════ PAGE: EXAM ══════════════════ -->
<div id="page-exam" class="page">

  <!-- 遊戲面板 -->
  <div id="exam-game-panel" class="game-wrap">

    <!-- 進度列 -->
    <div class="exam-toprow">
      <span id="exam-round-label" class="exam-round-label">第 1 輪</span>
      <span id="exam-q-count" class="exam-q-count">本輪剩 0 題</span>
      <span id="exam-progress-text" class="exam-progress-text">0 / 0</span>
    </div>
    <div class="exam-overall-bar">
      <div id="exam-overall-fill" style="width:0%"></div>
    </div>

    <!-- 倒數計時器 -->
    <div class="exam-timer-wrap">
      <div class="exam-timer-bar-bg">
        <div id="exam-timer-bar" style="width:100%;background:var(--blue)"></div>
      </div>
      <div id="exam-timer-num" class="exam-timer-num">8</div>
    </div>

    <!-- 題目 -->
    <div id="exam-question" class="q-display q-display-exam"></div>

    <!-- 選項（積的拆解） -->
    <div id="exam-options" class="options-grid" style="display:none"></div>

    <!-- 填空數字鍵盤 -->
    <div id="exam-fill-pad" class="fill-pad" style="display:none">
      <div class="fill-pad-row">
        <button class="fill-btn" onclick="fillAppend('7')">7</button>
        <button class="fill-btn" onclick="fillAppend('8')">8</button>
        <button class="fill-btn" onclick="fillAppend('9')">9</button>
      </div>
      <div class="fill-pad-row">
        <button class="fill-btn" onclick="fillAppend('4')">4</button>
        <button class="fill-btn" onclick="fillAppend('5')">5</button>
        <button class="fill-btn" onclick="fillAppend('6')">6</button>
      </div>
      <div class="fill-pad-row">
        <button class="fill-btn" onclick="fillAppend('1')">1</button>
        <button class="fill-btn" onclick="fillAppend('2')">2</button>
        <button class="fill-btn" onclick="fillAppend('3')">3</button>
      </div>
      <div class="fill-pad-row">
        <button class="fill-btn fill-del" onclick="fillBackspace()">⌫</button>
        <button class="fill-btn" onclick="fillAppend('0')">0</button>
        <button class="fill-btn fill-ok" onclick="onExamFillSubmit()">✓</button>
      </div>
    </div>
    <!-- 答錯/超時後顯示「下一題」按鈕 -->
    <button id="exam-next-btn" class="btn-next-q hidden" onclick="doNextExamQuestion()">下一題 →</button>
  </div><!-- end exam-game-panel -->

  <!-- 輪間結算面板 -->
  <div id="exam-summary-panel" class="exam-summary-panel" style="display:none">
    <div class="summary-icon">📊</div>
    <div id="exam-summary-round"   class="summary-round">第 1 輪結束</div>
    <div id="exam-summary-correct" class="summary-stat summary-correct">✅ 累計答對 0 題</div>
    <div id="exam-summary-retry"   class="summary-stat summary-retry">💪 還需複習 0 題</div>
    <div id="exam-wrong-list" class="exam-wrong-list"></div>
    <button id="exam-next-round-btn" class="btn-start-big" onclick="startNextRound()">開始第 2 輪 →</button>
    <button id="exam-done-btn"       class="btn-start-big btn-done" onclick="showExamFinalResult()" style="display:none">查看結果 🎉</button>
  </div>

</div><!-- end page-exam -->

<!-- ══════════════════ PAGE: EXAM-RESULT ══════════════════ -->
<div id="page-exam-result" class="page">
  <div class="result-wrap">
    <div class="result-icon">🎉</div>
    <div id="exam-result-title" class="result-title">全部完成！</div>
    <div id="exam-result-sub"   class="result-sub"></div>
    <div id="exam-result-badges" class="result-badges"></div>
    <div class="result-btns">
      <button class="btn-result" onclick="showPage('exam-select');initExamSelect();">再測一次</button>
      <button class="btn-result btn-result-home" onclick="showPage('home',false);PAGE_STACK=['home'];">回首頁</button>
    </div>
  </div>
</div>

<!-- ══════════════════ PAGE: SETTINGS ══════════════════ -->
<div id="page-settings" class="page">
  <div class="settings-body">
    <div class="settings-section-title">🐾 頭像</div>
    <div id="settings-avatar-grid" class="avatar-grid"></div>
    <div class="settings-section-title">🎨 主題色系</div>
    <div id="theme-grid"></div>
    <div class="settings-section-title">🔊 音效</div>
    <div class="sound-row">
      <span class="sound-label">練習音效</span>
      <button class="sound-toggle-btn" id="sound-toggle-btn" onclick="toggleSound();applySound();">
        <div class="sound-toggle-knob" id="sound-toggle-knob"></div>
      </button>
    </div>
  </div>
</div>

<!-- ══════════════════ PAGE: ACHIEVEMENT ══════════════════ -->
<div id="page-achievement" class="page">
  <!-- 由 renderAchievementPage() 填充 -->
</div>

<div id="toast"></div>

<script src="../shared/shared.js"></script>
<script src="js/nav.js"></script>
<script src="js/state.js"></script>
<script src="js/game.js"></script>
<script src="js/achievement.js"></script>
<script src="js/init.js"></script>
</body>
</html>
